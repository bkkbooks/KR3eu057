body:
  text: 卷五辨起脹三日凡事得其宜則猶順風掛帆熟路著鞭一舉千里其勢順也不得其宜則盪船於陸御車於水不進跬步其勢逆也治痘之術以辨順逆為要世之從事於斯者曖昧模糊不辨順逆遇其逆證不知為逆而妄投促死之藥或雖知為逆而強望僥倖之功人命之重玩之於寸匙之上縱令不愧於人不怍於心乎治痘當作是觀三四日痘出當齊點至足心勢方安定唯須觀痘形之勢以知氣血壯弱及受毒淺深其形尖圓光澤氣滿血榮者順也反之則逆也驗其唇舌以辨證之陰陽推其部位以明五臟六腑氣血盈虧之候治痘之要不過乎此四五日氣會血附紅活鮮明痘頂放光而白而唇舌滋潤內外俱無擁遏之憂者順也如三四日綿密似蠶種及紫赤干洞而頂陷者險也如五六日雖氣旺而血不歸附其色灰陷或水泡癢塌破碎浮衣氣背血散者逆也必死如三四日根窠已起但色不光壯血暈纏繞而頂陷者此雖險而尚有生意如五六日雖氣旺而血附不厚其色㿠白不榮或帶昏黯灰紫者為險凡順者不待投藥而愈逆者治之不能奏效卻招人之毀險者藥之所及宜以唇舌細認三項之症矣辨起脹三日治例凡放標定而漸漸起脹痘瘡肥胖一分是毒發出一分肥胖十分則毒亦出盡也如於此時有不起者驗瘡色與唇舌以辨之魏氏曰三四日期頂陷者血亦難聚險者為氣弱不能領袖其血也以保元湯加川芎肉桂扶陽益陰豈有不痊者哉便不實者大保元湯主之如便青滑者加丁子五粒又有至期峻突者是氣血壯也或有因元氣素弱而束領不起者或有因氣血凝滯而不得發透者細察內外諸證多是於發熱放苗之時調攝失宜故也不早圖之則後必難為矣朱氏曰三四日氣虛寒則頂陷不起按不堅實摸不礙手形不起脹血虛寒則根窠淡白或清言冷豔者或細言隱伏不起者或亂言隱躍出不齊者或無言出而復沉伏者或痘上如寒毛豎起枯澀不活動宜用以參耆補氣芎歸以補血肉桂以溫寒六日後寒多可加丁子以溫內磨入木香以行滯氣辨明陰陽唇舌是准人參歸耆湯或大保元湯主之夫痘證有裡寒而虛者有表寒而虛者故發始雖實熱燔灼而妄勿清涼大過如其雖表色未解者宜斟酌治之詳唇舌紅不以為則翁氏曰痘始出之時雖為血熱擁遏至於三四日後身反不熱肌膚冰冷痘不長烏得不進溫和之劑如肉桂乾薑川芎之類使內氣一暖則外氣自和泄瀉之後其內必虛雖腹脹煩渴喘急烏得復為實熱不過內虛陷伏成內攻而然夫實熱之症七八日曾經泄瀉皆從虛治之有木香異攻之證進木香異攻之二散為貴痘之圓暈以氣血為主是故氣不可虧虧則陽會不及而圓暈之形不成血不可盈盈則陰乘陽位而倒陷之禍立至矣孫氏曰四日來起壯肥大中有一小孔自頂直下至根腳不黑不白與痘色相等者此名蛙痘由表虛腠理疏而然若不早圖則大泄元氣不能起發灌漿急用大保元湯大加糯米提起內膿以實其孔庶致佳兆二三劑後孔自塞滿如至六日尚不塞滿者急宜參歸鹿茸湯加肉桂丁子若虛寒者加熟附子五分痘欲出而泄者吉放苗位定而泄利不止者急止之如至四五日便一泄則熱氣自散神氣自虛者痘之常候也禁用清涼如泄後續續腸鳴下氣者內虛也如滑泄糞無臭氣色青白而小水清利者虛寒也如痘色淡白唇舌淡白虛冷者表裡俱虛寒也急宜峻補聶氏曰脾胃虛弱飲食不化而泄瀉者其泄滑利而色帶白宜用術苓調脾散主之又曰泄而糞青白泄利者虛寒也痘色必淡白參朮散主之如虛滑不止兼七味豆蔻丸萬氏曰如四日後忽然泄瀉此宜急止之恐腸胃虛真氣脫也須辨冷熱虛實如瀉而手足冷面色青白瘡不紅綻者冷證也理中湯或益黃散豆蔻丸甚則陳氏木香散異攻散各當其證則皆可用也嬌紅嬌嫩嬌豔俱一證也此原表裡俱虛一齊湧出之象也俗醫觀痘出二三日起發鮮明而虛脹者愛其嬌豔以為順痘不置諸慮或誤失治六日後發癢塌九日而死此坐不熟練斯術可勝嘆乎朱氏曰五六日當起脹時有一等光活可愛嬌嫩豔觀手捺之破燈照之如琉璃此假脹也又名空歡喜急救表則或幸活不則必癢塌而死治之初發忌升發之劑惟宜固表散火湯三四日後大保元湯加丁子糯米或人參歸耆湯宜參用如六日後漿色虛餒者宜參歸鹿茸湯與之若泄瀉者勿與別有口訣痘出三四日面先虛浮眼先封者險而兼逆是所謂進銳者退速者也即氣虛一齊湧出之象如至六日皺萎者九日必死又瘡密而七日後眼不封鼻不塞者虛之極也急防向來倒陷之患費氏曰五六日期表裡無邪雖無阻礙氣血虛弱痘雖起發而少光壯淡白而不蒼老眼不甚封鼻不甚塞腳雖不塌項不能綻體靜溫和者稍稍解毒中即當補益氣血溫中保脾如保元湯加芎歸木香姜蠶白芷山楂用解毒一二味以預防漿後泄瀉倒陷之患夫痘提升為要內氣上行則生內氣下行則死故五六日後眼鼻不封塞而大孔時下氣者逆也痘書所謂六日後專用溫補若虛寒甚者峻補之補瀉之要無他以唇舌為蓍龜翁氏曰三四日續續不齊不易長大五六日不易成漿少食氣餒傷食易泄七八日期塌陷灰白不起自汗微渴或腹脹喘滿泄瀉塌癢寒戰咬牙頭溫足冷勢所必至也驗唇舌紅白以宜峻補異攻散或回陽反本湯或參附湯宜參用凡痘出四日後窠囊光壯者氣有餘也紅暈潤澤者血有餘也氣血有餘則表裡俱實不須服藥萬氏曰如形長大而色枯燥者此氣至而血不榮宜四物湯加人參麥門冬色紅潤而形平陷者血至氣不充也宜四君子湯加黃耆官掛川芎形陷色枯萎者此氣血俱不足也宜十全大補湯或和大桑蟲汁與之凡痘證氣虛血實者證之常也故痘多屬血熱如首尾唇舌滋潤潔淨者里內為平不須加治薛氏曰已出五六日不能長而不生膿或癢塌者參耆四聖散或排膿托裡散主之稟賦虛弱痘證或痘前曾嬰大病未全復為初熱所困至四五日瘡遲滯不進唇舌滋潤或潔淨或淡紅時微渴者只用加減益氣湯兼與獨參湯可也如未至大虛之前唯培其脾元以助灌漿收結而已薛氏曰治陽虛痘證不起發不紅活或膿清不滿或結痂遲緩或痘痕色白或嫩軟不固或膿水不幹或癢或畏風寒者宜獨參湯主之附經大病氣血未復忽然患痘一治驗浪華小西伊兵衛一子年十歲患痘於癸丑之仲冬放苗三日急邀余往目之形體虛瘦手足如柴顏色愁郁天柱不舉余怪問其故父母答曰患疫未日一夜大熱如炮醫以為再感治之余曰是痘也蓋痘者以氣血成始終之功乃闖此兒乞血大虛唯所喜者雖陸續出未侵環跳之處雖頂陷繼至稍有松意將內症論之則鄰於逆將形色言之則瀕於險雖然調養脾胃補益氣血則應成領載之績舉家大喜便以加減益氣湯加蟬蛻與之次早診之虛瘡略有紅意尚與前方加人參三分肉桂二分貫及五朝眉宇微緩陷瘡爭分光然寢食未寧因與大保元湯兼用獨參半劑六朝仍因本方加減與之方曉安睡神情且清次日窠囊突起漿膿稍松貫及八朝漿色沛然與以糯米粥意色甚喜九朝眼鼻封塞未全而口角轉有收意即以補中益氣湯如法治之已至十朝頭面堆結而收痂厚身體雖欠肥潤神情逐日輕快乃以補脾滲濕之劑及十二朝腫胖盡退惟上唇如嘴腫硬是欲發口疳之兆也以胭脂膏和金不換塗之與當歸連翹飲治之至三十八朝而全平愎焉痘證至五六日大便一泄利忽然陽氣脫者急宜峻補薛氏曰古治治瘡痘陽氣虛寒咬開寒戰手足並冷或吐瀉不食飲沸湯不知熱用獨參湯加好真附子炮如法者每劑先加一錢未應多加之更不應加至四五錢或等分亦無妨俱用之以運其陽氣如已脫者不治用法煎法俱有訣翁氏曰氣虛症候盡具而用峻補之劑陽氣尚脫者不治他無治法必死辨起脹三日清火治例痘出位定後欲知透與不透要於手足細察四五日候欲知足與不足要於頭額詳驗七八日候大都於天庭印堂輔宮兩太陽邊有幾點悅目可愛又不瑣屑不歪斜則雖遍身稠密模糊亦可望生痘書曰出齊後四五六日內其時日十分緊要其形色證候最宜精察蓋好痘全要膿漿濃滿是六日後候其次亦要六七分膿七八日膿色六分者為險可治方可保無慮一齊形色顯然其膿之成與不成候六七日足與不足候八九日皆可逆睹矣除以上順候自然膿足不必服藥外其有不順者後必無膿或膿少而清急於此三日內指四五六日觀形察色分別寒熱虛實用藥調治以為灌漿收結計猶可及也治痘先詳審八證推察四節便以內外因為準故唇燥舌胎內不平也否則內平也形萎色枯外不平也否則外平也故唇舌滋潤內處俱和平者不可妄行下法殺人朱氏曰行升散後指見點一二日四日間指三四日猶有煩躁悶亂作渴不食唇腫腹脹或大便秘澀或瀉清黃水外則乾枯焦紫者四五日上以涼膈散加蜜下之行下雖遲不過六日以救其陰六日後好行補指七八九日若四日上便失下指五六日使熱濕鬱結於胃七日以上定作泄瀉而死若腹膨脹大便秘結唇燥舌胎乾燥者以調胃承氣湯利之胡氏曰可下不下必死季少陽曰初泄者後結生初結者後泄死脾濕不泄溏泄不禁而死痘出四五日來有雖成窠而白泡乾涸空地赤色內火太盛二便秘無胎唇舌燥裂元氣昏憒者費氏曰此痘以氣虛治助其烈火閉其毛竅不得發泄其外浮衣勢必破碎如干豆皮內囊肉色燥赤如剝兔並空隙之地赤色散漫遊紅煩躁擾亂而莫可救藥矣似是而非不可不明辨矣涼血攻毒飲主之發始不大熱而痘出乾紅滯色項焦凹陷者蓋屬倒陷倒塌此症自五陷成不可不辨五陷者白陷灰陷紫陷血陷黑陷也翟氏曰痘出稠密到三四日紅紫而頂陷者紫陷也甚則轉為黑陷此毒熱熾盛蔽其血而陷也仍用清毒活血湯治之隨其症加減用之然當其紫陷時不過一二劑而痘立起其效如神及至黑陷則受毒已深雖用此方救療而活者十僅二三若不及則涼血攻毒飲可參考若又黑陷唇舌淡白者白花蛇散主之發始熱微逐日內火太盛至四五日愈劇逮五六日猶未解有口氣如火及雙唇燥裂舌胎如粉囊窠焦爍而乾涸者費氏曰假令毒火發見於外熱如火熾煩渴不已口氣如爐不拘在氣在血均以石膏芩連犀角金汁等類以制其陽光烈火庶氣血兩不受炙痘其得以起脹而榮潤矣急宜清涼攻毒飲主之或涼膈散若熱毒入心經而狂躁不知人事者古法豬尾膏間亦用之而虛弱者忌用以其性悍猛之故也或奪命五毒丹可參用矣附火極一治驗京師針口屋伊兵衛甥年十有三發熱不一日次早見苗證甚猛獗始事者凡十有二醫皆為不治而去時有小林順堂者與余甚善致書請余往觀之乃放苗四日也其證身體如爐耳目且紅口氣如火躁渴最甚且熟察之靜則昏憒如迷躁則似魚失水譫語狂妄二便秘結唇燥裂及舌炕炕者謂白胎通明中央焦紫陷黑者痘隱躍於皮下紅色且深毒火燔灼氣血不相依而失負載之功是乃火極之象也始事者皆知攻表之理而不知治痘不可一定謬投升散之劑故致此梟可憐其未得對病之劑而坐視棄之今日之策當先攻其里遲及明日斷不可為乃以涼血攻毒飲加石膏大黃與之且退火回生丹加牛黃末二分和冷水進之徹夜靜恬安眠次早下利黑便六朝又下數枚胸膈略爽因以前劑減石膏大黃及七朝始認知傍人即進白粥甚喜且利滑便如膠者數合火褐漸退內外轉松乃以內托之劑微加清涼已及八朝漿色半足九朝寢食俱寧口渴未止至十一朝面部略有收意手足盤痕焮赤煩渴頻頻是余炎未盡而為膈消也因以人參白虎湯加黃連令一晝夜服七貼貫至十四朝口渴自休痂厚收結已及十六朝頭頂項頸發腫毒數塊即以大連翹飲貫至三十五朝始得全功千金之珠必在驪龍頷下獲之甚艱醫之得奇續神功亦在險逆之症為痘者其可以易而求之哉辨清補治例痘出血熱壅遏則有用某藥得內外分消而無餘證於是更拘日期與托裡行漿則有熱毒反蘊蓄痘色煩紅凶症疊出朱氏曰治血熱痘證服藥後熱毒悉退內外和平惟不易長大者加減排膿湯主之然此雖保和元氣活血行滯以助痘成功而前證未除還當服十補解毒湯不可拘以日程而遽用之痘出雖掀發而有兩顴過赤如餅昏憒而兼氣虛者孫朋來痘疹心印曰四五日痘色不宜紅紫乃熱毒不化若血熱仍當涼血解毒兼氣虛者保元湯加紫草木通紅花生地之類解之痘出氣血虛弱毒氣盛熾不能發透兼虛兼實遲滯不成漿而難任溫補難任清涼者宜以清補之味保全之聶氏曰五六日起脹時又有一種出痘稠密毒火既盛然元氣虛血氣弱津液枯竭不能制火以致虛火炎蒸或煩或渴或咽喉痛或鼻時出血難任溫補痘必不能成漿結痂大凡年長之男女嗜欲久開血氣既耗者多有此證最為難治今特製參麥清補湯以調之發始身熱不一日而見苗者謂火里苗必稠密而無空隙其症甚重若唇舌赤色乾燥者早宜用清毒行血之劑若唇舌淡白者忌之醫宗金鑑曰痘不當收斂之時忽一時收斂者更現痘周身窠粒乾燥口渴發熱煩急不寧此毒火壅盛之故也宜用清毒散主之凡四五日候頂陷焦紫者毒盛熱實之象也如窠囊大而色淡白以手擬之皮薄而起皺紋軟寬者表虛也氣虛也形大而掀發根暈赤紅枯澀皮薄者氣虛毒盛也滿頂紅如海棠紅者氣虛血乘氣位而滯也謂之嬌紅屬氣血兩虛痘瘡平陷肉色與痘色俱赤紫者血熱毒未解也痘色淡白頂陷根暈散蔓者陽虛也氣虛也痘色淡白與隙地無異遍身見青筋者血虛也如毒盛熱實者宜清涼解毒如皮薄表虛者宜參耆補托如頂平陷嬌豔者宜補益氣血如血熱未解者宜涼血活血安表和中如血滯不運者於活血行血中兼補氣如毒盛氣虛者於補托中微兼解毒如熱毒未盡解氣虛者於補托中微兼清涼如偏氣虛頂陷者重以補益溫補之力如偏血虛瘡白陷者重於滋補中以參耆大補之功然惟面上一二悅目可愛者有鼎峻之勢則驗唇舌潤燥紅白以為用藥之准用藥不失其期則陷者突枯者松軟者實薄者厚而生生之道存於此矣是治痘之圓活也五六日候痘頂白者氣之充也根紅者血之榮也氣血兩分而後明潤紅活者始終無慮矣凡痘出以七日為界限之日乃氣血毒之三者悉發出於外則內乃空虛也故六日後必行溫補以使內氣實為要蓋以其常言之一二日宜升散四日上才用清法但辨唇舌紅不而虛者遠清求補又四日上大便秘者才行下法微利之行下雖遲不過六日若唇舌滋潤者忌下殺人如不虛不實者以平劑治之然至六日天午從證之輕重用補益溫補宜托裡行漿雖遲不過八日若加不順者雖十日後亦宜溫補峻補如膿足之後補湯太過恐有癰毒眼疾口疳之患是醫之過也如痘平準者勿服藥矣又至十日不結痂者於補脾滲濕中微加解毒治之治痘之法大略如斯但當以唇舌易脈驗其潤燥紅白以為用藥之則古人復起不易吾言矣起脹三日虛痘用方保元湯痘出位定後證平準者加川芎桔梗扶陽益陰或陽氣不足者加肉桂豈有不痊者哉方見放苗大保元湯治頂陷根窠雖紅而皮軟且薄血有餘氣不足者黃耆二錢人參一錢五分甘草一錢官桂五分白朮炒一錢川芎一錢上共六味加薑棗水煎溫服如氣不行去肉桂加木香若不食加人乳半鍾木香散治瘡灰白表虛內虛泄瀉腹脹其效如神若無灰白泄瀉等證勿用桂心青皮木香腹皮人參赤茯苓前胡訶子半夏丁子甘草各等分上共十一味每服五錢姜三片水一大鐘煎六分服異攻散治痘表虛塌癢內虛泄瀉腹脹喘急悶亂煩渴寒戰咬牙頭溫足冷者急宜服之木香肉桂當歸人參白朮陳皮厚朴丁子茯苓肉果各七分附子半夏各五分上共十二味每服五錢生薑三片棗二枚水一大鐘煎六分溫服朱巽曰此原兩方予參合之名木香異攻散凡痘至八九日凡虛寒種種即與服奏速功術苓調脾散治脾氣虛弱飲食不化而泄瀉其色帶白者白朮去蘆皮炒白茯苓各五分白芍酒炒神麯炙甘草各五分白扁豆姜浸去殼炒八分砂仁炒香附製厚朴各三分上共九味煨姜三片大棗一枚同煎或加人參益黃散治脾虛寒陳皮一兩丁子青皮炙甘草訶子肉各半兩上共五味為末每服二錢水一盞煎六分去滓溫服一方加木香三分四物湯治痘形長大而血色枯燥者此氣至而不榮者也以本方加人參麥門冬治之當歸熟地芍藥川芎各等分水煎服四君子湯治色紅潤而形平陷者此血至而氣不充者也以本方加黃耆肉桂川芎治之人參白朮白茯苓各等分甘草減半生薑一片棗肉一枚共水煎服十全大補湯治形平陷而色枯萎者此氣血俱不足也以本方合無價散治之無價散方見於後即四君子湯合四物湯名八珍湯加黃耆肉桂名十全大補湯加味四聖散治痘瘡已出五六日不能長不生膿或癢塌者當歸芍藥炒黃耆川芎各五分白朮茯苓紫草木通防風各三分糯米二百粒上十味水煎服獨參湯治虛弱痘證四日後諸症不穩者人參去蘆一兩生薑五片棗五枚水二鍾煎八分徐徐溫服大人乳母亦服參附湯治瘡痘五日後純陰無陽者人參去蘆一兩真附子一錢或二錢生薑五片棗五枚上以水三鍾慢火先煎熟附子至一鍾半加人參一兩煎一鍾去滓頻頻溫服朱巽曰人參補元氣生津液定虛喘退虛此雖良藥用之不當則殺人然用之舌無黃胎乾燥痘無焦色紫赤方可每用三分五分以至五錢八錢一兩止舌色如常止用三五七分淡白者二錢三錢淡白之極須五錢或一兩膿漿將足舌色漸紅即宜減至一錢五分三分務在隨唇舌之色轉之若痘密色紅四五日不得排膿者十神湯內可加四五分名喚漿法加減排膿湯治血熱痘證服藥後熱症悉退內外和平惟不易長大者用之凡此藥保和元氣活血行滯以助痘成功如前症未除還當服十神解毒不可拘以日程而遽用此也慎之慎之當歸川芎白芍人參初發有勃勃之勢以沙參易用亦可陳皮甘草白芷山楂木通桔梗上十味水一鍾半黃豆廿一粒筍嘴五個煎服不拘時至六日後當易糯米為引膽導法此通大便秘結之良方也不損中氣強如用藥用大豬膽一枚以鵝瓴筒兩頭截齊一頭入膽中線牢扎定吹令氣滿納入穀道中直待氣通取去起脹三日清火用方涼膈散治痘疹表裡俱熱純陽無陰之證大黃朴硝甘草各半錢連翹一錢山梔黃芩薄荷各二錢半淡竹葉五片上八味銼細作一服水一盞煎八分去渣入蜜一匙和勻服或黃連解毒湯合白虎湯亦可黃連解毒湯治心熱如灼煩渴躁悶者黃連黃芩黃柏山梔各等分一方有連翹白虎湯治大渴引飲者知母石膏甘草糯米水煎溫服三乙承氣湯治實熱證壅遏於陽明而胃家實大便秘結者大黃芒硝厚朴各一錢甘草五分上四味水一盞加姜一片煎七分去滓食前服清毒活血湯凡痘色紅紫乾枯或帶焦黑者此湯主之紫草茸家用根當歸俱酒洗前胡牛蒡子木通各六分連翹生地黃生白芍俱酒洗桔梗各五分黃芩酒洗黃連酒炒各七分甘草四分山楂肉八分人參生黃耆八分上共十五味生薑一片同煎煩渴者去參耆加麥門冬酒炒花粉竇氣散治痘血至而氣不至歸附則厚郛殼不長或平或陷不充肥者丹皮荊芥青皮山楂穿山甲牛蒡木通赤芍殭蠶蟬蛻上共十味加蘆筍十株臨服和大桑蟲汁清補用方參麥清補湯氣血虛弱毒氣熾盛瘡色淡白是虛火炎蒸偏難任溫補偏難任清涼者此湯治之清補之良劑也人參八分麥門冬一錢二分生黃耆一錢白葛粉一錢前胡牛蒡子各五分炙甘草三分酒炒白芍生白芍各四分當歸酒洗八分川芎生地黃酒洗各三分桔梗三分山楂肉五分生甘草三分紅花酒洗三分上共十六味生薑一片龍眼肉三個同煎溫服遇此證者此藥頻頻服清毒散治痘先期速干收者生地赤芍連翹去心銀花牛蒡子炒研當歸丹皮甘草生水煎服清涼攻毒飲涼血攻毒飲二方共見放點人參歸耆湯同上參歸鹿茸湯見灌膿白花蛇散方見於後當歸丸方見於後參朮散方見於後七味豆蔻丸方見於後辨灌漿三日痘出六七日諸症順候先頭面行漿半足至六日從口角人中地閣先起先膿振鼎峻之勢至七日從兩腮兩顴眼部山根紅活明潤漿色發綻松之勢虛瘡方爭分光而精神爽快睡臥安常飲食如故小便秘澀大便堅固眼鼻俱封塞音聲清亮微渴者順美之兆也丹溪捷徑曰痘至膿泡乃收功之時手足常要和暖過冷過熱者變也要人事靜煩躁昏悶者變也六腑要元實忽吐利者變也音聲要清亮忽然啞者變也飲食要漸進忽不飲食反大食或大渴者變也或觸風寒或犯禁忌或傷飲食或誤湯丸審察處方可也痘疹要訣日七八九日夫痘灌膿之時先脹先膿後脹後膿漸漸灌滿水沖頂是也若欲知膿之有無先觀氣血之盛衰切須滋補氣血令易膿易靨此最不宜寒涼解毒恐氣血凝滯不能灌漿專以補益之功為要辨灌漿三日虛痘治例痘出四五日期大便一泄則熱氣自散神氣自虛者痘之常候也如便秘熱擁則用托裡清涼責之然火熱全退有出瘡冰硬漿色遲滯者朱氏曰治實熱之痘證過服寒涼而變冰硬或嘔瀉或皮薄漿清或塌陷無神血色不活搔癢煩渴凡有此則唇舌必淡白潔淨大便必不牢固延綿不治則腹脹悶亂寒戰鬥牙死不旋踵矣急宜加減托裡湯主之發始雖為火熱所困氣血虛耗而不甚至虛不甚至寒寒起勢微微證又平準則有宜斟酌治之者襲廷賢濟世全書曰治氣血虛損或觸風邪穢毒使瘡毒內陷伏而不生或出而不勻快此藥活血勻氣調胃補虛內托瘡毒使之盡出易靨參耆內托散主之獨美按內托散之症龔氏所論最為的當但治不虛不實平症之良方也稟賦虛弱之兒有臨痘而氣血平易惟少食窠囊虛餒根暈不收頂陷不起者萬氏曰痘瘡已長六七日膿漿將成之時脾胃弱則氣血衰少不能周灌於身使之作漿虛軟清淡雖有漿亦水而已宜十全大補湯去地黃加木香或參苓白朮散去葛根加黃耆肉桂多服乃佳然脾胃強弱於食多少大便堅利求之如大便滑泄者急宜峻補之陳氏異攻散主之稟賦壯厚之兒出痘稠密里證無故惟有氣血俱為初熱所困不能送毒發透於肌標而不成漿者管氏曰六七日頂陷無膿或服內托藥而暫起不久又陷者貫不滿故也宜內托散倍加參耆當歸煎和人乳糯米好酒服若陽氣虛者加熟附子三分凡痘出至六七日有轉屎氣或腹雷鳴者腸鳴者胃氣敗而穀氣下脫也下氣者五臟氣下陷也是皆內虛之徵也翁氏曰痘出七八日神氣靜氣冷唇舌淡白涕清嘔吐泄瀉不渴少食食亦不化小便清利大便稀溏倦怠昏睡皆裡寒而虛也表裡俱虛寒者用木香散異攻散常看痘變紅綻飲食如常大便堅固為寧發始火褐燔灼大便秘結者與峻涼攻下為貴或以痘密不辨熱之多少謬太過清涼內氣自空及六七日忽然瘡色平陷血澤散漫變虛寒者是皆清涼過深之失也至此雖冀挽回於千一而非猛峻之劑不能收其功矣費氏曰乏其本而漿無所化實則受其虐而化不得行是行漿之理也有當制以泄其過有當助以補其不足不可專以保元為則矣故至七八日灰白錫色漿清或漏出清水頂陷白無血澤神情懶倦語話慵氣虛之證繁多總無烈火灼皮膚者回陽反本湯主之訣曰如用之未及者兼與參附大劑鄭氏痘經曰愚每遇靨後泄瀉不止為灸天樞二穴在臍兩邊各開二寸上肚腹脹加中脘一穴在臍上三寸小腹脹加氣海一穴在臍寸半屢效皆用本兒同身寸若不瀉而腹脹大者脾濕也薏苡仁和尖米作粥食之妙余以為痘中十二日上六日屬熱必禁艾灸下六日屬寒故以七日謂之界限之日蓋氣血領載以逐毒達外內自空虛空虛則生寒當膿期而不漿寒戰鬥牙溏泄頻頻治宜峻補如至八日陽氣尚脫者灸數十壯以回其垂絕元陽以濟其急兼助藥力亦能奏一時之功依錄示諸生痘出稠密中間侵氣虛色淡白無紅暈頂陷者白陷也甚則轉為灰陷此氣血衰耗不能運化毒氣以成漿也聶氏曰痘出五六日內如不順至七八日若膿漿不行亦當用參歸鹿茸湯托之若漿膿不起則無生意矣若有四五分猶可望生又曰如痘色淡白疱不尖圓根無紅暈者氣虛血縮者也必不成膿參歸鹿茸湯主之如氣虛必易寒為虛寒既明加丁桂熟附治之若寒甚而未應者兼與參附大劑痘瘡始終忌瘙癢然有痘症十分凶險已過大半而無凶癢者便可計日以求安矣又有瘙癢吉凶未可知者必視其所發觀其所因詳其情狀察其唇舌究陰陽之妙境以施治法以決生死而已故瘡色及唇舌淡白而大便泄後為癢者屬氣虛治宜溫補如痘色掀發根暈紫赤色燥舌尖赤色中央無胎大小便秘澀而為癢者屬血熱治宜清涼活血又在漿膿時補湯太過則作癢所謂癢乃美兆也以其過於茂也治之宜微行清涼若皮薄清漿毒不化而作癢者為重驗唇舌以決順逆而後治之如內攻外剝血散氣離其癢猛於尋常內攻者氣敗也外剝者形敗也萬氏曰瘙癢之時乍起乍止精神清爽不自抓搔欲人撫摩者生若搔癢無時神氣昏沉胡抓亂舞搖頭扭項者及遍身抓破全無膿血乾枯紫黑色者必死之兆也痘出至漿期諸症順者七日而頭面膿色半足八日而額前頭頂膿色充實至此咽喉微痛聲嘎少嗆水者痘之常候也又有根血散闊或灰白錫光時時瘙癢睡臥不寧或腸鳴下氣者而唇舌淡白虛冷者虛寒也管氏曰七八日期漿不充實不肯結痂而渴瀉寒戰者急與大保元湯不食者加乳汁根不紅者加雞冠血半匙胃寒者加丁子表裡俱虛寒者加附子如及八日證不穩者建中湯主之附峻補一治驗浪華伏見町藥鋪一女兒年僅四歲出痘稠密一醫療之瘡平陷不起突至八朝無膿路以為不治辭之急邀余往視之頭面灰白平塌如干豆皮泄瀉無度寢食不寧虛寒之候悉備余曰此痘診之不犯環跳之部原非逆症也是因其初失治漸致氣虛几上鬼簿挽回之策無他唯在峻補之一手段庶乎死中求生即用大保元湯加官揀參熟附子各五分丁子七粒別以人參一錢熟附八分濃煎兼與至九朝略有松意而寒戰咬牙溏泄未禁轉用聶氏建中湯別湯中加參附一倍兼與如前又與回陽酒一盞令兒醉之迨夜安睡次早寢食凶證半退漿色稍松至十一朝明潤光活膿色勃勃充肥乃以補中益氣湯加桂與之次早精神爽快漸寧貫及十五朝痂疕高突以小連翹飲至甘五朝而全復八九日忽然泄瀉者為虛寒明而有用木香異攻之類而泄利不止漿色虛餒腹脹氣喘陽氣猶脫者聶氏曰寒戰咬牙並起者此真氣外發而內虛寒也宜建中湯大補之或謂寒戰咬牙之症有寒有熱如痘色紅紫齊湧掀發身熱煩躁作渴大便秘小便赤澀唇舌赤色者屬實熱宜清涼蓋胃熱則咬牙肺熱則寒戰也如痘色淡白皮薄頂陷身涼惡寒大小便利煩渴頻頻與沸湯不知熱唇舌淡白者屬虛寒宜峻補蓋胃寒則咬牙肺寒則寒戰以此辨之其症歷歷如懸鑑照物毫無遁形也辨灌漿三日清火治例發始火褐大盛既投清涼至五六日而半解而後有與排膿之劑胃火反燔灼漿窠乾涸及煩渴引飲欲發走馬疳者管氏曰至七八日當貫膿身反大熱而煩渴者白虎湯加天花粉葛根甘草治之如上唇堆腫大便秘者胃火熾也清涼攻毒飲可考參初發熱毒擁遏則宜驗唇舌以清涼解毒若失而不治則結疔毒最忌五處疔痘此處結毒必死五處耳前後心胸心背結喉兩太陽是也慎勿認黑痘作疔使父母驚惶蓋七八日行漿將足而發疔須認黑疔疔或黑而硬或有紅絲發大紫泡未曾解毒者龔氏曰以神功散加雄黃黃芩黃連大黃煎服卻用點法雄黃一錢研胭脂重浸水令濃調雄黃末剔破疔頭以點疔頭立時即紅活神法也又曰治疔痘先以銀針剔破疔頭吮去惡血而以拔疔膏點疔頭即活若貼之未活者四聖膏亦妙也凡治痘之要始解鬱火中清實火終治虛火然至靨期復歸補脾解毒是古人之定法也雖然首尾非峻涼攻下有不可救者餘數年顓志於痘驗數千人漿期與猛峻攻利之證候甚鮮但百中不過五六審驗唇舌以治之費氏曰八九日期至有梟毒烈火血熱之極非不極其清解其烈熱未減紅暈不收膿囊有斂意謹防火褐以致倒靨以清涼攻毒散重加生地黃石膏附首尾用清涼一治驗浪華堂島某一女兒年僅六歲己酉春患痘見苗二日邀余往診之身熱燔灼神昏不食見點深紅如絳二便秘結唇燥舌尖如火中央白胎且燥余曰此症梟炎熾盛表裡俱實不早解其圍則將及危篤即以十神解毒湯加石膏大黃貫至四朝標瘡礬紅而發紫疱因用清毒活血湯去參耆加石膏大黃至六朝身熱稍減次早思食惟面瘡陷不起二醫在傍曰當漿期陷不突者非參耆補托之功安得綻松余曰此痘大便未解者內實也出瘡乾紅滯縮者外實也謬與補益則是愈實實所謂塗附塗者子言是也即以清涼攻毒散倍加石膏大黃及八朝通身略有松意熱毒雖漸解而細察其口舌上齦其黑如煤而濺血余曰此乃走馬疳也舉家驚惶懇請良法乃以金不換和油胭脂塗之以留其血即與清胃瀉火湯加石膏大黃犀角治之九朝漿色半足次早膿漸充肥更投清補之味至十二朝熱復如炮渴煩無休再用清涼攻毒飲倍加生地黃及十四朝宿便快通凶證頓退貫至十八朝更以大連翹飲至三十五朝而全愈如此證候寥寥乎晨星不可執以為常記以備參考爾痘出不壯突而不能成漿者有陰陽之分一屬氣虛一屬血滯只驗唇舌與形色以辨之聶氏曰六七日期氣血流暢則毒化為膿膿之不成其因有二熱氣熾盛則血燥而凝故不能運化成漿元氣耍弱則血寒而縮亦不能運化成膿凡屬氣虛者宜補益排膿若夫痘色紅紫乾枯或帶焦黑者即毒熾而血凝也必不成膿急宜清毒活血湯主之辨灌漿清補治例至漿期氣血虛耗夾熱而不能使毒化漿者此毒氣肆奔潰根血猶附窠囊平塌不突也若與托裡解毒反取過深之失況乃其元氣素虛弱者乎難之又難宜三思焉所謂難任溫補又難任清涼要以清涼之味為良翁氏曰七八日之間毒未盡解於溫補中加解毒熱毒未盡解於補益中兼清涼若偏於燥劑毒盛不能化漿也參麥清補湯主之或八珍湯加黃耆麥門冬痘瘡素血熱太甚至五六日其熱全退窠囊豐突者吉如熱毒未解根血焮赤或水泡清淡空殼者必有發癢之患與以十神解毒一二劑先解其熱而後宜排膿補托孟氏曰八九日漿雖灌而色大紅根腳散漫無一線之紅圍繞者此血熱甚而未解當有九朝十朝發癢之患急宜參耆內托散加蟬蛻木通荊芥白芷火煅穿山甲等藥治之更須令人看守勿令抓破也痘出皮薄清淡至七八日瘡頭一二連串漿水漏出者是謂癍爛又出瘡稠密為片為塌膿水淋漓不幹是謂潰爛一是過表發之失也一是可發表而不善發表之過也萬氏曰瘡頭膿熟潰爛者常候也若未成膿先即潰者此名斑爛斑爛之由病當發散而誤不發散則毒氣閉塞喘促悶亂此可發不發之過也屬表實不當發散而誤發散則毒隨陽氣暴出遍身皮肉潰爛此不可發而誤發散之過也屬表虛此當發而不發與不當發而發之過也治之宜調脾進食令大便順快以養榮衛生肌解毒解發不至冷調養不至熱乃方良法也宜十全大補湯多服之佳訣曰去桂加防風連翹治之如大便秘者以膽導法潤之灌漿三日用方加減托裡湯治實熱之證過服寒涼而變冰硬或嘔瀉或皮薄漿清或塌陷無神血色不活瘙癢煩渴者凡有此等症則唇舌必淡白潔淨大便不牢固延綿不治腹脹悶亂寒戰鬥牙死不旋踵黃耆人參肉桂當歸白芍白芷木香陳皮山藥甘草上十味水一鍾半糯米一撮煎熟臨服時加人乳半盞酒釀數匙同服如痘色灰白平塌者加肉桂附子參耆內托散治氣血虛損或風邪穢毒沖觸使瘡毒陷伏不出或出而不勻快用此活血勻氣調胃補虛內托瘡毒使之盡易收易靨人參黃耆當歸川芎厚朴防風桔梗白芍白芷官桂木香甘草上十二味水一鍾糯米一錢溫服參耆內托散者龔氏所論即治痘瘡之平症而不治險逆之症乎余按此方托裡發解之劑也故二三歲小兒表肌大虛者忌過服愈表虛皮薄變為水泡清淡漏痘而及危篤者多矣千金內托散此方治前證乃於參耆內托散中去桔梗加山楂子生薑一片龍眼肉三個同煎入好酒和服聶氏活幼曰痘色淡白疱不尖圓根無血暈者氣虛而血縮者也必不成膿急用參歸鹿茸湯或千金內托散按此二方其功用不等參歸鹿茸湯托裡滋補之劑也治氣血虛弱而痘失峻突之勢不能化毒成漿者千金內托散托裡發解之劑也治氣血虛損而毒壅遏肌表不能起突化漿者世醫不辨謾執以蹈其過而二三歲小兒有表肌大虛出痘平塌皮薄不成漿者概以托裡發解之藥責之其痘愈虛窠頂平塌致不救者甚多治痘者鑑之記以備參考回陽反本湯治痘瘡氣血虛劇皮薄漿清錫皮灰白虛惕寒戰者人參黃耆鹿茸酒炙銼片用酒煎膏配藥當歸川芎肉桂甘草山楂熟附子上共九味外加大棗二枚共水煎參歸鹿茸湯專托膿之妙劑也鹿茸酒塗炙去毛勿用酥炙恐其膻也三錢嫩綿黃耆蜜炙一錢五分當歸酒洗一錢五分炙甘草六分人參一錢二分上五味加生薑一片好龍眼肉三個同煎去滓入好酒一杯溫服兒若能飲酒濃煎藥汁與酒相半和服亦好虛弱未甚者服此一二劑其痘即轉紅活而行漿如困倦手足冷飲食少者加木香三分丁香官桂各五分寒戰咬牙者再加官桂三分製附子八分泄瀉者去當歸加曲炒白朮酒炒芍藥白茯苓各八分木香丁桂各三分別用參朮散止瀉余按夫脾者惡苦好甘而參歸鹿茸湯六味悉甘調補滋潤之品而腸滑之劑也故稟賦脾胃脆者常易泄若六日後重與此湯則必腸滑泄利內氣下脫窠囊陷塌失起突之勢必然不漿至期隨症欲投此湯者必於本方中加漢術桂丁子熟附與之該宜防腸滑之疴否則溏泄頻以致不漿終難救乎聶氏每用此湯必兼與參朮散以防溏泄是也回陽酒之方治虛寒八九日色㿠白如水泡頂陷根白癢塌咬牙寒戰者鹿茸酥炙大附子曲裹煨去臍嫩黃耆炒當歸酒洗各六分上四味銼好酒煎服訣曰以好酒一合半清水一合半文火煎熬待煎減及一合半頻頻溫服以醉為度建中湯凡至八九日寒戰咬牙甚者此真氣外發而內虛寒故也先用木香異攻之類而無其功者以此湯大峻補之人參二錢蜜炒黃耆三錢白朮當歸各一錢五分川芎八分大附子乾薑炒帶黑色肉桂炙甘草各一錢丁子五分上十味生薑一片同煎溫服一服立止甚者不過二服如收靨後寒戰咬牙者用此方調治如虛寒甚者以參附大劑兼與十全大補湯見起脹木香散異攻散二方共同上參苓白朮散見放苗灌漿清火用方十神解毒湯神功散清涼攻毒飲涼血攻毒飲四方共見放點清毒活血湯見起脹參麥清補湯同上托裡清補湯同上膽導法同上白虎湯見收靨參朮散見丸散部按治痘之窾以唇舌為要然至其妙處不必拘拘猶九方皋之相馬求之於牝牡驪黃之外但此意也難與庸醫言未免向癡人說夢之誚也
