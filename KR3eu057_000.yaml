body:
  text: 跋痘科辨要既成矣先生出示該曰五十年之苦心精力盡在此書子其為我校魚魯帝一匝之誤余捧讀卒業喟然嘆曰夫自後漢建武中南陽徵虜而此瘡染流中國時謂之虜瘡爾來歲彌盛而世益盛暨乎今日國無不傳之國人無不患之人其故何也蓋自古戎狄猾夏莫世無之而今八垓升平四夷來王北無蹶弓之警南無飲馬之報普天熙熙頌聲載路而其所憂唯在乎疾厄痘瘡最為大厄是無乃其獗悍獰惡之氣不能發泄結為痘瘡以窘人焉歟世醫觀其證一患不再觸犯而謂之胎毒或觀闔鄉合村一時傳遷而謂之癘氣其說搏影捕風俱未可謂得痘瘡之真理矣錦橋池田先生家傳明戴獨立治痘之訣舊矣先生深志此術一心專精痘書是誦僚丸秋奕固絶外慕夢寐必於是羹牆必於是蓋五十年一日也其術之妙聲稱藉甚布在世醫之口耳矣先生嘗手製唇舌頭面圖以授門人或至狡焉書賈擬寫粥之其為世醫慕仰如茲矣今又著此書議論沉實考據精確無一言非自親試獨得之胸而流出者矣此書一出吾知世醫慕仰願見而未得見者一旦獲此乎其喜不翅拱璧握珠然後此之謂百代不腐之業矣該辱先生之知周旋倍遊有年於茲醫儒雖道不同乎先生居恆推余以為博洽是書之成又復俾余校之所謂大海添一滴泰山加一塊奚能增減先生之書且古不云乎校書如掃落葉掃盡隨落況余疏懶鹵莽乎古語信不誣矣因書數言置諸卷尾文化辛未秋九月丹波脅山該子郁識芳水武田希顏書
