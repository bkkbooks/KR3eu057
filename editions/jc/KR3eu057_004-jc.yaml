body:
  text: 卷四辨初熱三日夫天象雖雜陳乎推步者見其有條而不紊地理雖雜敷乎堪輿者知其有脈而不斷醫之於痘亦然痘瘡之症千狀萬態不可僂指雖然精究此術者絲分毫析隨症投藥未嘗謬認一症誤投一味也所謂多多益辨者何獨兵耶此之謂通神之手矣又此之謂泣鬼之手矣初發身熱悠悠是宜氣血和平惟熱輕則痘亦輕熱重則痘亦重又有熱重而痘輕者有熱輕而痘重者又熱一日而出者甚重熱二日而出者次之熱三日而出者又次之唯四日而身涼見苗者為稀如火褐大過則正氣不勝邪故面色為昏暗為枯澀為黑滯氣血充榮則面色為潤澤為光彩為淡紅此乃勢之所必至也發始身熱溫和皮膚潮潤面眼無澀萎兩耳如常音聲清亮睡中微悸二便如故及口渴食減貪眠唇舌滋潤者順痘也凶逆者反之先一二日用輕揚發散之藥以取微汗似是而非若同而異此病之所以能感人也小兒痘瘡其初不免乎發熱似傷風食傷驚熱為痘未真是謂疑似雖曰良工而難辨明於是欺世盜名之輩妄言詭辭令父母驚惶失措是可哀哉孟繼孔幼幼集日痘瘡欲出必先發熱目睛黃眵耳後紅紋耳尖尻骨獨冷面色四肢俱赤惡熱而不惡寒此痘疹之所有而傷寒之所無也若夫疑似之間辨認未真先以升麻葛根湯惺惺散探之朱巽痘科鍵曰如初發微熱面色㿠白皮膚柔嫩呵欠竄眼吐利並起精神倦怠自汗者虛證也加減益氣湯主之發始先腰痛者為重症腰者腎之府也乃人身之樞紐諸骨之根柢也故痘家最大忌之腹痛雖惡候亦次之諸書所謂發始先腰腹痛而後發熱者甚重矣先發熱而後覺其痛者險也宜急發其痘如四肢痠痛額前發青氣者為大逆如攻發痛止者無妨聶久吾活幼心法曰有腹痛腰痛而煩悶者此其毒誠重然只當用敗毒和中散主之大便秘則加酒炒大黃微利之發始吐利二證俱非寒也諸嘔吐暴泄皆屬於熱水穀傳化之道路為熱所迫輸送失常吐利並作朱氏曰嘔吐者初緣毒壅於中不能發越也只當發痘瀉屬於脾為毒壅於脾不能上達雖為濕熱下泄亦有分消之義其初出二證俱不可止唯宜發痘主方和解湯加減升麻湯之類宜參考如至三四日猶不止者治之發始發驚搐痘隨出而驚自止者為驚痘吉大抵驚搐雖屬於肝木而痘之驚搐屬於陽明故宜先發痘痘出則止然木能勝土又歸心火相爭脾土不足故也若四日不止者為凶丹溪捷徑曰凡痘發熱有驚搐者以導赤散加辰砂末服之聶久吾曰毒壅盛於皮不能驟發於外而驚搐狂躁者宜用清解散以宣之又血氣虛弱送毒氣不出而驚搐狂躁者宜用溫中益氣湯以托之費建中救偏瑣言曰治痘前驚跌發搐者宜此湯疏肝透毒散主之發始大熱譫語狂言見鬼見神者緣梟炎亂心魂是謂純陽無陰朱氏曰凡見積熱形證一熱即下遲則不能斡旋三日即死矣如其為證發始身熱如炮二便秘結口渴兩睛如血兩耳灼熱煩躁狂妄譫語狂亂唇裂舌胎如粉甚則舌炕惡熱者單下之以胎減為度惡寒者雙下之不可泥在初當發之說此症百中一二不可執以為常如唇舌滋潤者忌妄下殺人主方清涼攻毒飲或涼膈散凡升者提清氣以上達也發者開百竅以四播也俗但知以毒透毒不知升發之義翁仲仁金鏡錄曰實熱壅遏不得達表氣粗喘滿腹脹煩躁狂言譫語睡臥不寧大小便秘毛豎面浮眼張若怒者併為風寒外搏與出不快者同治宜羌活散郁湯主之凡有一日熱而出者有二日熱而出者有三日熱而出者或五六日熱而出者因風寒襲外腠理不疏故也丹溪捷徑曰熱三朝便出者此常期也如過四五日不出者熱綿綿無休歇吉凶之徵未卜也急與解毒托裡分內外因而治之疏者吉外邪壅遏而不易出者此外因也麻黃解表湯主之方發之後所出不多氣候和平無他症者即是瘡本稀不可更發也所謂發不至太過守不至不及乃用藥之圓活也聶氏曰其或增寒壯熱頭痛咳嗽鼻流清涕者多因於外感不可不發散也當視兒強弱而用藥發汗兒體氣素壯實者用加味升麻葛根湯汗之體氣素怯弱者用加味參蘇飲汗之然皆不可出汗太多恐發虛其表後難起脹灌漿也既經發汗而身熱漸緩兒頗安靜者其痘出必稀少此為順候且勿服藥以待之漢唐以來當痘疫流布時不擇大人嬰童一發熱專用升麻葛根湯為治痘疹初熱之定奪然余嘗稽古人之意升麻葛根湯一方蓋治痘瘡之常不治痘瘡之變常者聶氏曰先用升麻葛根湯發之後或身熱不退而煩躁者且勿峻攻姑少待之其或煩悶躁渴而妄語者用敗毒和中散清之如大便秘結者加酒炒大黃微利之是也痘自包孕之地萌動而起未形是謂無極於此為氣虛已明則先可知三禁一勿攻發一勿清涼一勿解毒始終以保元四君之加減治之翁氏曰治虛證痘證以元氣為主元氣充實則毒易出易化故善治痘者惟保元氣於虛弱之前使不致於耗散為貴然其治法一曰實腠理而固肌表二曰節飲食而保脾土肌表固則外陷之患不足慮脾土實則下陷之患不足憂更加以參耆補益之功夫痘有輕重人有強弱治有緩急不可不辨然挽回調劑古人必按痘之形色而後推敲故施之於緩者則可其重且急者痘雖未形而兒體之生命已在涉春冰而蹈虎尾其痘未及見則毒雖猛而尚未有定位火雖烈而尚未及燎原此誠轉危就安之機起死回生之會也宜用攻發解毒之劑治之如及悶痘定位形色已凶則梟炎不易破矣況形以氣見色以血呈凶顯形色逆亦非淺虛實同然補瀉用法唇舌是准矣戲猴出痘嘗聞俗諺野猴患痘其歲闔鄉出痘必稀曏者余在岩島偶見友人畜野猴教以戲技一日猴乍伏臥不起與物不食且如驚搐狀翌日面上磊落生小皰子五六粒殆如血靨痘狀余問之於狙公乃云此即痘也按聶久吾曰胡地極寒其人無屋居鮮火食冒風霜犯冰雪腠理秘密若禽獸然即有胎毒尚為別症不能宣發於皮膚而為痘疹是以胡人不出痘今野猴遇乎畜養失其山野之性不冒風霜不犯冰雪熟食褥臥與人同居故觸遇疫氣遂致然歟抑亦不知野猴皆患痘瘡而人不逮見之歟記以備參考冀世醫諒余苦心至此而已初發三日用方升麻葛根湯初熱發解痘疹之良方古方三日前後用之升麻葛根芍藥甘草各等分上四味銼細水一盞煎七分去滓溫服無時一方加羌活和解湯古方三日前後用之升麻芍藥葛根人參川芎防風羌活甘草各等分上八味生薑三片水煎溫服加減升麻湯無論痘與非痘但見嬰兒身熱呵欠煩悶睡中驚悸嚏噴眼澀鼻出氣粗手足痠軟即宜與服如有雜證再兼雜證藥治之升麻乾葛芍藥甘草前胡紫蘇當歸連翹桔梗上九味水一鍾半姜三片蔥白三寸煎服取微汗為度如有汗當以小劑疏發之敗毒和中散發汗之後或身熱不退而煩躁者且勿峻攻姑少待之其或煩悶躁渴而妄語者此散清之連翹牛蒡子各等分酒炒黃連枳殼炒各七分防風荊芥各五分桔梗四分前胡五分升麻紫草茸酒洗家用根蟬蛻去頭足小川芎各四分木通五分甘草四分麥門冬去心八分共十五味大便秘澀者加酒炒大黃一錢二分微利之不秘者勿加服此覺煩悶少解即止勿服聽其痘出外則中自安也導赤散凡痘發熱有驚搐者服之木通生地黃防風薄荷上燈心引共五味煎服加辰砂未可也或加蟬蛻牛蒡子清解散治毒氣壅盛於內不能驟發於外而驚搐狂躁者防風荊芥蟬蛻小川芎各四分升麻五分甘草三分酒炒芩連木通各六分桔梗四分前胡乾葛各五分紫草茸家用根六分山楂肉八分牛蒡子連翹各七分上共十六味生薑三片同煎溫服溫中益氣湯治血氣虛弱不送毒氣出而驚搐狂躁者人參白朮炒各五分黃耆生八分當歸酒洗白茯苓各六分炙甘草川芎各四分白芷防風各三分南木香官桂各二分山楂肉六分上共十二味生薑一片大棗一枚同煎一服中病即止疏肝透毒散殭蠶炒四分蟬蛻二分薄荷二分鉤藤六分青皮七分木通三分前胡六分山楂二錢羌活四分荊芥三分加燈草一分姜二分水煎溫服按氣血虛弱而表虛汗多者勿用羌活散郁湯專治實熱擁盛郁遏不得達表者防風羌活白芷荊芥桔梗地骨皮川芎連翹甘草紫根草大腹皮鼠黏子上十二味為粗散水一鍾燈心十根煎六分溫服麻黃解表湯治勞苦之人皮膚粗厚腠理閉密及外感風寒其痘被外邪所遏而不易出者麻黃去根節酒炒黑升麻羌活葛根防風大力子炒荊芥甘草蟬蛻桔梗上十味各等分水煎入燒人糞同服加味升麻葛根湯此一方即是傷寒之劑痘疹服之發汗亦無妨白粉葛一錢升麻八分芍藥六分小川芎四分甘草三分山楂肉八分牛蒡子炒香五分桔梗防風各三分蘇葉五分上十味生薑三片同煎熱服取汗加味參蘇飲用虛弱之嬰童為痘未明而發熱者人參三分蘇葉五分小川芎桔梗前胡各四分陳皮甘草各二分白茯苓五分粉葛八分半夏制三分牛蒡子制四分山楂肉六分上十二味生薑三片同煎熱服取汗惺惺散發熱疑似之間辨認未真先以此湯探之人參白朮白茯苓天花粉桔梗細辛炒甘草薄荷各等分上八味水一鍾姜二片煎服加減益氣湯治一發熱遂頭溫足冷不渴便溏面色㿠白或瀉利青谷嘔食不化兼身熱呵欠等症乃氣虛也黃耆沙參一日後易人參甘草當歸川芎五日後宜去之白朮陳皮升麻洗酒少許桔梗上九味水一鍾半姜一片煎服取暖為度停滯腹痛或瀉酸臭加山楂面蘖不停滯而唯腹痛瀉酸臭加乾薑芍藥驚悸加天麻鉤藤磨安神丸同服嘔吐去桔梗加煨乾姜瀉泄不止去當歸加肉豆蔻兼與豆蔻丸四肢冷加乾薑肉桂有汗去升麻桔梗加肉桂倍黃耆產後出痘加赤地白芍木香肉桂氣虛毒壅者加蟬蛻地丁清涼攻毒飲涼膈散二方共見放苗安神丸七味豆蔻丸二方共見於後辨見苗三日諸證嘗謂痘初見點便顴顏色榮枯蓋皮膚黃紅白而明瑩者氣血相旺也然推察頭面之諸位以預知吉凶悔吝之由左頰屬於肝右頰屬於肺正額屬於心下頦屬於腎鼻屬於脾正額者太陽脈之所會唇頰陽明脈之所經兩耳兩傍少陽脈之所過夫痘為陽毒故隨陽而見於面也然陽明胃與大腸積陳為朽氣血俱多故先於口鼻兩傍人中上下兩腮年壽之間先出先脹先漿先靨者吉反之他處先見者為險為逆矣先現一點血其色淡紅而大者稀紅赤而小者密也敷點既定貴圓淨而嫌破碎貴高聳而嫌平塌貴稀疏而嫌稠密唯出要參差耳後項頸心胸少於他處為佳眉稜兩顴額前先潤不滯為妙蓋放苗三日而生死判然候之其關竅全在面部面諸陽之會天庭印堂為第一最面部吃緊處出痘首尾不過論氣血毒三者夫元氣者以胃氣養之故能食脾胃健固則元氣勝毒應期收功故一二日先見四五日先長七八日先漿十十一日先靨若不能食者毒勝元氣則內攻外剝為逆如痘碎密而黯灰空瘡者即死症也凡眼部以下先見二三相連出唇舌紅潤滋潤者毒無內擁朝見點而暮礙手色淡紅滋潤而身熱漸減者吉兆也痘已出成形者氣也成暈者血也兩者均可驗吉凶決生死世醫何專言血而不及氣氣無形難見血有形易見故診氣血之法痘窠尖圓光活者氣之充拓也根暈收緊紅活者血之榮養也故見苗色乾枯涸澀者血虛也頂陷不突者氣虛也塌陷者氣離也根散者血離也灰白者氣滯血衰也焦褐者血枯也黑者毒滯而血乾也紅變白白變黃者生紅變赤赤變紫紫變黑者雖作窠而毒沉伏也發始四日必死見點隱躍覆沒者六日必死辨虛痘治例凡見點淡白者屬氣虛過赤者屬熱毒吐瀉者屬內虛便秘者屬內實汗出如濡者屬表虛肌膚乾枯者屬表實謂之初發之六候唇舌滋潤者氣血和平唇舌淡白者氣血衰損唇舌赤色者熱實也唇舌乾燥者毒火盛也唇舌燥裂者毒火燎血中白胎通明者梟炎甚於中然唇舌微旨亦有多端舉其一二以示之凡舌三十六品為病舌二變為七十二舌三變為一百四十餘舌蓋三變決生死如響之應於聲唇十八品亦依此例也雖然唇舌之候秘藏累世不敢妄傳若欲得之則宜入余門以請焉凡痘證有似虛反實者有似實反虛者變證百出千形萬狀若欲體認變幻先須知三項翁氏曰氣虛之證初發身熱手足厥冷乍涼乍熱精神倦怠肌肉㿠白飲食減少四肢倦怠睡臥安常便清自調虛症無疑未見點前用參耆飲加輕揚發散如紫蘇防風白芷見點之後用參耆飲加川芎桔梗見點四日之後重用參耆飲隨病加減處治夫痘有純虛者有純實者有先實而後轉虛者有先虛而後轉實者惟宜斟酌要隨唇舌治之丹溪捷徑全書曰痘瘡出形如平日皮肉正色者吉若痘常帶豔豔者說文好而美也而赤其後多致癢塌不可救也凡帶豔者防後日塌癢之變為一急著宜用疏風固表消毒之藥使氣血充實邪火漸退正氣不虧光松干收如期不亂可也固陽散火湯主之翟繆類編曰色白皮薄者必用固陽散火湯主之去荊芥生地加白朮茯苓各五分凡放苗僅有數粒色不甚紅亦不甚白身體溫和神情清爽不暗慮者為順然其囊窠累日不見粗肥皮薄不起者宜防日後倒陷之患管橓保赤曰初出一二日灰白頂陷不起或起亦軟而不礙手根窠不紅活身涼而靜此虛寒證也人參歸耆湯主之氣滯者少加木香發熱見點之時吐瀉者莫妄用澀藥毒在上焦者宜吐而解毒在下焦者宜泄而解毒在中焦者即從吐瀉而解但宜發痘如至出齊期而不止者宜止之孟氏曰千錢買痘前瀉蓋言熱隨利減也若痘見點已定而吐瀉不止者恐損脾胃當用人參調中湯七味豆蔻丸主之發始有心氣虛弱而毒在胸中嘔吐不止水食不入者須急吐之如當吐而不吐則必死吐法忌瓜蒂豆豉之類必動內氣轉生煩劇朱氏曰有可吐者吐之吐中有發散意存焉滴水不入毒壅氣道者宜吐之飲食停痰形色生變陽氣鬱遏也宜吐之氣虛多汗者則忌吐方用法口訣附可吐一治驗浪華阿彌陀池雛僧年十一歲出痘於甲辰之春初熱悠悠至出齊期嘔吐不止始事醫兩三子以半夏瀉心或小半夏加茯苓之類其吐愈劇而加以唾血相俱驚惶以為不治辭去已至五朝邀余往診之煩悶不寧水食下咽即吐時發狂妄狀如醉酒或歌或笑神氣困憊終日不寢面色㿠白痘苗隱隱欲出不出且唇淡紅舌白胎通明手足微涼便是元氣虛弱不能發越毒邪於皮膚而毒在胸中也治法宜吐不早圖之則必至噬臍幸任余所處則百無一慮滿坐大喜仍用家法吐藥探之則吐白沫二三口神氣略快再吐之則思食貪眠乃用補中益氣湯加減與之已至六朝精神爽睡臥寧痘囊發峻突之勢至七八朝漿色勃勃紅暈光澤諸症順美十二日而全愈因書以為握匕者之一模云痘已出實熱末盡解而早用溫補則熱毒蘊蓄轉至煩劇細察其形詳驗其色識見不真先迷嚮往之途聶氏曰察其痘形淡淡在皮下不見紅活唇淡面白或帶青脈亦遲緩雖煩躁驚狂譫語亦是血氣虛而送毒氣不出者也溫中益氣湯主之氣虛痘症父母能守禁忌醫用藥不誤調燮順候則元氣充實腠理堅固脾胃強健飲食如常二便清調不問已出未出之證先以氣虛為施治之要朱氏曰凡一發熱遂頭溫足冷不渴便溏面色㿠白或瀉利青谷嘔食不化兼身熱呵欠等證乃氣虛也宜益氣湯加減與之或錢氏白朮散加黃耆四日後去葛根加黃耆肉桂辨見苗三日清火治例一日熱即出者是謂火里苗痘如連串為叢者必作稠密其痘原屬氣虛宜急退其熱當詳視其大密之中根窠分與不分顏色松與不松及其元氣虛實年紀大小若元氣實年力大者痘雖稠密而無畏慮只要飲食費建中曰放點不一日烈熱干炮帶火而出不論稀密色紫豔或焮紅其他可知此梟毒烈火及早圖之不致日後內潰急用攻毒清肌發透不可以初見而翫忽也清熱解毒湯或清地退火湯主之一發熱已出未出之時先精究頭面六十之部位辨認出形之美惡以成終始之計是痘家之權機也蓋山根年壽鼻兩傍人中上下兩腮兩頤之間乃陽明胃經脈與太陽脈之所統也故放苗陸續既出火熱未減面上一片發紅赤色惟山根鼻準人中兩腮兩頤之間帶㿠白色者必於腸胃之間有壞濁梟垢宜急下之訣曰其證腰腹大痛者逆症也不治若腰腹不甚痛者宜早圖之十神解毒湯加大黃石膏微利之泄利膿血穢垢數合而腰腹痛止者吉若三四日期誤失下則遍身瘡色慘黯凝澀不起發不灌漿待靨期而致不濟焉頭面六十之部位其詳見於前卷矣凡臨痘為奇怪之狀者悉皆由神元不足也否則夾蛔之證乎宜詳驗之丹溪曰凡痘發熱有所妄見而譫語者或昏昏好睡夢中言語喃喃者或狂妄欲走循衣摸床者皆毒氣內攻神識不清故也急用鎮神解毒之藥辰砂導赤湯主之人事清爽神彩復舊者生若連綿不止者魂魄將離之兆也一二日既熱欲放苗而鬱不成窠粒者或已熱先從手足見點者或已熱頭面放點如蚊點蚤斑者或已熱遍身處處如堆粟或已熱頭面手足痘苗已見已沒而變紫黑者必死是曰五惡痘又有似此證而非者宜精察之切不可以模稜之伎倆而誤人凡稟賦氣血虛劇神元不足者臨局火毒必入心經四臟紊亂梟毒沉伏不能發透於肌肉而遍體悉病故面色慘黯枯萎額前發青氣心煩躁悶痘形不現是曰鬱伏不早圖之則待三日六日而死翁氏曰發始痘點略見已黑陷倒塌乾枯不起不作窠粒者急宜奪命五毒丹唯實熱未解者宜於初熱見苗四五日之間與之是也夫痘貴紅潤而惡嬌嫩貴淡紅而嫌赤紫貴一色而不好二色三色蓋嬌嫩與血熱相類不可不辨嬌嫩屬虛血熱屬實不可妄以嬌紅者認為血熱治之殺人不少宜驗唇舌以辨之翁氏曰初發已身發壯熱腮紅臉赤毛焦色枯已出未出三日已前痘點煩紅痘色與肉色無異煩渴欲飲睡臥不寧小便赤澀大便秘結此血熱也並皆十神解毒湯所能治也凡臨局躁亂非常或有作危怪者世俗不知以為神奇懇祈巫祝而不延醫坐視其陷鬼錄孟氏曰痘瘡發熱見點之時亂言狂語見鬼見神尋衣摸床昏睡不醒此皆毒氣內攻心神不清所致宜導赤散加連翹黃芩犀角木通或牛黃丸抱龍丸辰砂益元散使小便流利精神清爽痘亦漸出方望生意若昏倦軟弱不省人事口語喃喃不休者不可治矣痘症甚猖獗舉證言之凶險繁劇無所施治其間有一二屬可治者豈忍棄之當於此時膽力不雄則不見其功宜不惴三軍輕扛萬鈞然後臨之廬詵痘疹要訣曰痘發之時言語精神狂燥悶者此心火消燥肝血以致神不守舍狂亂如見鬼神外症紅紫焦燥壯熱不寧所謂純陽不陰之證也退火回生散主之即退火回生丹也翁氏曰治血熱枯澀痘欲出火熱太盛面眼兩耳俱赤忽然筋抽白吊者熱毒壅遏於內也翟氏曰幼兒欲出痘發熱至二三日全無痘點形影忽然而發驚搐狀與急驚風一樣者此亦毒氣壅遏不能宣發所致宜用清解散以宣之若時醫不知是出痘誤作急驚風施治或單以寒涼投之以驅痰峻藥下之其兒必死如又發熱如炙而發驚厥二便秘結渴煩太盛口氣粗手足熱痘色紫豔乾紅唇舌燥裂或舌胎乾燥者清涼攻毒飲主之凡毒火衝突血分則為血熱矣或痘出不分地界鋪紅肆溢或眼赤如朱或迫血妄行有從口鼻而出者有從大小便而出者有從大肛而下數升者有從瘍瘡之頂而出者痘或焮紅或紫豔或發血泡或發紫泡是皆因毒火猛烈也謂之悶痘諸書所謂痘之失血唯自鼻出者屬可治其餘雖皆絕證亦有百中一二得生者費氏曰放苗小水有如醃魚汁者有如紅花膏者然以涼血攻毒飲大黃為君加桃仁每劑和大桑蟲日服二大劑袁氏全書曰桑蟲起腎肺毒沉伏者其功甚妙也別煎和藥汁用之凡大便一日一次為調一日二次為利二三日不上廁溷為秘欲驗痘之順逆以大便通與不通為虛實之候魏直曰若夾毒初出色赤如火乃毒滯不宣發之故也當以四順清涼飲一服大便去一二次而斑或退則血附氣位即以四君子湯加黃耆薑棗進之如利不止可以肉豆蔻丸即止痘內遍身有碎小密如芥子者此夾痧而出也如有肉色鮮紅成片成塊者此夾斑也皆是毒火太盛薰蒸於內故一齊湧出早宜清涼解毒聶氏曰有夾斑而出者有紅赤點而無頭粒多隨出而隨沒又有夾丹而出者紅赤成片如雲頭而突起此皆毒火浮游散漫於皮膚之間也遇此者不必驚惶惟用玄參升麻湯一二劑散其遊火其斑丹自退又有夾麻疹而出者用前法加桔梗酒炒黃芩各六分令麻𤺋先退痘瘡自當起發附痘內夾痧一逆證東府一侯家公子年才三歲染痘於戊午二月上旬一夜發熱次早忽然左手腫如瓜已過曲池眾醫不韻其事而妄療之驟然驚搐無度煩悶非常三日使人延余往診之身不甚熱而時搐時白吊吐利一兩行面色㿠白頭汗如濡唇舌淡紫神情恍惚眉宇不宣照燭觀之左手掀腫如白疹者如有如無隱隱似迷頭額兩頤赤點如蚊咬蚤斑者隱躍於皮下矣是非難認眾皆疑之余曰是即痘也是甚為逆無策可施唯待屬纊凡左手先掀腫者痧證也痘夾痧出而速退者梟邪自解否則痘毒郁遏不宣不能發越於肌標是謂鬱伏古來絕無治法明四日應告變侯殷勤請治余峻辭之乃進敗毒和中散二貼侯問曰今夜何如曰無慮矣凡痘鬱而不出者三日斃其期在明日翌日果然發始可下而不下必死矣痘出二三日大熱大便秘者若下之少遲則煩躁不定胃爛口臭口角流血白睛紅赤腹脹喘滿身發紫皰而死矣所謂痘瘡首尾不可下之說又一偏之見也若唇舌滋潤者雖見危證忌妄下必殺人費氏曰發始已放點有唇裂掀腫甚有焦黑如煤或口中穢氣不堪或舌起芒刺此毒火犯胃急宜重以清火涼血解毒必攻之瀉黃納穀散加大黃主之或清涼攻毒飲可參考如伏火伏毒燥炙於內煩躁悶亂身無暫安放而痘苗反如水珠所謂揚湯止沸不如灶底抽薪凡痘內火燔灼則須急投清火以撲滅火褐焉其痘自松突焉朱氏曰痘出若瘡白起㿠色唇舌赤紅非虛三日後漸變紅紫尚作虛治誤人不淺急宜清涼解毒清熱解毒湯甚者清涼攻毒飲可參考凡痘瘡初出當視其相去遠近多少何如相去三五寸一粒者必輕而稀勿服藥如相去一二寸者頗密隨痘治之如三兩成叢而出者必密而重其後多變癢塌費氏曰若皮中窠粒雖不甚多色紅不至於紫而地界不分身熱未退者宜托裡清涼或神功散加蟬蛻地丁如唇舌赤色白胎者加酒炒黃芩黃連凡小兒發頭瘡或原有遺毒日久不愈而因近鄰痘瘡傳染既觸痘氣忽然發熱患痘者為甚重若痘輕稀則十中可救一二重則必死朱氏曰凡患頑瘡未愈或新愈而見點者此陽毒也有頑瘡已愈後其嫩皮出瘡攢聚如堆粟者是肌表毒延漫出非內毒之所為也故謂之陽毒但瘡不幹收不枯燥雖重不死初發時勿攻發只宜費氏清熱解毒湯如痘得潤松必易起發如諸證平準者用法如常見苗三日虛證用方參耆飲乃保元湯專治元氣虛弱精神倦怠肌肉柔嫩面青㿠白飲食少進睡臥寧靜而不振者不分已出未出者皆服人參一錢黃耆二錢甘草五分初熱生用出定炙用上三味用水一鍾姜一片煎四分不拘時服未見點前加紫蘇防風白芷見點之後加川芎桔梗見點四日之後重用此湯隨病加減處治若四五日間手足厥冷冰硬不起加丁子肉桂黃耆川芎固陽散火湯痘瘡出形如平日皮膚正色者吉若瘡色常帶豔而面色赤其後多癢塌而不可救也但見帶豔者即防後日癢塌之變用此湯治之人參黃耆甘草歸尾升麻葛根連翹防風生地木通荊芥上十一味水煎服一方色白皮薄者去荊芥生地加茯苓白朮各五分如與此湯豔色已退者唯補益氣血為要人參歸耆湯治痘頂不起血不紅活雖為漿而皮薄色白氣血不足證黃耆一錢五分人參一錢甘草八分當歸一錢川芎一錢官桂三分山楂八分紅花酒洗白朮糯米水洗八分上九味姜一片水煎溫服如氣滯者少加木香人參調中湯若痘見苗已定而吐瀉猶不止恐損脾胃兼與七味豆蔻丸或參苓白朮散類人參黃耆炙白朮甘草木香白芍酒洗陳皮上七味水一鍾棗一枚煎服錢氏白朮散治因吐瀉脾胃虛而出不快者人參白朮茯苓木香藿香乾葛甘草上七味水煎服補中益氣湯治氣虛出不快者黃耆二錢人參白朮當歸柴胡升麻陳皮各一錢甘草五分上共八味生薑煎服清火用方清熱解毒湯治痘放點乾紅色滯壯熱煩躁者山楂二錢滑石三錢前胡七分地丁四分黃連六分荊芥穗紅花蟬蛻木通各三分牛蒡一錢丹皮青皮各七分生地二錢加燈心一分上共十四味水煎服清地退火湯凡痘不退熱而出名為火里苗急用此方以退其熱則後無青黑干陷之患地骨皮一錢地膚子九分牛蒡子炒研七分柴胡一錢五分紫草根八分用糯米汁水制過乾葛連翹六分當歸五分木通三分蟬蛻二分上共十味外用姜一片水煎服如熱不退再服一劑或制末藥燈心湯下亦好或加犀角汁十神解毒湯治遍身發壯熱腮紅臉赤毛焦色枯已出未出三日已前痘點煩紅躁渴欲飲睡臥不寧蓋嬌紅與血熱其色相類嬌紅屬虛血熱屬實若小便赤澀者此熱盛也並皆治之當歸生地黃紅花牡丹皮連翹川芎赤芍藥桔梗大腹皮木通上共十味心印有甘草已上並用燈心十四根水煎溫服身熱壯盛加葛根前胡毒盛綿密加荊芥鼠黏渴加天花竹葉滑石小便尿血加犀角山梔大便黑加犀角黃連或桃仁吐血乾嘔加黃連犀角發紅斑加犀角黃芩黃柏山梔子玄參小便赤加山梔唾血加犀角黃連茅根小便短澀加豬苓澤瀉小便秘加滑石瞿麥大便秘加枳殼前胡大黃煩躁加麥門冬天花粉煩渴狂亂譫語加知母麥門冬石膏咽喉痛加甘草鼠黏子荊芥嘔加橘皮泄瀉加豬苓澤瀉防風毒壅血熱者加蟬蛻地丁導赤散治內攻心神不清者木通生地甘草各等分淡竹葉三十葉一方有麥門冬上四味水一鍾煎服加連翹黃芩犀角木通牛黃清心丸抱龍丸辰砂益元散退火回生丹可兼與已上四方見於後辰砂導赤湯譫語狂言見鬼神皆緣熱毒亂天君用之安魂魄莫聽巫師多誤人矣人參白茯苓黃連炒山梔仁炒石菖蒲木通麥門冬辰砂別研牛黃別研上七味燈心引水煎入竹瀝調辰砂牛黃末同服若因蛔厥見此證者宜黃連安蛔湯清涼攻毒飲治痘瘡大熱如火紫豔深紅煩渴顛狂者此湯主之石膏三錢至一兩黃連一錢至三錢大黃三錢至六錢木通紅花荊芥穗各四分牛蒡一錢五分犀角磨汁三分生地三錢至一兩丹皮一錢青皮七分地丁一錢加燈草一分共十三味水煎涼血攻毒飲治痘毒火內伏煩渴躁亂身體反涼痘色紫滯礬紅徹夜無眠者此湯主之大黃二錢荊芥五錢木通四分牛蒡丹皮紫草各一錢赤芍八分葛根七分蟬蛻四分青皮七分生地四錢紅花四分加燈心一分共十三味水煎服如失血甚者大黃為君加桃仁每劑和大桑蟲日服二大劑四順清涼飲治裡熱大便秘者當歸白芍大黃甘草上四味銼細水一盞煎七分去滓食前服如便泄後諸症穩者四君子湯加黃耆薑棗進之如利不止者加肉豆蔻止之玄參升麻湯治初發夾斑丹疹出者玄參升麻各二分甘草八分防風荊芥大力子各六分上六味水煎溫服有夾麻疹而出者用此湯加桔梗酒炒黃芩各六分令麻疹先退痘瘡自起發瀉黃納穀散治痘邪熱犯胃唇口燥裂口中膩渴甚至舌起芒刺嘴黑如煤漿後身猶壯熱而不思食者此湯主之石膏黃連生地丹皮木通炙甘草生甘草牛蒡山楂荊芥穗上十味重者加大黃外加燈心水煎清補用方托裡清補湯治氣虛毒壅者人參黃耆當歸川芎厚朴防風桔梗白芍白芷木香牛蒡子地丁黃芩酒炒甘草上共十四味水煎溫服九味神功散此方初出而稠密紅紫或帶焦黑色者可用宜不拘時服之黃耆生人參赤芍紫草根生地紅花前胡大力子各等分甘草減半上共九味銼水煎溫服熱甚者去參耆加酒炒黃耆黃連若大便秘者加酒炒大黃有驚搐者加蟬蛻溫中益氣湯見初熱四君子湯見起脹案善治痘者猶輪扁之劉輪得之乎手而應之乎心雖有數千百之方法也至其妙處究竟在乎心會意領而已讀者切無守株待兔膠柱鼓瑟而可也
