body:
  text: 卷一窮玄夫醫之為技難於眾流而痘之為治難於他病何則痘之所患大率恆在小兒問焉不通其意察焉不由其脈乍起乍收變遷倏忽轉瞬之際死活之機分焉自非通變之手孰能治之雖然通變之妙非有他道生平研窮煉鍛然後臨局則其處置之方無往而不得其宜也此之謂通於神之玄機矣莫謂漿期無涼瀉莫謂初發無溫補通神應變必俟其人言筌之跡特傳其常階梯而已雖然不知常則不能應變不知變則不能全常苟知此義則治痘之術思過半矣辨熱因夫人稟性於天地而萌氣焉資氣於父母而成質焉際乎此時未曾無淫火之毒故世歷今古人閱千萬無有免此難者也蓋淫火釀於有形之前必發於有生之後遇於歲火太過疫毒流行則痘毒亦隨流布故痘之發也必先火熱而後見苗經曰少陰有餘則病皮痹癮𤺋何則君相二火太盛則五臟百骸莫不振動以故淫火與時氣相感觸火毒遂中於其中而外注於皮毛所以痘未見苗而先發熱也古語曰五穀不熱不透實痘疹不熱不透徹不其然乎但火熱太過者真元爍熱氣血不及者陽明繁劇故痘之呈見特顧熱之淺深如何而已蓋上古簡質未有痘名唯以風候言之故病源候論有傷寒豋豆瘡或時氣皰瘡之目又名天瘡以其為天行疫癘也肘後方又有天行斑瘡之名今案諸家論雖歸罪於淫火胎毒但以瘟病之藥投之則其為疫癘之屬明矣且古有豋豆等病而今無其證則今之疱瘡即古之豋豆瘡而異其名者歟或謂痘瘡之火本起於腎又曰腎在腑下沉匿不受穢濁何以知起於腎之由此皆杜撰之見不足論矣吾曼公先生訣曰疫毒客乎前陰後陰之際直侵大腸膀胱之絡傳與命門相火相激灼爍腎窖而梟炎猛極熔冶氣血之伏毒內則振動五臟百骸外則徹透肌肉皮毛然後呈見痘形也且夫心腎二者統少陰之脈故相火熾則君火亦隨熾矣而肺為皮毛之合肺金為火熔治則干激皮膚干激皮膚則皮膜自麻痹焉故痘雖萌芽而不知痛癢蓋人發諸瘡疥則或痛或癢不可忍者生人之常也特以皮膚干激之故而不覺知耳余家不言痘瘡之原但以其見症論之蓋自古一患不再患則可謂胎毒乎又闔村閤家傳染則為疫癘亦宜嘗謂淫火食穢之二毒內畜稀少則為害亦微而其偶稠密者氣血為此虧損加以疫氣之深毒所以致有險逆之症也痘之順逆無他在胎毒之稀稠與疫氣之深淺也爾矣凡稱疹者多種痘疹麻疹風疹斑疹癮疹膚疹是也蓋𤺋者謂初發赤點隱躍皮下而不作粒者乃疿瘡也諸瘡皆異其形今稱痘者從疹而起逐日為粒其形狀肖豆故曰之痘而痘疹連稱者提其總稱也又少陽子曰痘也者豆也因其形之類而為痘之名也蓋豆字聖劑總錄始作痘字凡為醫者宜就其名而考其症庶幾瞭然於心目之際矣辨面上位部夫痘疹陽毒也諸陽皆聚於面吉凶善惡最易見焉額屬心火如印堂以上髮際以下橫兩日月角位先見紅點先漿先靨者凶也左臉屬肝右臉屬肺如兩臉見紅點磊落者吉如相聚作塊其肉硬腫者死頦屬腎承漿橫抵兩頤先見紅點者吉鼻屬脾土若準頭先出先靨者凶腎之竅在耳又云心開竅於耳心腎皆少陰君火也又少陽相火之脈行耳之前後凡耳輪先見赤點者凶惟口唇四圍先出先起先靨者大吉陳序山曰天有五星地有五嶽人有五形俱在頭面布列以此視痘猶雖射楊葉乎百步之外而無不中不必待養由基也面部八隅三停圖靈樞曰頭為清陽之府故天庭印堂君主之官山根兩顴輔將之職手足卑賤之相也如天庭輔官之瘡平塌灰白焦枯黑陷則君主危君主危則十二官皆危但手足卑賤雖危又或無妨所謂顴額焦枯休歡喜腿臁水泡莫慌張者是也兩臂脾經之軸也兩膝腎經之軸也此處起發灌濃尤可充足如見苗先自手足始者必凶勿治之矣又以氣色辨之額角流霞火熱尤甚鼻梁紫紋肝腎病紅紋心病青紋肝腎病黑紋腎病黃紋脾胃病白紋肺病額前紫赤痘終不起矣辨面部諸位配合口訣身熱候面色上停微紅明潤者吉中停無黯色光亮潮潤者吉下停無滯色明亮活潤者吉又上停先放苗者逆也中停先放苗者險也下停先放苗者順也蓋頭面為諸陽之會印堂輔官為諸陽之首故命宮出瘡多少乃吉凶悔吝之所以系焉當現一點血時明究五臟六腑之部分推察其部氣血盈虧之微詳辨其痘色紅白紫黑乾枯明潤之狀配合面上六十位以考內證平不平而不以切脈加之精驗唇舌之轉色則治痘要機不在於此而何在焉哉面部諸位配合圖辨面部六十位夫頭面陽會之地印堂一名命宮此部為諸陽之首命門之標乃神明之所藏也故出痘密則不吉稀則周身首尾悉順美矣一發熱而後痘先出於面之下部面頤為順兩頰為險額先出為逆臉屬心部兩臉瘡如形則下部痘如桃花紅必美潤而無損兩顴心經之部未至七八日顴骨痘先灌漿則生全之兆嵩岳鼻也五嶽皆在其中五嶽之痘紅潤吐石榴花則手足亦順美自顴骨以上皆充灌滿足縱下體凶逆而不灌亦無妨舌上舌下生黑疔名曰捲簾此心經梟毒邪熱所發必死五嶽之地勢穹窿痘必於此先見乃陽毒之正傳也必吉兆瘡稠密者不論部位經絡之上下先後一齊出現者凶猶萬馬之齊奔其中天痘先出天痘或曰疫癘痘余痘隨出故凶多也六七粒相連出者為遊蠶兩顴心部也痘必成椒皮而難救治三四相連出者為疊錢痘必難鼎峻青田肝部也目上下四五連出者為凶不可有哀猿聚泣青帝殺門座於兩眼眶肝之關也兩眼胞上浮綠色氣血充順吉兆也眼為肝竅氣血之宗必貴封蛤肝榮花易充若見灰煤應死兆如流清淚痘必順美眼乃肝之關若眼眶紫黑則梟毒攻衝肝木受傷凶兩眼不封則五氣散而痘不起稀則不妨瘡密而眼不封則傷肝而枯竭額間肺部也痘如黃豆之疏綻吉兆也額鼻地閣為三鎖痘若美麗名為狀元額以上俱肺部額之方廣宜空隙左太陽屬肝右太陽屬肺宜空地兩眉間宜稀少如密則神魂飛去雙霞繁霞彩霞者在兩眉梢之上橫連可看與兩陽相近如痘疏朗則六腑無虧損之失氣血調和而吉鼻肺竅也鼻封須逐去蜥蜴言竅中生梟毒竅煤黑而聲亦啞者肺絕必死喉咽肺之樞也脅疼咽燥則毒攻腸胃而聲必啞宜逐脾毒清肺金玄壁腮宮俱脾部痘如金錢懸珠則身必安放吉慶之兆兩天倉在眼角之上屬肺兩食倉在唇之上屬脾如痘稀朗則五經傳注無他證吉兆也兩頤脾部也痘出色如梅花白形似魚鉤脾土受傷必多泄瀉難收兩腮堆錢則脾傷而泄瀉之危難免宜速治之腮頤脾部也倒珮之形此棄痘也脾土崩壞口上下唇瘡多為雙鎖痘形相鎖主不食而死諸痘未膿熟唇先熟唇硬鋪板黃則水竭而土崩之患不免沿口起水泡則臍封亦虛泡而脾土壞口脾竅也臍脾關也兩食倉脾部也痘如蟢窠則脾氣弱有嘔吐瀉逆之危正額間疏黃豆必雙林無叢木方為全美之兆額肺部也鼻胃部也地閣脾部也是名三鎮各一顆高竦為狀元鼻柱胃部也痘如盤珠之形最吉之徵額顴鼻地閣為五嶽痘形稀朗如北斗美麗之象鼻準鼻沖年壽俱胃部流裔灰煤紫泡俱梟毒主凶交骨耳邊前一寸腎部也痘忌遊蠶紫黑則必凶地閣放點不可先發乃腎之軸也若先發則痘必灰煤黑陷腎為玄武門兩耳腎之極也故作腎窖之外候已出痘而耳先枯萎者凶兩耳如堆粟及如火者亦凶兩耳欲灌急乾枯或耳輪為塵痕者皆凶耳生黑疔者名豢虎凶多吉少顴臉遊蠶痘見椒皮必凶一鵠衝心氣呵欠者必凶痘也淚堂如椒實盤屁者大凶之兆水形鼻柱蛔蟲攻敵半死半生鼻直如煤少陰蒸郁多凶年壽紫泡梟毒入天門必凶痘苗齊而人中投轄者凶可生人中司命之堂不宜有梟毒方廣崇高空片者吉之兆也眉心廣橫云遮冥路者危痘不治兩陽地位憑虛屬吉左陽肝右陽肺張兔羅眉上看青灰黑色必凶之兆項頸盤蛇梟毒易峻發凶之兆兩倉豐溢五經自順相為之吉地閣榮枝忌峻發必可稀痘必少痘欲出天柱先垂折者凶發熱雙唇灑血珠者必凶梟紅罩錦胸口纏珠者凶症食倉蟢窠脾君受困吐嘔數聲凶症難治先大人之所示家秘六十圖訣者明驗面部五嶽七竅諸位及部分之出苗以占順逆險之模範也所謂一百六十樣者並言遍體手足之出形也故候痘瘡者以面部為第一他處次焉面部六十位圖辨七日五傳腎心脾肝肺五者一二日梟毒發腎傳於骨髓二三日傳心血脈之分三四日傳脾胃肌肉之分四五日傳肝筋之分五六日傳肺皮毛之表而靨焉七八日膿盛漸至干收而愈否則必成壅滯煩劇凡十五時有一傳司天以十二日為一候金木水火土應五藏三陰三陽應六府也辨氣血盈虧凡臨痘時先觀顏色之榮枯顏色如榮潤氣血相旺枯澀氣血相衰故熱蒸者貴和緩而嫌寒熱貴安靜而嫌煩躁色者貴紅活而嫌慘黯貴微紅而嫌紅赤貴光彩而嫌黑滯苗者貴淡紅而嫌赤紫貴圓淨而嫌破碎貴高聳而嫌陷伏貴稀疏而嫌稠密皮者貴厚實而嫌虛薄貴緻密而嫌滲漏根者貴粗緊而嫌細散貴明潤而嫌暗淡膿者貴渾濁而嫌清淡貴飽滿而嫌干空貴黃黑而嫌光洞痂者貴厚突而嫌薄塌貴紫潤而嫌焦黑瘢者貴桃紅而嫌粉白貴光澤而嫌赤紫其出要參差其形嫌不齊凡氣血平準則痘分陰陽根腳收緊為窠者氣也為暈者血也故痘之所要是元氣也元氣充實則血亦隨之猶良將之下無弱兵也其理然矣辨四項口訣夫氣者陽而無形神為之主故浮沉聚散使外成窠天圓者陽之德也夫血者陰而有形重濁象地故灌注滋潤使內成暈紅活者陰之德也夫毒者為陰為陽而依氣血盛衰而為之梟焉若氣血衰弱而無製毒之力則毒氣肆虐焇爍臟腑或水漬氣血若火毒燔灼則火極而兼水之化魂魄遂歸黃泉焉夫元氣者為一身之主宰乃一元天之氣也光明健剛者天之元氣也淫濕滋養者地之精華也故陽勝則陰虧陰勝則陽虧常不宜偏勝虧久則物病相齊則物平也在人則胃中發生之氣也是為元氣之本始矣故胃氣和而能食則元氣固於內而諸症自順美也書云頂尖圓便是氣根紅活便是血毒則痘中頂上之黑是也血載毒氣逐毒痘毒依氣血而發凡痘窠尖圓起突者氣之充實也根腳收緊潤澤者血之榮養也痘出定而後天地位極天地位極而後紅白兩分頂白根紅者陽內而陰外也蓋頂白者血為水水化為膿黃轉為黑此毒解之徵也蓋榮衛者氣血之德也氣血者痘毒之廬也痘毒者氣血之賊也榮衛之德盛則力戩其賊則廬舍全榮衛之德衰則賊肆其虐而廬舍剝血不能載則塌氣不能拘則陷故治痘調補氣血血生則內固氣益則外旺也凡看痘必先看元氣元氣所在非有非無惟心領意會而已如形色初善而後變惡者元氣內竭也形色初惡而後歸善者元氣內強也元氣本也形色末也故善治者未嘗不察本末之理矣凡看元氣之強弱惟在觀氣血盛衰與痘之圓陷榮枯耳蓋面顏發黃紅白色及唇舌紅潤者即五行之精華發見肌標而氣血相旺元氣固內之驗也是為以外知內之圭臬矣凡痘稟賦虛弱而表裡共虛臨局而熱微毒稀易出易長已至起發之期不能攝續氣血而出瘡平塌失綻突之勢初善而後變惡者神元不足故也若稟賦氣血並壯厚則痘雖為初熱所困而出瘡凶險至六七日多有起松鮮明者是素脾胃壯健而神元固內故也凡治痘先以形色候外以唇舌候內是常理也乃於其際拋出精力以辨認之則心通於神諸症熙熙宛在目中矣凡窠頂堅厚光壯者氣之足也根暈潤澤肌肉明榮者血之足也內外俱無壅滯則諸症順美反之險逆二症並見矣辨神氣口訣書云時醫之見泥於形色不知形色變遷由內症故外症雖輕內則神氣昏亂睡臥不安飲食不入夾症疊出頓將生變凡五藏之氣實則五內七竅共壯實五神精華發見於外而瑩明活動者謂之神氣心肝脾肺腎位於內耳目口鼻位於外合之為九神即精華也所謂形色者言痘瘡也臨期而內症平則遷變呈吉內症不平則遷變為凶故治痘之要在察九神之微妙耳又候痘有痘神氣神形神之秘訣痘神者痘出而成分珠尖圓明潤根暈紅活勃勃發鼎竣之勢者謂之有痘神也反之頂陷平塌根血散闊乾涸枯萎者無痘神也氣神者心情爽快寢食無故其所意領不異於常言語對於人事物應於心者謂之有氣神也反之譫語妄談心志昏亂終日無安放者無氣神也形神者身體溫和起居安靜手厭屈伸痛癢忍其苦二便覺其時衣被自節厚薄房中自避風寒者謂之有形神也反之遍身不護手足無所安措躁亂非常舍衣摸床面顏慘黯及天柱折搖頭弄舌者無形神也苟備三神則諸症順美不藥自痊若失三神則凶險必立至焉蓋痘粒輕少而神氣昏亂者本為稟賦之虛故也一發熱面㿠白皮膚柔弱神情懶倦飲食減少大便易泄氣血衰弱不能送毒驟達於肌標而放苗遲滯不齊則凶惡疊出速將告變矣痘毒停留臟腑擾乎神氣則痘標雖輕其毒不能盡泄於外將反攻於內矣或火毒未解亢盛於中則神氣為之不安故不旋踵將變為枯涸矣蓋痘毒壅鬱臟腑則五神困於內故煩躁悶亂二便秘澀寢食不寧而夾症並起益擾神明如與托裡解毒之劑而不松突則內攻之兆將至矣或痘出至三四日而火毒未解梟炎亢盛五內焇爍而內外乾涸則出瘡乾紅或干滯焦紫頂陷不松但神氣為火熱昏憒無暫安放若唇舌赤色中央白胎如積粉二便秘結者內實也急與清涼攻下之劑若唇舌滋潤者又宜別議矣若外症雖重內則神氣清爽睡臥安寧此即毒已出於臟腑或為鬱熱不疏或為風寒外襲致毒停留肌肉之間不能盡達於標故痘或不起脹指五六日或不成漿指七八日或氣血未交毒亦不化以藥攻之則復能振起或發腫毒或作臭爛而收功焉以此觀之形色其烏可泥哉故神與氣痘之本也形與色痘之標也苟不辨標本而治之則譬如治絲益棼焉得使患者霍然起也乎凡外症重者言出瘡稠密者然神氣爽快寢食無故則五臟六腑共無壅滯也但毒熱壅標風寒襲外而毛竅不疏故毒停乎肌肉之間而不盡發見也急以托裡攻表劑發之則內外自鬆解痘自峻突焉如至七日而氣血不交則不灌漿不灌漿則必不可為矣又虛弱之痘症至五六日熱毒不全解者以清補之味治之至七日而漿未起者急宜溫補氣血使漿提起若熱毒未盡解者於補托之中加清涼是即治痘之權衡也若至九日膿漿未充實者餘毒鬱伏於肌肉皮毛之間然胃氣壯健能食者至十日後發腫毒或作臭爛而得生者十中六七夫推究治痘之妙境則以唇舌對於內以形色察於外為大緊要雖然是非人之所能知焉況乃至變通之玄微以形色候內以唇舌候外者乎夫然後赤水之珠不待罔象而可探得也爾
