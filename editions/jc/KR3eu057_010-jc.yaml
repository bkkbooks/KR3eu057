body:
  text: 卷十方選初發三日用方升麻葛根湯初熱發解痘疹之良方升麻葛根芍藥甘草上四味水煎服和解湯發始三日前後用之升麻芍藥葛根人參川芎防風羌活甘草上八味生薑水煎服加減升麻湯無論痘與非痘嬰兒身熱先宜與之升麻乾葛芍藥甘草前胡紫蘇當歸連翹桔梗上九味姜三片蔥白三寸煎服取微汗敗毒和中散治發汗之後身熱不退而煩躁者連翹牛蒡黃連酒炒枳殼防風荊芥桔梗紫草蟬蛻川芎前胡木通升麻甘草麥門冬上十五味水煎大便秘者加酒炒大黃導赤散治初發為痘未明而驚搐者木通生地黃防風薄荷上四味燈心引煎服加辰砂末可或加蟬蛻牛蒡子清解散治毒氣壅盛於內不能驟發於外驚搐者防風荊芥蟬蛻桔梗川芎前胡葛根升麻甘草黃芩黃連共酒炒紫蘇木通牛蒡子連翹山楂肉上十六味姜三片同煎溫服溫中益氣湯治血氣虛弱痘瘡難發出而驚搐者人參白朮黃耆生當歸茯苓甘草炙川芎白芷防風木香官桂山楂肉上十二味生薑一片大棗一枚同煎服疏肝透毒散治平素肝氣盛臨痘驚搐不止者殭蠶蟬蛻薄荷鉤藤青皮木通前胡山楂羌活荊芥上十味加燈草一分姜二片水煎服按氣血虛汗多者不用羌活散郁湯治實熱擁盛郁遏不得達表者防風羌活白芷荊芥桔梗川芎地骨皮連翹甘草紫草根大腹皮鼠黏子上十二味水一鍾燈心十根煎六分溫服麻黃解表湯治皮膚粗厚腠理閉密及外感風寒不易出者麻黃升麻羌活葛根防風荊芥蟬蛻大力子桔梗甘草上十味水煎入燒人糞同服加味升麻葛根湯此方傷寒之劑痘疹服之發汗亦無妨白粉葛升麻芍藥川芎甘草山楂肉牛蒡子桔梗防風蘇葉上十味姜三片同煎服取汗加味參蘇飲治虛弱之童為痘未明而發熱者人參一二日代沙參蘇葉川芎桔梗前胡陳皮甘草白茯苓粉葛半夏牛蒡子山楂子上十二味姜三片同煎取汗惺惺散發熱疑似之間辨認未真先以此湯探之人參一二日代沙參白朮茯苓天花粉桔梗細辛少甘草薄荷上八味水一鍾姜三片煎服加減益氣湯治一發熱頭溫足冷不渴便溏面色㿠白嘔食不化者黃耆人參一日代沙參甘草當歸川芎五日後宜去之白朮陳皮升麻酒洗桔梗上九味姜一片水煎服取暖見點三日虛痘用方參耆飲元氣虛弱精神倦怠肌肉柔嫩面色㿠白飲食少進睡臥寧靜而不振者已出未出皆治之人參一錢黃耆二錢甘草五分初發生出定炒上三味用水一鍾姜一片煎四分服未見點前加紫蘇防風白芷已見點後加川芎桔梗固陽散火湯治瘡色嬌豔皮薄者人參黃耆歸尾升麻葛根連翹防風生地木通荊芥甘草上十一味水煎若色白皮薄者去荊芥生地加茯苓白朮人參歸耆湯治痘頂不起血不紅活者黃耆人參甘草當歸川芎官桂山楂紅花白朮上九味姜一片水煎服如氣滯者少加木香人參調中湯見苗已定而吐瀉不止宜用此湯兼與豆蔻人參黃耆白朮甘草木香白芍陳皮上七味加棗水煎服錢氏白朮散治因吐瀉脾胃虛而出不快者人參白朮茯苓木香藿香乾葛甘草上七味水煎溫服補中益氣湯治氣虛出不快者黃耆人參白朮當歸柴胡升麻陳皮甘草上八味姜一片同煎服一方加官桂見點三日清火用方清熱解毒湯治痘苗乾紅色滯壯熱煩躁者荊芥紅花蟬蛻木通牛蒡丹皮青皮生地山楂滑石前胡地丁黃連上十三味加燈心水煎服清地退火散火里苗痘宜用此湯火里苗痘詳於論中地骨皮地膚子柴胡葛根蟬蛻牛蒡子紫草根連翹當歸木通上十味加姜水煎服或加犀角汁十神解毒湯治身壯熱腮紅臉赤毛焦枯已出未出肉色與瘡色無異血熱甚者當歸川芎生地黃紅花牡丹皮連翹桔梗赤芍藥木通大腹皮上十味用燈心十四根水煎服導赤散治內攻心神不清者木通生地甘草各等分淡竹葉三十葉上四味水煎服一方有麥門冬辰砂導赤散譫語狂言見鬼神熱毒亂心神者人參白茯苓黃連山梔仁石菖蒲木通麥門冬辰砂別研牛黃別研上七味燈心引水煎入竹瀝調辰砂牛黃清涼攻毒飲治痘瘡大熱如火紫豔深紅煩渴顛狂者石膏三錢至一兩黃連一錢至三錢大黃三錢至六錢木通紅花荊芥各四兩牛蒡子一錢五分犀角磨汁三分生地黃三錢至一兩丹皮一錢青皮七分地丁一錢上十二味加燈心一分水煎服涼血攻毒飲治毒火內伏煩渴躁亂身體反涼痘紫滯礬紅徹夜無眠者大黃二錢荊芥五分木通四分牛蒡子丹皮紫草各一錢赤芍八分葛根七分蟬蛻四分青皮七分紅花四分生地四錢共十二味加燈心一分煎服如失血甚者大黃為君加桃仁每劑和大桑蟲汁日服二大劑四順清涼飲治裡熱大便秘者當歸白芍大黃甘草上四味水一盞煎七分食前服玄參升麻湯治初發夾斑丹疹出者玄參升麻甘草防風荊芥大力子各六分上六味水煎服如夾麻疹者加桔梗酒炒芩連各六分令疹先退痘瘡自發瀉黃納穀散治痘邪熱犯胃唇口燥裂膩渴甚至舌起芒刺嘴黑如煤漿後猶壯熱而不思食胃爛發斑症石膏黃連生地丹皮木通炙甘草生甘草牛蒡子山楂荊芥上十味重者加大黃外加燈心水煎清補用方九味神功散治初出稠密紅紫或帶焦黑色者黃耆生人參赤芍紫草根生地黃紅花前胡大力子各等分甘草生減半上九味水煎服熱甚者去參耆加酒炒芩連如有驚搐者加蟬蛻托裡清補湯治氣血虛弱兼毒壅者人參生黃耆當歸川芎厚朴防風桔梗白芍牛蒡白芷地丁黃芩酒炒甘草共十三味水煎溫服起脹三日虛痘用方大保元湯治頂陷根窠雖紅而皮軟且薄血有餘氣不足者黃耆炒二錢人參一錢五分甘草炒一錢官桂五分白朮炒一錢川芎一錢上六味加薑棗水煎服氣滯者加木香山楂去肉桂不食者加人乳半鍾木香散治療灰白表虛內虛泄瀉腹脹者桂心青皮木香腹皮人參赤茯苓前胡訶子半夏丁子甘草各等分上十一味每服五錢姜三片水一大鐘煎六分服異功散治痘表虛塌癢內虛泄瀉腹脹喘急悶亂煩渴寒戰咬牙頭溫足冷者木香肉桂當歸人參白朮陳皮厚朴丁子茯苓肉果已上各七分熟附子半夏各五分上十二味每服五錢生薑三片棗二枚水一大鐘煎六分溫服術苓調脾散治脾氣虛弱飲食不化泄瀉者白朮炒白茯苓各五分白芍酒炒神麯甘草炙各五分白扁豆姜浸去殼炒八分砂仁炒香附子製厚朴上九味煨姜三片大棗一枚同煎或加人參益黃散治脾胃虛寒者陳皮一兩丁子三錢青皮甘草炙訶子半兩上五味水一盞煎六分一方加木香三分四物湯治氣至而血不榮者當歸熟地芍藥川芎各等分上共四味加人參麥門冬水煎溫服四君子湯治血至而氣不充者人參白朮白茯苓各等分甘草減半上四味加黃耆肉桂川芎生薑一片棗肉一枚水煎服十全大補湯治氣血俱不足本方中合無價散用之無價散方見於後當歸川芎芍藥生地人參白朮茯苓甘草黃耆肉桂上十味薑棗水煎服加味四聖散治痘瘡已出五六日不能長不生膿或癢塌者當歸芍藥黃耆川芎各五分白朮茯苓紫草木通防風各三分糯米一百粒上十味水煎服獨參湯治虛弱痘症四日後諸症不穩者人參去蘆一兩生薑五片棗五枚水二鍾煎八分徐徐溫服嬰兒乳母俱服大人亦可服參附湯治瘡痘五日後純陰無陽者人參去蘆一兩真附子制熟者一錢或二錢生薑五片大棗五枚上以水三鍾慢火先煎熟附子至一鍾半加入人參余藥煎一鍾去滓頻頻溫服加減排膿湯治血熱痘證服藥後熱症悉退內外和平惟不易長大者當歸川芎白芍陳皮人參初發有勃勃之勢以沙參易用亦可甘草白芷山楂木通桔梗上十味水一鍾半黃豆二十一粒筍嘴五個煎服六日後加糯米膽導法此通大便秘結之良方也用大豬膽一枚以鵝翎筒兩頭截一頭入膽中線牢扎定吹令氣滿納入穀道中直待氣通取去起脹三日清火用方涼膈散治痘疹表裡俱熱純陽無陰之證或黃連解毒湯合白虎湯服之亦可大黃朴硝甘草各半錢連翹一錢山梔黃芩薄荷各二錢半淡竹葉五片上八味水一盞煎八分去滓入蜜一匙和服黃連解毒湯治心熱如灼煩渴躁悶者黃連黃芩黃柏山梔各等分上四味煎服一方有連翹白虎湯治大渴引飲者知母石膏甘草糯米上四味水煎候米熟服三乙承氣湯治實熱壅遏於陽明而胃實大便秘結者大黃芒硝厚朴各一錢甘草五分上四味水一盞加姜一片煎七分食前服清毒活血湯治痘色紅紫乾枯或帶焦黑毒盛而血凝不成膿者紫草根當歸前胡牛蒡子木通各六分連翹生地黃生白芍桔梗各五分黃芩酒炒黃連各七分甘草四分山楂肉八分人參生黃耆八分上十五味生薑一片同煎煩渴者去參耆加麥門花粉竇氣散治痘血至而氣不至郛郭不長或平或陷不充肥者丹皮荊芥青皮山楂穿山甲牛蒡子木通赤芍殭蠶蟬蛻上十味加蘆筍一株臨服和大桑蟲汁起脹三日清補用方清毒散治痘不至期欲干收者生地黃赤芍連翹金銀花牛蒡子當歸丹皮甘草上八味煎服參麥清補湯氣血虛弱毒熾盛瘡色淡白虛火炎蒸偏難任溫補偏難任清涼者此湯主之人參八分麥門一錢二分生黃耆一錢白葛粉一錢前胡牛蒡子各五分炙甘草三分紅花酒洗三分芍藥酒炒四分當歸酒洗八分川芎三分生芍藥四分生地黃酒洗三分桔梗二分生甘草三分山楂肉五分上十六味生薑一片龍肉三個同煎遇此症者頻頻服之灌漿三日補益用方加減托裡湯治實熱之證過寒涼而變冰硬或嘔瀉或皮薄漿清或塌陷無神血色不活瘙癢煩者黃耆人參肉桂當歸白芍白芷木香陳皮山藥甘草上十味水一鍾半糯米一撮煎熟臨服時加人乳半杯酒釀數匙同服如痘色灰白平塌者加熟附子三分參耆內托散氣血虛損或風邪穢毒沖觸使瘡毒陷伏不出或出而不勻快者用此活血勻氣調胃補虛內托瘡毒使之盡易收易靨人參黃耆當歸川芎厚朴桔梗白芍白芷官桂木香甘草上十一味水一鍾糯米一錢溫服千金內托散治前症即參耆內托散方中去桔梗加山楂子生薑龍眼肉三個同前入好酒和服以上二方俱托裡發解之劑也回陽反本湯治痘瘡氣血虛劇皮薄漿清錫皮灰白虛惕寒戰者人參黃耆鹿茸酒炙銼片用酒煎膏配藥當歸川芎肉桂甘草山楂熟附子上九味外加大棗二枚共水煎參歸鹿茸湯托膿之妙劑鹿茸酒塗炙去毛三錢綿嫩黃耆蜜炙一錢五分當歸酒洗一錢五分人參一錢二分炙甘草六分上五味加生薑一片好龍眼肉三個同煎去滓入好酒一盞溫服兒若能飲酒濃煎藥汁與酒相半和服亦好如困倦手足冷飲食少者加木香三分丁子官桂各五分寒戰咬牙者再加官桂三分製附子八分泄瀉者去當歸加曲炒白朮酒炒芍藥白茯苓各八分木香丁桂各三分別用參朮散止瀉回陽酒方治虛寒八九日色㿠白如水泡頂陷根白癢塌咬牙寒戰者鹿茸酥炙大附子去臍嫩黃耆炒當歸酒洗六分上四味銼好酒煎服煎方有訣建中湯治八九日寒戰咬牙者按四五日後寒戰咬牙者用木香散異攻散治之如至八九日不止者以此湯大峻補之人參二錢蜜炙黃耆三錢白朮當歸各一錢五分川芎八分大附子制乾薑炒帶黑色肉桂炙甘草各一錢丁子五分上十味生薑同煎服如虛寒甚者以參附大劑兼與收靨結痂用方保嬰百補湯治痘瘡九十日後漿充足而無他症者當歸芍藥地黃白朮人參茯苓山藥甘草上八味水一鍾加棗二枚煎服或九日午後無餘症者補中益氣湯合生脈散用之有訣小連翹飲治九十日痂疤厚突無故者此乃補脾滲濕之藥中微加解毒之方也當歸芍藥白朮茯苓防風連翹荊芥甘草減半上八味水煎服氣虛者加人參溫表調中湯痘至九十日當靨不靨身涼手足冷唇舌淡白者宜用此湯黃耆蜜炙二錢人參白茯苓白朮官桂川芎當歸炒乾姜各一錢防風八分白芷丁子熟附子各五錢上十二味生薑一片同煎服五苓散治飲水過多致水漬脾胃而瘡不收者豬苓澤瀉白朮茯苓肉桂各等分上五味水煎服生脈散此滋生精氣培養真元補心潤肺之良方人參三錢麥冬三錢五味子十五粒上三味水煎溫服黃芩加半夏湯治初發二三日之內熱毒未解而蛔厥者黃芩一錢五分甘草炙一錢白芍六分半夏二錢上四味大棗二枚生薑一錢水煎服如蛔厥作凶者加烏梅川椒理中湯治痘出五六日後變虛寒而蛔厥者人參白朮乾薑炒甘草減半上四味水煎服如蛔蟲屬寒者加烏梅川椒黃連炒少許若虛寒甚者加熟附子三分汪氏解毒飲十一二日發熱當靨不靨及痂落無托靨者此湯主之當歸酒洗芍藥人參山楂黃耆蜜炒荊芥牛蒡子炒研防風各二分炙甘草一分上九味煎服若陽症者加黃連或有餘熱加黃芩連翹柴胡若陰症者加肉桂清神散火湯收靨之後毒從外解反又驚搐者此湯主之木通麥冬玄參黃連梔子仁甘草上六味燈心引水煎研辰砂末調服大便秘者加酒炒大黃自利者加人參犀角解毒湯治十日後壯熱不結痂雖結不實狀如蠟滓不幹者生地黃牡丹皮犀角梢芍藥各一錢五味子七粒連翹牛蒡子炒玄參甘草各三分人參一錢二分上十味水一鍾半煎六分或三分不拘時服大連翹飲治十二日後發熱壯盛胸腹手足頭面俱熱大便秘澀餘毒太盛者連翹牛蒡子柴胡赤芍防風各八錢木通當歸荊芥車前子滑石黃芩酒炒山梔酒炒甘草蟬蛻各五分上十四味生薑一片同煎服大便秘者加酒炒大黃一錢忍冬解毒湯痘痂初褪大局無慮疤少榮潤熱欠清和防餘毒竊發此湯主之金銀花土貝母甘菊荊芥牛蒡子紅花甘草木通連翹地丁上十味外加胡桃煎服若大便秘者兼與四順清涼丸羚羊角飲治餘毒不解上攻眼目生翳羞明眵淚俱多紅赤腫痛者羚羊角磑研黃芩黃耆生草決明車前子升麻防風大黃芒硝上九味水煎涼肝明目散治痘後羞明者當歸龍膽川芎蜜蒙花柴胡防風黃連酒製上七味各等分雄豬肝煮湯煎服一方加蟬蛻清胃瀉火湯治口疳者連翹桔梗黃連梔子黃芩玄參升麻生地薄荷甘草葛根上十一味水煎服或加犀角石膏若大便秘者加酒炒大黃甘露飲治虛弱口疳者麥冬天花粉天門茵陳生地熟地枳殼枇杷葉石斛黃芩甘草上十一味水煎服若欲作走馬疳者宜清涼攻毒飲當歸桂枝湯治痘後手足忽然拘攣不能屈伸運轉者當歸酒洗白芍酒炒川芎甘草桂枝黃耆蒼朮制黃柏酒炒上八味水煎服如感寒骨節痛加羌活防風如氣少加川烏引經再加人參五加皮湯治痘收之後或面目虛浮四肢腫滿者五加皮蒼朮桔梗木通防風桑白皮姜皮豬苓澤瀉上九味水煎服厚朴湯治腹脹如鼓目胞微腫者厚朴陳皮蒼朮大腹皮白茯苓豬苓木香上七味水煎服傷於水濕者加澤瀉滑石車前子傷於食物者加神麯山楂三稜莪朮枳實喘者加葶藶杏仁虛腫者萊菔丸治之方見於後四苓散治痘中過服飲水而痂後腫滿者白朮茯苓豬苓澤瀉各等分上四味加燈心滑石水煎黃氏湯治痘收之後衛弱而汗出者人參黃耆黃連炒甘草桂枝上五味水煎服當歸湯睡中汗出寤則乾者此湯主之黃耆當歸生地麥門白芍炒甘草炙上六味用麩麥為引豬心以竹刀批開煮湯溫服導赤解毒湯痘後昏昏喜睡連日不醒口中喃喃自語或睡而復醒形如醉人妄語者此方主之茯神木通生地麥門山梔仁人參石菖蒲甘草節上燈心引九味水煎化斑湯治麻疹色紅及痘後斑丹者人參知母石膏牛蒡子連翹升麻地骨皮淡竹葉甘草糯米上十味煎服一方加玄參地黃小柴胡加地黃湯治赤火丹瘤其毒紅腫作痛者柴胡人參黃芩各三錢甘草炙二錢生地黃半夏各二兩上六味生薑三片棗一枚水煎服又治痘癰玄參化毒湯治痘後赤火丹瘤者玄參歸尾酒洗紅花連翹石膏赤芍地骨皮防風荊芥木通各等分上十味加淡竹葉水煎服女子出痘用方瀉肝散治女子出痘發熱之時經水適斷憎寒壯熱神識不清熱欲入血室者羌活六分當歸一錢山梔龍膽各五分川芎防風各八分大黃蒸三遍六分上七味煎服一方有木通柴胡黃芩無大黃若從發始大便秘者宜四順清涼飲涼血四物湯初發熱之時經水非期適來者宜急用之止血發解痘瘡芍藥當歸生地黃芩紅花酒洗黃連酒炒連翹牛蒡子炒甘草上九味水煎服柴胡四物湯治初熱經水方斷而血分空虛邪毒乘虛侵衝脈者柴胡人參黃芩當歸川芎生地白芍地骨麥門知母淡竹葉上十一味水一盞煎七分溫服當歸養心湯治女子出痘經水忽行暴音不語者人參當歸麥門甘草升麻生地黃各等分上六味加燈心水煎服涼血解毒湯治女子出痘經水非期當發熱時而至者當歸一錢二分白芷五分升麻四分紫草一錢五分紅花一錢赤芍一錢桔梗八分連翹一錢燈心二十根上九味水煎重身者禁之調元內托散痘起發泡漿之時月事大來瘡當起不起漿當灌不灌頂平形塌或白或黑陷者急宜以此方治之黃耆人參當歸桂枝木香青皮赤芍大力子川芎上九味水煎服如虛者加熟附子安胎如聖散孕婦出痘最要安胎此湯主之條芩白朮歸身連翹砂仁炒研枳殼甘草大腹皮陳皮桑樹上羊兒藤上十味水煎服安胎飲初熱既退諸證平準者此湯主之好人參白朮黃芩熟地川芎當歸芍藥砂仁紫蘇陳皮甘草上十一味薑棗共水煎服安胎飲治痘出定後無餘證者人參陳皮大腹皮白茯苓砂仁白芍藥紫蘇香附子甘草上九味外加糯米煎服如有汗去紫蘇加生黃耆胎漏者加阿膠百草霜番紅花雜方敗毒散初發疑似之間用之無妨前胡柴胡獨活天麻地骨皮薄荷甘草上七味生薑水煎服桂枝葛根湯治感風寒表實無汗者葛根桂枝赤芍升麻防風甘草各一錢上加生薑三片淡豆豉一錢煎服寒月加麻黃參連湯治發熱疑似之際發驚搐者沙參二分黃連五分上二味以沸湯煮散與本方交與之荊防敗毒散發熱為痘未真先用此湯探之防風荊芥羌活獨活柴胡前胡薄荷人參桔梗枳殼川芎茯苓甘草上十三味生薑水煎服羌活湯治痘瘡兼肝熱者羌活川芎防風山梔龍膽當歸各等分甘草減半上七味加薄荷淡竹葉煎連翹升麻湯治身熱如火瘡勢稠密者連翹一錢升麻葛根桔梗甘草各七分白芍五分薄荷少大力子一錢木通八分上九味加淡竹葉燈心煎服甘桔湯治痘瘡首尾咽喉痛者甘草二錢桔梗一錢加黃炒大力子一錢水煎於本方之間兼服之利咽解毒湯治前證山豆根麥冬各一錢玄參桔梗各七分大力子防風甘草各五分上七味生薑水煎服涼膈攻毒散治熱毒壅於上焦胸膈煩悶壯熱者大黃黃連石膏荊芥地丁玄參當歸甘草各等分上八味水煎服涼膈散治上膈積熱口舌生瘡煩渴者大黃朴硝甘草各等分連翹一錢梔子黃芩薄荷各二錢半淡竹葉五片上八味水煎入蜜溫服堅腸湯治痘中間泄瀉不止者黃耆炙白朮炒黃各一錢山楂七分川芎二分陳皮留白三分升麻酒炒三分肉果麵裹煨去油一錢上牙棗三枚煎服一方治鐵殼空痘有一等當七八日間充實飽滿挨摸不破者不可認作好痘以致後悔宜用酒煮麻黃一錢生附子一分再加托裡之藥未變令成爛痘如此則屬可治否則乾枯牢封如鐵石必死保元神聖湯治痘六七八九日漿不充滿或水泡吸肉連皮不起者人參三錢黃連蜜炙三錢當歸去尾酒洗三錢肉桂五分鹽酒炒真殭蠶去絲嘴炒二錢防風一錢甘草五分薄荷五分丁子五分如寒戰木香五分無寒戰咬牙不加上八味水一鍾半加糯米三十粒燈草一十根蓮心二十枚煎至一二小盞不拘時服如痘灰白咬牙者加童便煮過附子一二片加味連翹飲即於小連翹飲中加木通黃芩酒炒大力子炒蟬蛻各等分當歸連翹飲治痘後牙齦腐爛口臭沖人者當歸川芎連翹生地防風荊芥白芷羌活黃芩山梔枳殼甘草各等分細辛少上十三味水煎服或加石膏大黃犀角汁清上防風湯治遍身痘痂悉落而頭面痂痕陷入肉中日久不脫或目翳半退未全愈者防風荊芥連翹黃連黃芩薄荷芎藭白芷桔梗山梔仁枳殼甘草上十二味水煎食後服入竹瀝或有目病者加木賊石決明黃連地黃湯治痘後過三七日大渴膈消者黃連生地花粉五味子當歸人參葛根茯苓麥門去心甘草各一錢上十味加薑棗淡竹葉煎服水楊湯萬氏心法治倒陷之良方水楊即忍冬藤也春冬用枝秋夏用枝葉銼斷用長流水一大釜煎六七沸先將三分中一分置浴盆內以手試不甚熱亦不可太溫先服宜用湯藥然後浴洗漸漸添湯以痘起發光壯為度不拘次數牛黃鎮驚丸治小兒一切急驚風身體壯熱多睡驚悸手足搐逆痰涎不利人事不醒之症天竺黃真物甚難得膽星白芍青皮黃芩黃連薄荷桔梗牛黃近來和產物宜擇用檳榔甘草大黃天麻陳皮防風各等分上十五味為末煉蜜丸之生薑汁下之抱龍丸治痘驚天竺黃一兩膽南星二兩辰砂三錢雄黃三錢上四味為末煉蜜為丸如芡實大燈心湯下之秘傳赤龍丹治痘前後驚搐不醒及梟毒之妙方人參葛根桔梗茯苓辰砂各一兩龍腦一錢五分菊銘石酢浸燒末犀角木香各二錢二分玳瑁丹麝香各一錢二分金箔銀箔十二枚牛黃二錢五分香附子一錢二分上十六味為細末以白蜜煉合或以薑汁和勻用之參朮散泄而糞青白滑利而痘色淡白者主之白朮去蘆皮炒一兩人參白茯苓去皮炒甘草去皮薏苡仁炒熟揀淨家蓮子去心炒真神麯炒山楂肉各五分肉豆蔻麵裹煨熟去面切細用大紙包打去油四錢訶子炒取用去核廣陳皮洗淨去筋膜曬四錢木香三錢砂仁五分上十三味為極細末每用二錢清米飲調食前溫服兒不肯服者入稀粥內和服亦可也七味豆蔻丸治虛滑泄瀉不止者木香砂仁各五錢赤石脂煅過白礬煅過各七錢訶子肉龍骨肉豆蔻麵煨去油五錢半上七味為末麵糊丸如粟米大三歲者五十丸量大小如減陳米湯送下辰砂益元散治裡熱小便赤澀者滑石飛過六錢甘草淨末一錢辰砂二錢上三味和勻冷水調下一二匙萬氏曰治痘熱毒火盛狂言引飲本方去辰砂加龍腦少許即龍腦益元散退火回生散要訣一名回生丹治痘發之時言語精神狂燥悶者滑石辰砂各一錢冰片三釐上為細末冷水調服一分睡片時許必轉紅活如狂妄甚者加牛黃末三分翁仲仁曰回生丹與本方治血熱枯澀潔古白花蛇散治痘黑陷不起者白花蛇二兩炙大丁子三十粒上二味共為末每服二分半熱酒下有神功熱毒者忌用之或以好酒一盞服訣曰龍眼肉五粒去核取肉投酒中一沸而服之最妙也當歸丸治初發四五日大便堅秘不通者當歸半兩黃連一錢半大黃二錢半甘草炙一錢紫草根三錢上五味先以當歸紫草根熬成膏以餘三味研為細末以膏和為丸如胡椒大三歲以下兒十丸七八歲兒二十丸食前精米飲下以利為度萊菔丸痘後虛腫者此丸主之萊菔炒五錢別研厚朴水煮曬乾二分白朮炒一兩上三味為末浸湯為蒸餅陳皮湯送下奪命五毒丹治痘陷倒靨幹不起者有神驗月魄蟾蜍少許吐月華牛黃二分銀紅硃砂一錢男王雄黃三分梅精冰片二分上五味用獖豬尾血為丸如麻子大薄荷湯下一丸移時活動按火毒入里內攻心者用之其功如神一粒金丹治氣血弱塌陷倒靨將死者膃肭臍二雅片三冰片二麝香一原蠶蛾二上翁氏分量如此訣曰如小劑則各以分為定量大劑則各以錢為定量共為細末以糊丸之如梧桐子大以金箔成衣兔糞丸治痘入眼或生翳障者兔糞炒四兩石決明煅一兩草決明木賊去節白芍防風各一錢當歸五錢穀精草二錢上八味為末蜜丸如綠豆大三五十丸荊芥湯送下金不換治走馬疳人中白煅如法枯礬各三錢五倍子鹽梅七個煅存性白褐燒灰細辛胡黃連各一錢雄黃銅綠各五錢上九味吹之或和胭脂水塗之亦可無價散治黑陷欲死者用無病小兒糞陰乾於臘月便將銀罐二個上下合定鹽泥固封火煅通紅取出為末蜜水調服一錢一方加麝香片腦少許龍腦安神丸治痘中昏悶譫妄良方大辰砂一錢龍腦牛黃各五釐上三味共研為細末取獖豬心血小豬尾尖血和如綠豆大每服用一丸新汲水化下燈心湯亦可安神丸治痘中昏悶心神不清者當歸身黃連麥門冬白茯苓甘草各半兩硃砂一兩龍腦二分半上為細末湯浸蒸餅和獖豬心血搗勻丸如黍米大每服十丸燈心湯下牛黃清心丸治心熱神昏者牛黃二分半辰砂一錢半黃連五錢半黃芩山梔仁各三錢鬱金二錢共研細末臘雪調麵糊為丸如黍米大每服七八丸燈心湯送下四聖膏七日內外有疔者點之珍珠五分豌豆燒灰發灰各一錢雄黃八分紫草根一錢半冰片三分上六味共為細末油胭脂調剔破疔頭點之查本有吮去惡血之四字玉鎖匙治咽喉腫痛飲食不入者硼砂一錢朴硝五分殭蠶一條片腦五釐上四味為細末以竹管吹之滅瘢救苦散爛痘如誤抓破者用之傅貼最良密陀僧滑石各二分白芷半兩上三味細末濕則乾摻之干則好白蜜調傅白龍膏治爛痘及抓破者用干牛糞久在風露中者火煅成灰取中心白者為末薄絹囊裹於瘡上撲之綿蠒散治爛瘡又身及肢節疳蝕瘡膿水不幹者蠒子不拘多少將明礬末裝入滿火上燒令汁乾枯為末摻之天水散治痘乾燥而痛者白滑石四兩甘草一兩共為細末白湯調服或用塗痘子甚佳以蜜水調刷之敗草散治爛痘及抓跛不成痂者用此鋪攤佳以多受風露之氣故能解痘瘡毒如急則蕎麥粉亦可一方象牙屑為細末摻之又方生赤豆為細末加辰砂少許如桃花色而摻最妙消蛔丸治首尾蛔蟲之要方白朮黃炒乾薑黑炒甘草生茯苓烏梅各一錢黃連姜炒胡黃連雷丸各五分雄黃少許上細末糊丸如麻子大計兒之大小與之自五粒至十粒二十粒一日兩三度白湯送下辨麻疹首尾用法升麻葛根湯方見於痘門凡大人小兒先始發熱不拘時服之又檉河柳為細末加一錢調服亦可瀉白消毒飲先以升葛之味發透之若發熱咳嗽甚者宜此湯桑白皮地骨皮各三錢牛蒡子炒研荊芥穗桔梗甘草各一錢浮萍曬乾二錢上七味為粗末水煎服如毒熱甚者檉河柳一錢翁氏檉葉散一名獨聖散檉河柳青茂時採葉曬乾為末每服一二錢茅根煎湯調下或加煎湯中和勻服之亦可繆氏清揚飲子治麻疹之主方麥冬去心三錢西河柳五分玄參二錢鼠黏子炒研葛根各一錢五分知母蜜炒蟬蛻荊芥穗薄荷各一錢甘草一錢竹葉三十葉甚者加石膏五錢冬米一撮愈甚者加黃芩黃柏黃連瀉白散治發熱疹出咳嗽甚者桑白皮一兩炙黃地骨皮一兩甘草半兩炒粳米百粒上四味水煎加西河柳末化斑湯治疹子已出火熱不退色大紅者人參舌赤色白胎乾燥者去之知母石膏甘草連翹升麻牛蒡子地骨淡竹葉糯米上十味水煎服消毒飲治疹已出未出胸膈黏痰咽喉痛者大力子二兩炒研甘草炒半兩荊芥二錢五分上三味水煎服人參養榮湯治面色青㿠白疹子已出色白榮血不足者人參去蘆頭當歸紅花赤芍桂水草甘草上五味水煎服繆氏竹葉石膏湯疹現其色紫赤而喘滿氣急者早宜此湯石膏自一錢至五錢知母自一錢至二三錢竹葉三十片或百片粳米麥冬自三錢至五錢加玄參薄荷二錢西河柳兩許上八味水煎一方加當歸五錢翁氏大青湯治疹色大紅或微紫而血熱或疹出毒火甚者大青玄參生地地骨皮荊芥穗石膏知母木通甘草各等分淡竹葉十二枚上十味水煎服大無比散治疹已出熱毒大甚驚狂譫語引飲者桂府滑石飛過六兩粉草一兩辰砂飛過三錢雄黃飛過一錢上四味為末三五歲者服一錢十歲者服二錢小無比散治壯熱口渴小水澀大便秘口氣熱煩躁不寧或焦紫或紅斑者桂府滑石飛過六兩石膏飛過一兩粉草寒水石各五錢鬱金蟬壯小者甘草湯煮乾為末七錢上五味俱制淨末和勻每五歲者服二錢大人再加冬月燈心湯下夏月井水調下如熱甚不解者井水磨犀角汁調下費氏涼血攻毒飲疹已出現大便三四日不通煩渴徹夜不眠而躁亂不寧者此湯主之方見於痘門管氏六一散發熱之時疹欲出未出口不渴者但以檉河柳一錢粗煎和六一散少許頻頻與之方見於痘門翁氏麻黃湯治襲於風寒不發見者麻黃去根節制過升麻牛蒡子炒研蟬蛻洗淨去頭足甘草各一錢上五味煩渴加石膏四錢或加西河柳亦可七物升麻丸治毒火甚於內疹伏而不出大便秘升麻犀角朴硝梔子仁大黃各二兩淡豆豉微炒黃芩二兩上七味共為末煉蜜丸如黍米大凡覺四肢火熱大便難則服取微利乃止黃芩湯治發熱吐利不止者黃芩一錢五分甘草炙一錢白芍藥六錢上三味加大棗二枚水煎服加味黃芩湯治自利甚裡急後重者黃連黃芩各一錢半甘草七分白芍三錢滑石末三錢上五味水煎服血利加地榆紅花聶氏清熱導滯湯治麻疹出有毒氣流注而成痢者黃連條芩白芍枳殼炒山楂肉各一錢厚朴去皮薑汁炒青皮檳榔各六分當歸甘草牛蒡子連翹各五分上十二味水煎紅多者加紅花三分地榆五分秘澀甚者酒炒大黃一錢二分疹毒甚者加檉河柳五分養血化斑湯疹色淡白心血不足者此湯主之當歸生地紅花蟬蛻人參各等分上五味水一盞生薑一片煎六分溫服繆氏檉葉葛根湯治疹子已出未出陽毒太盛者葛根前胡荊芥貝母西河柳知母麥門玄參甘草上九味水煎服如天寒甚則痧毒鬱於內不得透發不寧者加制麻黃一錢急發其汗繆氏三黃石膏湯治疹出後煩渴者石膏三兩知母一兩麥門三兩竹葉三百枚黃柏黃芩黃連各五錢檉河柳一兩上八味濃煎飲之煩躁定而愈門冬清肺湯治疹後咳嗽不止者天門冬去心麥門冬去心知母貝母桔梗甘草款冬花杏仁去尖牛蒡子馬兜鈴桑白皮地骨皮上十二味水煎服如咳嗽不止咽喉痛者加石膏檉河柳人參養榮湯治疹已收後氣血虛耗餘熱不退者人參麥門冬五味子生地黃歸身知母白芍陳皮甘草上九味煎服柴胡麥門冬湯治疹已收後大熱日久不退者柴胡五分龍膽五分麥門冬八分甘草人參玄參各半錢上六味水煎服柴胡四物湯治余炎未竭日久寒熱雜起欲變骨蒸者加犀角方見於痘門清熱除疳丸治睡則揚睛口鼻氣冷手足厥逆微微瘛瘲變成慢脾風者黃連當歸各二錢龍膽一錢五分川芎一錢青皮陳皮各一錢五分使君子一錢二分乾蟾頭一錢燒蘆薈一錢二分上九味為末神麯丸米湯下當歸養血湯治渾身壯熱未至羸瘦但多搐掣煩躁者當歸川芎麥門木通淡竹葉甘草山梔子燈心上八味大便秘者加大黃黃連安神丸即於安神丸方內去麥門甘草龍腦加石菖根一錢五分全蠍七個龍膽二錢製法同前硃砂為衣翁氏馬鳴散治走馬牙疳者人中白即溺底白垽刮取用新瓦盛之火煅如鹽者五錢馬鳴退即蠶退紙火燒過二錢五分五倍子二錢生用一錢入礬內燒白礬二錢碎入五倍子一錢火煅過用上四味為極細末先以米泔濃水攪口內貼翁氏化䘌丸黃連五分川椒去閉目並目與子蒂炒去汗二錢苦楝根白皮乾者二錢上三味為末用烏梅七個艾湯浸去核搗爛和丸艾湯送下四順制蛔湯痘已見至三四日火熱未解丁唇純紅如石榴花腹肚時痛大便未通小水赤澀動氣衝胸肋者蛔蟲也此湯主之當歸芍藥大黃酒炒鷓鴣菜各大甘草減半烏梅地丁各中胡黃連雄黃各少許上水煎溫服臨欲飲時加雄黃末升堂門生錄自天明戊申始許入門至文化辛未執贄請業者幾三百人愁錄之今後入門者當追錄之同寮之醫官十有餘人茲略姓名及每卷核合之門生亦然浪華安治州元貞勢州村田道哲伊州雲林院玄中豐前牧仙龍攝州豬石脩敬備前葛城正藏攝州佐佐木文仲紀州山瀨治周阿州土井計江京都北村立造河州田周藏攝州後藤言常紀州竹中文卿紀州德田道碩紀州番埜又玄和州長井隆民尾州後藤立意伊州藤林敬治伊州村田多善阿州安藤靜庵贊州森周治播州神吉耕庵紀州德田厚純和州稻村喜壯城州山口運說懾州僧了觀京都高橋元者播州久保一學肥前島田順碩備前宮本常伯長州管玄長播州長尾玄瑛肥前西岡健順防州筏道濟加州端貞元長州齋藤秀哲備中進藤顯藏丹波笠城尚圭常州高野昌碩防州齋藤方策播州村上元齡城州富原周伯播州圓尾玄東播州松尾玄長播州和田春堂播州關尚庵播州八木退藏播州中根元悅播州上田玄珪攝州岡本文亮播州陰山禮治攝州本鄉長藏播州岡本理齋播州沖勘解由播州園文哲攝州澤周倫播州西脅主禮備中蟲明幼安備中岡西昌順薩州河村宗云播州南木左重紀州下村了庵播州加古茂川播州河野泰藏播州小野願堂播州高見新吾彤州市川丹齋京都北尾春轍下總近藤玄江州市岡意博信州堀內桂仙信州住山友仙攝州雲林院玄龍紀州竹中彰民攝州岡本為著攝州留主真證攝州田中多助播州入江宗慄播州三木准布播州八木虔吾播州井上修齋播州生田遵養播州三宅仙龍播州關冕理播州村田慶睿播州高原丹治播州飯田見龍播州本卿主善播州田淵淳節播州水守三省播州三木養扉播州內海玄堂下總中里長格下總大浦謙也播州齋藤常庵下總立花宗慎播州河村祐甫奧州兒島宗說越前早川俊章信州赤羽俊騰三州河村傳達肥前芥川祥甫奧州柴田玄潤下總橫山宗元豐後優藤文伯贊州安堵岱庵贊州長尾元章防州中村元隨濃州喜多尾春圃常州田中順貞武州上田伊織豫州中村秀朔肥前古賀仲安羽州長阪元高播州中根元悅奧州中村流謙奧州島松庵遠州田宮秀伯播州辻元李庵奧州館野瑞元豫州菊山玄溪云州森養仙攝州橋本順積備中渡邊養順奧州木村桃庵奧州橘內桃安筑後馬渡羪拙筑後岡田東慶豐後大野徐庵濃州岡田玄隆羽州中烏北文肥前谷川元禮三州河村貞三肥前日高元慄泉州正清方庵丹州河合杏庵信州澤邊升純播州三浦通暢豐後辻原由節長州增野柳軒防州山縣玄孝奧州竹中道穩甲州蘆澤龍意防州池田瑞朔武州佐藤景純播州豬崎祐元播州阪井楳策防州桑原玄仲播州布州瑞益播州畜須富八播州土岐千吉播州田中卯朔播州莊野八木武州山口玄亭石州井關道益京都清水源吾豫州菊山玄溪京都山脅玄智東都木村玄庵播州板井仲播州高須力馬播州永原淵藏攝州阪井朔之助播州櫻井眾甫播州內藤千太郎甲州大柴半右衛門甲州蘆澤元理甲州石原順碩伊州越知見純甲州廣瀨恭平甲州田中需馬甲州辻岷平甲州前昇平甲州河野泰次河州橋本啟全浪華石井金圭甲州秋山桂輔甲州加賀美順成甲州飲田格仙甲州飯田格榮甲州上野富太郎式州木村玄安武州內山善藏豐後北野恕軒播州山田安樸藝州實石瑞得筑後春野縣筑後清水道祝播州岡本溫順浪華森隆見防州都野道意播州岡本昌庵播州芹田升遵甲州牧野宗平甲州島津壽健甲州烏津主稅甲州淺川道臧甲州八代健甫