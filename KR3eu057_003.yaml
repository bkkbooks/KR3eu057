body:
  text: 卷三辨發熱三日順險逆證夫物有其機事有其聯君子見微以知其顯見幽以知其闡若待理判勢決然後知之則是肉眼也不足共語此術之壺也矣順證勿服藥一凡小兒皮膚堅厚瘦黑光彩此骨勝肉也見其眼中神光如秋水澄清而唇舌紅潤或滋潤或潔淨者吉此氣血兩盛痘出必輕若肌肉浮脆而肥白者此肉勝骨也見其目中光浮多白不明兼之多痰多火者凶此氣血兩虛痘出必重一身熱和暖或進或退神清氣爽飲食二便如常無雜症者吉一初熱先發驚隨痘出而驚自緩者吉以痘從心經而出也是謂之驚痘必順美也一初熱時或吐或利隨痘出而止者吉蓋熱毒從內解邪氣上下得泄毒氣內泄吐利自止而正氣不耗虛者為吉一發熱三日即無大熱腰腹不痛才見點而堅硬礙手者吉一凡吐瀉而精神不減氣不粗口不穢痘自出而次數差頻者亦為吉焉雖大熱唇舌滋潤者痘出必順險證宜加治一發熱時吐瀉不止身熱口渴者先與升陽散鬱而發之切忌溫熱止澀之劑若誤用則致遏熱毒而不出猶以火助火也宜三思焉一初熱壯盛頭體腰腹俱痛吐瀉咳嗽兼見者其外感固不輕而內毒亦必重宜與荊防敗毒散以疏散焉一風寒壅盛以致紅紫斑影痘不起者宜肌表發透汗令其遍身皆出臭汗則毒氣自散升麻葛根湯主之一發熱痰甚譫語昏迷驚搐者是外感風寒而內動心熱也宜急散風去痰兼與利小便之藥則心熱自減驚搐自愈清解散主之一發始時毒盛熱擁有諸失血者並宜涼血攻毒要之痘出兼雜證者多由毒氣不盡出故宜以表藥發其汗不則痘無出路小毒積成大毒先用升陽散郁以發汗而猶血症不止者宜投清涼行血涼血之劑以十神解毒湯加犀角黃連蠻紅花治之血證甚者涼血攻毒飲主之一初熱而聲遽變者重宜以清肺利咽為主利咽解毒湯主之一發始腹痛大便祕痘苗赤色乾枯者宜攻毒清利敗毒和中散加酒炒大黃主之一痘盛行之時雖未發熱先頭痛先腰腹痛或頭面腫者由受時候不正之氣也當臨出痘而毒甚痘出必重故宜預解散先用荊防敗毒散而發汗發後諸症不穩腰腹痛不止發熱痘點隱隱皮下大便祕者宜敗毒和中散加酒炒大黃以微利之或四順清涼飲亦可也逆證不治一發熱頭面一片紅如塗胭脂者六日必死一初熱時用火照心窩間乳盤赤色如火或遍身皮肉成塊其色紅赤或紫赤者不治一發始時身不大熱惟腹脹眼合狂躁大渴唇燥舌裂或無胎而乾燥者毒根於血中必作凶逆宜用清涼攻下之劑利後證不穩者必死一發熱頭溫足冷或昏悶目時開乍閉煩渴沉吟者死一身熱如火兩目紅兩臉赤紅成塊口唇紫黑或破裂舌白胎乾燥生芒刺者不治一發熱時婦人經行不止唇舌無紅色發驚搐者死一發熱時以手擦面頰如紅色隨手轉白自白轉紅者是謂血活雖危重多生如擦之不白舉之不紅是謂血枯雖輕症亦必死一初發腹中大痛或腰痛如被杖蠖屈曲臥者死一初發時七孔二便鮮血如紅花膏者死一發始時不大熱而遂見青黑藍斑者死一初發欲見痘苗而胸乍鳩突喘呼者死一初發時面額浮青氣或舌尖純黑生紫黑斑點或聲啞咽噎神昏憒者死一初熱之時肚腹大痛泄利膿血唇舌紫赤而白胎通明乾燥者六日必死一發熱時婦人胎墮而血不止唇舌無血色及胎不墮而大熱不退痘苗不見者凶一發熱時吐瀉見蛔蟲者十中難全二三一發熱未見痘形先眼沿浮腫黑色而映見者凶一發始一日即現紅點密如蠶種堆粟焦紫乾枯手摸不礙乎指者必死一發熱不見痘點照火候之如有如無而煩躁不定及唇舌赤紫是謂之鬱伏發始三四日而趣死辨見點三日順險逆證順證勿服藥一痘潮熱三四日熱退而後出者是氣血充實毒少易收功矣氣血充榮灼火難療其痘必稀而易愈如才熱半日一日而即出者由氣血怯弱毒多易感動矣氣血衰敗則烈火易焚其痘必密而難痊初出三五相連而見點細者必密也單見磊落而肥大者稀也一熱一二日而見點眼眶不腫二便如常脛不軟唇不浮腫兩頰不模糊肌肉未浮腫者吉如三四日面腫增進者凶一痘出稀疏表裡共涼則毒必輕兼大小磊落分明不相黏連者則托裡和中之劑宜略飲之以助其起發貫膿收靨之勢如出太密黏連模糊雖出而毒猶盛則托裡解毒之劑宜多飲之以防其陷伏癢塌黑靨之機如雖遍體模糊獨面上喉頸胸背之處稀朗分珠者必可治一凡痘疹一色者吉若二色三色相合而為豔者凶一先吐而後痘見吐即止者吉又有大吐變凶者胃敗不能逐毒故痘現復陷伏也一目光精彩神映瞭然且唇舌紅潤而口角兩腮無枯滯黯色者吉一痘作二三次出至三日後手足心才出齊而頭面胸背稀少摸之堅礙根窠紅暈大小不一肥滿光澤痘窠與皮膚紅白分明勢如筍出土形朝暮安靜而熟睡者吉一凡骨處先見點而稀者必吉若軟肉無骨處先見點而密者必凶但忌頭額先出者以毒盛而妄參陽位也此症必吉少凶多一涼而復熱熱而復涼連綿數日而後從口角顴骨處三兩成對報點至三四五日出齊者順也一看痘之法有七一看天庭太陽方廣二看頸項三看地閣四看胸背五看肚臍六看兩肘兩膝七看穀道之處此數地俱稀少者吉視膿色亦以此部位候之是緊要也險證可加治一痘初出頭焦帶黑色紅紫慘黯不明譫語狂亂大熱不退煩渴飲水者此毒在血分為血熱毒盛之證也宜以涼血解毒為主乃十神解毒湯加酒炒芩連治之如大便祕者加酒炒大黃以微利之或宜清毒活血湯若不早為之圖則及乎黑陷致不救焉一痘初出色白皮薄而光亮但根窠微帶一線紅色者此毒滯氣分為氣血不足之症治之宜急以補氣調榮為主人參歸耆湯或十全大補湯主之如不早圖則癢塌而死夫痘初出惟是不過論氣虛血熱二證耳治之之法白轉紅活黑轉淡紅而根窠明潤瘡皮堅實能食二便如常則起脹貫漿收靨一路無餘恙矣一周身勻稱惟喉獨密者名曰纏喉宜清肺利咽射干鼠黏子湯加桔梗治之六日後參麥清補湯主之應早防八九日間水嗆不食之患如三四日間誤失清解必發咽喉腫痛飲食不入則多死首尾甘桔湯加大力子主之一自見點後身熱不退者毒氣太盛也始終宜清解如唇舌赤色而大便祕者急以四順清涼飲微利之如利後熱氣稍退者宜從症而用托裡補氣之劑加減益氣湯主之一痘出二三日身熱不退是即血耗而根窠無紅暈也忌用清熱解毒之劑如痘色淡白唇舌淡白而大便易泄者內虛也加減益氣湯加桂治之一初出而胸前稠密者曰攢胸宜急治之如痘色赤紫乾涸者宜清毒活血湯主之一初出灰白頂陷不起或起不礙手根窠不紅活身涼而靜者虛症也如身涼而痘灰白唇舌淡白飲食不進或嘔吐腹脹寒氣上逆或泄清水而手足不熱者此純陰之證也宜大溫補氣血以木香散異攻散輕重從宜治之一手指及頭上先見者為肝甲痘可治又沿眼邊先見三四點者為攢眼痘可治又陰囊兩邊先見者為囊眼痘可治又頭上兩角先見者為日月角痘可治又穀道邊先一二點現者為闌門痘可治如臍中及肛門反為堆聚攢簇之狀者不治一頭上先見數粒中有一粒極大深爛者名尸毒痘宜急排破以油胭脂和珍珠細末封之必待膿成毒化方可脫去不則後聚成穴血氣為其所奪諸痘難長即類疔痘主方神功散加芩連治之一凡起勢雖密而根腳自分太陽稀少周身無成塊之狀色不幹紅者多屬可治神功散主之一根盤已具而頂不起肌未潤松痘色淡白飲食減損便易泄不渴者乃氣虛也宜加減益氣湯應急與之一有一等白痘似粉有盤有頂而軟肥者是氣血兩虛也宜大補氣血急以十全大補湯治之一痘白肉紅者固系氣虛不能拘血然亦有因火熱遊行而致之者宜涼血托裡以清肌表之熱參麥清補湯主之一痘內黑外白者是毒在裡宜以解毒行血清熱為務清毒活血湯主之若痘內白外黑者是毒在表急以升陽散郁發之升麻葛根湯主之一痘出完而熱甚氣滯其肉腫亮痘根滯縮不長者見毒氣在內宜急補氣托瘡以固陽散火湯治之遲則其表虛皮薄嬌紅易破遂成癢塌之患待乎靨期而內攻必斃一因夏月暑熱薰炙以致煩躁發渴而出不快如唇舌赤色乾燥大便祕者宜人參白虎湯加減治之一因冬月寒氣所侵以致肌膚粟起鼻塞聲重咳嗽而出不快者宜參蘇飲加減如重者宜桂枝葛根湯投之一因觸邪氣而出不快者外用荊芥大棗焱燒以避其氣穢如因被侵霖雨而出不快者宜燒薰蒼朮楓球避之楓球楓實也形如球依名焉在於東都官園及仙台候別墅他處有一二樹俗呼曰大葉加伊天其形如此一因前有勞力而元氣虛弱出不快者宜溫中益氣湯或加減益氣湯一因吐瀉胃虛不食出不快者參苓白朮散主之一大便祕結口渴而出不快者是內有實熱也宜清涼解毒若便利口煩渴而出不快者是內虛而津液下陷也宜溫中補脾如內實者四順清涼飲主之如內虛者參苓白朮散主之若便利口不渴而出不快者氣虛也惟驗唇舌紅不以辨別之如氣虛者宜補中益氣湯加減主之一見標一二日喉痛眼紅唇腫兩耳如火者肝肺胃火共旺也如痘色氣血俱交會者宜清涼攻下治之若色慘暗乾紅則氣血離散七八日內鼻孔出血者必凶一痘出而寶窠陷伏不起時從兩眼中失血流及數合者六日必死勿治一大熱壯盛痘苗隱隱不起其色紫豔礬紅煩躁狂妄口渴不寢及唇燥舌胎乾燥者宜清涼攻毒飲主之一伏火伏毒內熾則面眼如火手足如水大便祕結小便如紅花汁痘色乾紅滯色唇舌紫赤無胎而乾裂者毒在血中宜急涼血攻毒飲主之如遲則難及矣一敷點灰白如桃窠肥大按之硬手而紅活者尚可救色不變者黃泉在邇不可救回逆證不治一發熱一日忽爾擁出形如蠶種灰白稠密身熱腹脹瀉渴不止頭溫足冷及色紫黑乾枯者死一初熱即見點太陽額角髮際印堂司空方廣之處先顯紅紫色目紅唇裂痰鳴聲啞者是氣滯血凝妄參陽位也不治一唇上先見痘如堆粟者不治又牙床見痘連串者不治一初起全不起頂形如湯泡火刺者是氣血兩敗必六日後癢塌至九日而死一痘已出而熱一遍痘又出一次前出者或沒或乾黑者死一連肉紅紫一片兩臉如橘皮紅不分肉地者死一痘自腰下見而腰上不見者不治一痘色白而皮薄光潤易敗根窠全無紅色三五日即長如緑豆大者必不灌膿日久後成一包清水擦破必死不可錯認妄與下藥一初出頂陷中有黑點如針孔者不治一周身勻稱獨口唇細密者名曰鎖口須豫防九十朝不食之患如發熱而口中灰黑色則後如鵝口瘡而死一胸前偏多者名曰攢胸須早防九十朝失聲之患如腹脹咬牙喘渴者死一肩背甚密者名攀肩痘腳下湧泉穴肩上肩井穴乃暗水潛行之道路也津液潤布於皮膚之內者皆此井泉之水而以腎為源也毒盛於此地者水道絶也五臟皆附於背背上太密者臟氣傷矣故發熱聲啞躁渴而死宜預防之一起勢不進根腳肥闊面色覆青氣肌肉㿠白熱盛神昏者名反腳痘至六日必死一初先發天庭方廣太陽處見標一粒突起光亮少頃而陷伏沒者此名賊痘猶賊之欲陷城壘者先以奸細探其虛實此痘為賊之鄉導若發之者不治一初熱腰痛及報點而猶大痛不止見苗如蠶種面赤氣粗煩躁昏亂者過二三日而口中大臭遍身出紫黑斑或口蜃青黑舌上發黑疔而死勿治一胃熱發黃狀如橘皮黃而下利者死一陰囊上兩邊先見痘而他處不見後必黑陷者不救一發始已報點照燭看天庭百會巨闕人迎等處如紅點斑而不成分珠乍變作紫黑塊者死一發熱未透而即報苗現標已而又沒不見既而又出又沒者謂之弄標蓋痘憑熱透透則肌肉通暢自然易出今熱不透則皮膚不松故隱而又出而又沒氣血衰弱之甚無發泄之力故為難治一凡痘疹俱極稠密而疹亦不先解此名狩痘不治一痘未出而身有紫赤紅點或有數點黑斑鼻血昏沉身熱煩悶者死在五六日之間痘出不齊者六日死雖然氣血衰弱者其死先期必進也故特謂死在五六日之間也驗之可知矣一手足面部俱見而身熱煩躁不穩耳輪耳背獨無痘者凶症也惟周身稀少紅活滋潤標粒分明耳上不出者無妨一痘至三四日腳軟弱而不能立者凶又天柱忽折者死一痘出時譫語狂言如見鬼狀者且好飲冷或斑從腰眼起者不治一發青紫黑斑如痣及肌肉成塊色青黑者六日而死一肌肉裡如被杖者不治又遍身紫泡刺破出黑血者死一初出身有斑點嘴唇崩裂或唇腫口出臭氣者此胃爛發斑也其證必死如唇燥裂口惡臭舌乾黑者死又上唇紫黑色突而如嘴口臭沖人者死又舌卷囊縮者死一凡先發無名腫毒而後痘出者十中八九死一痘出齊而吐瀉不止或生蛔自大肛中出者後變壞證而淹淹引日至死此症九死一生也若在初發時者多無妨矣一痘稠密陷伏煩躁狂叫口中腥臭沖人者此邪火煎熬肺爛胃敗也必成失聲乾嘔喘促六日而死經曰肺絶者七日死痘之一症以六日為死期雜病以七日為死期矣一痘出陷頂而臍窩內有瘡二三粒者無妨如至四五粒者凶多此腎經之痘也後必加溏泄而寒戰咬牙者即死一痘出譫語不止昏睡不食手足厥冷者必死一發熱痘苗手足先出現而後見於他處者必死一起勢因循而面上見青氣其瘡隱躍不起唇舌紫赤者死辨起脹三日順險逆證順證勿服藥一凡放痘三日逐漸起脹先出先起後出後起痘胖一分則毒出一分胖已盡則毒出完根窠紅綻頂肥礙手面目漸腫飲食二便如常而無他症者吉此是氣盛血榮充滿於內發揚於外毒必受制化毒成漿不藥自愈一凡痘瘡自初至結靨以痘內暗晦而外光潤為善所謂外陽內陰少陰君火之象也反之為凶若內外皆光為純陽無陰治當補血內外皆暗為純陰無陽治當補氣一凡痘瘡之毒必氣以煦之血以濡之而後可得成熟也故起發時光壯者氣有餘也肥澤者血有餘也氣血有餘表裡俱和不須服藥一凡至起脹其痘頂必有小凹名痘眼若根腳散大漿色淺白頂無痘眼者此水痘非正痘也險證可加治一痘雖起發乾枯無水謂之不肥澤乾紅帶黯色謂之不紅活其變為黑陷乃血虛也宜用四物湯加人參麥門冬地骨皮治之外用胭脂塗法一形長大而色枯燥者此氣至而血不榮也治宜補血色紅潤而形平塌者此血至而氣不充也治宜補氣形平塌色枯萎者此氣血俱不足也治宜大補氣血色灰白者氣虛也當補益紅紫焮發者血熱也當清涼行血紅紫退縮者血滯也宜清毒活血一痘頂陷不起而年壽之上痘起者不必憂慮如年壽上顆粒不起者急與補托及痘當起發而天庭印堂不起者亦宜以溫補為主否則漸變氣脫而至死一痘雖紅鮮但乾燥而不充肥者此火盛而血不足也治宜神功散加酒炒黃芩與之一痘充肥而帶濕者此脾中有濕而氣不足也治宜去濕補氣兼風藥以勝之錢氏白朮散加防風白芷之類不可太過若太過則損釀膿之機一浮囊虛起窠中無漿水者此氣不拘血血不附氣輕者必發癰腫而生重者即癢塌而死宜急人參歸耆湯主之使氣血交會方能化毒成漿焉一有因諸獸或生人驚嚇而痘隨伏色變者是心失其主血不能歸附而氣不充托耳宜托裡之劑兼與安神丸一痘正脹之時瘡雖起發然皮薄不礙手按之清水忽出而痘色不暗者此假脹也宜急用大保元湯之類提氣實膿方可成就不則十二日必不能回謝不收結而死一痘因觸穢氣致倒陷如石白硬者宜急用參耆內托散又外用荊芥大棗肉以熏燒焉一痘漸平塌頭面漸紅腫者唇舌赤色痘色乾紅則宜極清解而起之如唇舌淡白瘡色灰白則宜極溫補而興之一痘紫陷不起或黑如疔者此血分火熱急以清毒活血湯去參耆投之或以辰砂益元散和冷水兼與一凡戛齒噤牙者是腎氣衰而真陰不足也痘主陷伏宜補陰而逐之潔古白花蛇散主之以龍眼肉灑溫服之一痘當起發如四圍起而中心平陷者其證有二血化成水四圍高起但中心略凹下者俗呼茱萸痘此由中氣不足發不透徹耳治宜補托斟酌從證治之或宜參歸鹿茸湯主之又有四圍沸起中心落陷無水是乃死肉其形如錢者此名鬼痘宜急攻發竇氣飲和桑蟲汁與之或兼與奪命五毒丹不則漸變黑點束手不可為焉一起壯之時光澤滋潤勢如水光而根下紅色僅有一線以火照之如琉璃燈樣者此為虛起宜大溫補氣血托裡救表如及六日為此症者參歸鹿茸湯加桂丁子熟附治之不則八九日間發癢塌而及十二日為內攻若痰喘氣急者必死一痘瘡起發彼此相串皮腫肉浮或於本痘四傍旋出小痘攢聚漸胖成一塊者最為重宜內托消毒切守禁忌以防瘙癢之變其方內托散加陵鯉殭蠶治之一痘瘡起發中心突起四圍干平無水者或里紅外黑者此由皮膚閉密滯而不行痘毒鬱而不散耳治宜辛涼解肌桂枝葛根湯主之一痘紅活充肥以指捺之隨破者此血有餘而氣不足也宜涼血補氣人參歸耆湯主之不則後必癢塌而死一痘久遇陰雨而不能起者治宜發表而兼燥濕內托散主之一痘因傷飲食而腹中飽悶或痛以致中氣鬱而不起發者治宜發毒兼以神麯麥芽消導之一遍身俱起手足獨不透者是脾胃虛也宜急以錢氏白朮散去葛根加黃耆肉桂治之一痘舊有瘡瘍未愈者凶多其初熱實者以清熱解毒湯療之熱毒既退者但宜倍補氣血佐以托裡內托散去桂加穿山甲大力子治之一痘形板實而不松者血滯而毒絆也平塌而不充拓者氣弱不能拘毒也滋補充托猶可救之若毒滯者清毒活血湯治之如氣虛者參歸鹿茸湯主之逆證勿治一遍身痘皆壯而頭面不起者死一腰腹俱痛遍身瘡色紫點如蚊蚤所咬全不起脹或發泡而紫灰色者六日必死一痘頂陷灰白頭面延蔓根窠血散更加泄瀉煩渴唇白痰鳴不思飲食者是氣血俱敗也不治一遍身黑陷悶亂不寧神氣昏憒者死一起脹時啼哭不止日夜呻吟煩躁不寧狂言悶亂如見鬼狀者不治一吐利不止乳食不化或二便走血者死在旦夕一起脹時有六七粒細瘡成塊其形如巨擘者扁闊歪斜者不治惟於手足腿膁之間發一二處者宜銀針挑破以油胭脂塗之用針有訣一起脹時痘證如煙霧罩定者不治蓋痘出六日而氣血不分色焦紫而面紅腫如瓜痘鬱伏不出或猶煙霧罩定者頭面手足瘡伏不出則在皮下或紅或紫或黑或如錦紋罩定者名曰罩錦不治如或舌白至唇者為內潰急死案三日六日死者實熱未解而死九日十二日死者虛寒而死至此共無治法矣一起脹時手足起發而覆沒起而復塌者此根本已壞枝葉先萎之象也不治一凡全不起脹變成灰陷者或紫陷不起干克成陷伏慘黯不明者或發水泡癢塌者此皆血離氣背毒致下陷而外剝也不治一凡起脹時色如白飯平塌不起者死此毒盛血滯不可認為虛寒之證唇舌必赤紫又有舌尖赤色中央白胎者一痘將起發其中有發血泡者此毒伏於心也不治又有發水泡者此毒伏於肝也必旋見癢塌而死一起發時根窠太紅頭面皮肉紅腫知瓠瓜之狀者六日死若遍身痘頂皆黑其中有眼如針孔紫黑者六日死若兩腮虛脹成塊肩膊腰臀皆有塊毒堅硬者六日而死若先出痘形以漸不見者三日死若鬱而不出者三日死是也五證俱因實熱未解而死也一痘出而不齊者六日死其證痘出郛郭不長而先出者沉伏不起或帶紫黑色後出者雖紅覆沒不見煩躁悶亂唇燥舌尖赤紫而黑紫點如痣者六日必死一初出之時半是水泡或才起發而戴白漿或未成膿而干收者是皆火性躁急所致也早發還先萎要之毒火所為倏忽之間焰息氣絶而死一凡起發之時痘瘡稠密又見陷伏煩躁狂叫之症口中出臭氣者此毒火熏煎肺爛胃敗也或不食失聲者咽喉潰爛也寒戰咬牙者邪傳腎也悶亂者神氣喪也體寒者陽脫也或嘔或瀉者腸胃俱敗也經曰五臟氣絶於內者利不止六腑氣絶於外者手足厥凡見上證者皆不可治辨灌膿三日順險逆證順證勿加治一痘毒必由膿而化故有膿則生無膿則死然膿者氣之所拘而血之所化也是以頂肥光潤根窠血聚者則自有膿生之兆也若見頂陷灰白根窠血散者則自無膿死之徵也一凡四五朝身發潮熱根紅頂白飲食俱進二便如常神氣安靜者其熱薰蒸標瘡故也必生一痘最宜守諸禁忌蓋在起發之時其病未久氣血猶強足以御其乖戾之氣至養膿其氣耗血虧精神減損少有乖戾不能任之況正在秀髮之際而令內氣成充實嚮往足免凶險一痘至五六日毒化成漿初色發白次變緑色後如蒼蠟色而肥滿光澤根窠紅活以手按之其囊皮厚豐實無他證者吉一凡根窠紅活為陰血得宜痘頂變白為陽氣得宜乃氣血交會陰陽通運兼之變白之中而膿漿淳厚者是血之所化而毒之所附陽中有陰此乃陰陽交泰吉之兆也不則內為空谷外為茱萸狀氣血俱竭其欲不死豈可得乎一凡不先不後腫過頸項漿到胸前其膿方帶黃色此為真漿頭頂與陽物亦要漿最充滿為妙一兩肘兩膝漿色不充滿則靨後生怪疾是肘脾經所主膝腎經所主之故也一凡看痘更須詳察痘形先出者光潤漿膿充足則余痘次之終亦無害俱宜以補托為主險證可加治一痘起脹光澤可觀然以手摸之則軟而皮皺者此漿未滿而氣餒唇舌淡紅者即宜大保元湯否則難漿如腸鳴下氣者加丁香七粒如大便利者加熟附子五分一痘灰白漿不滿足皮薄易破寒戰咬牙欲成倒塌者宜急回陽反本湯主之一痘色紅紫漿不滿足欲成乾枯黑陷者急與清毒活血湯主之如大渴引飲好飲冷水大便祕結數日不通唇燥舌胎乾黑者急與清涼攻毒飲或兼以退火回生丹調和冷水與之如見血症者涼血攻毒飲主之如漿膿半足色淡白而停漿大便易泄而兼血證者驗唇舌紅白以宜急溫補十全大補湯加熟附子主之如誤用犀角地黃湯則謬人速也一痘遍身貫膿大便忽一溏泄瘡直變灰白兩眼乍開腸鳴下氣者是裡寒虛也宜溫補脾胃陳氏異攻散主之如不及則以參附湯兼與又復不及則重以參附一倍進之或與翁氏一粒金丹須臾安睡舌白轉紅者美一痘色紅紫而失綻松之勢者痘欲枯涸如唇舌赤色者屬實熱宜急用清涼之劑亦有因邪觸者宜千金內托散加減與之一痘已起脹灌漿至七八日大便久閉者必漿色實於外如便祕膿漿不充者是毒壅於內宜驗唇舌以微利之如至九十日大便不解則必靨後發乾熱而死或有大便不通而唇舌滋潤者雖見急證而忌妄下殺人宜鄭重焉一痘灌膿飽實作痛者不可加治如血熱焮發紅紫滯色作痛者治宜涼血解毒十神解毒湯加減治之甚則恐作血滯停漿一兩頰鼻準額前印堂等高突之處稠密者是五臟毒氣所聚最易擦破此地一傷則諸痘盡伏其毒內攻故切宜守護如誤抓破即將牢封若標瘡淡白而根暈不收或水泡多者急以參歸鹿茸湯加桂附治之若復起充灌他痘如常或於空處增出贈痘謂之翻空痘也點雖細小易灌易回是餘毒得復出也為吉兆一凡眼眶紫黑者是梟毒攻衝而肝受損也或因久嗽亦然一方貫膿即有回意太早者須防元氣不足宜用加減排膿湯而兼托裡補氣要以養血為要一灌漿時聲音低細者不妨如忽熱聲啞腹脹氣粗其四關緊要之處必有疔賊二痘宜急辨認而剔破之以油胭脂和珍珠末牢封之四關即兩肘兩膝是也用針有訣一頭面行漿而下部空虛則毒陷標於上可免危亡之患若手足漿實而上部空虛則毒陷標於內難免喪生之害也一痘破成坑者此內陷也外敷白龍膏而內補托之可也千金內托散主之若連片皆破或處處二三個類疳蝕瘡者凶一方將灌膿口渴煩熱發嗆喘向逆者須用托膿之劑兼與以甘桔湯加大力子一灌漿時發泡如彈丸大者宜四君子湯合參耆飲加防風白芷治之要在壯脾胃以利皮膚之水若發紫泡者不治一灌漿時痘似充肥而中洞窠突空軟者此名空倉痘極惡症也窠略有清水根窠起脹血附紅活者宜急用人參歸耆湯加糯米一百粒人乳好酒治之一灌膿時成片作爛膿水不幹者宜大補氣血兼投滲水之藥外以敗草散或蕎麥粉或松花散或象牙粉或赤小豆末等敷之內以十全大補湯加荊芥防風治之一灌漿時色白如水晶內無膿汁者切勿輕下手十一二日後宜防癢塌十四五日多致命終宜早投內托散加丁香穿山甲與之或木香散治之如寒戰咬牙者回陽反本湯主之一七八九日間其漿方欲成就而寒戰咬牙者此裡虛故也虛即寒也先與異攻散而不止者聶氏建中湯重投之如凶症退而結痂者佳也一七八日漿膿半足溏泄一兩行忽然標瘡頂陷者倒陷也如大便青色者胃寒也急用峻補之劑治之主方異攻散建中湯宜參考焉如泄利甚者兼與七味豆蔻丸或翁氏一粒金丹亦妙一灌漿已滿熱毒已解至乎靨期數日不幹者痘色如故則無妨此非氣虛也若不能收斂或脾虛不能滲濕者宜錢氏白朮散去葛根加黃耆肉桂治之逆證勿治一夫毒假漿成毒從漿化故不膿者死一痘色紅紫焦枯貼肉不起而皮厚黑如鐵堅如石摸之不破無漿血謂之鐵甲痘乃氣澀不榮血枯不潤者必八九日死一灌膿時忽然眼開者及目中神光不明瞳子漸轉紅赤者不治一起發時純是清水頂白皮薄與水泡相似者後三四日必抓破遍身而死又有內含清水外帶黃土色者不可認為老漿以致不救宜急溫補十中生者僅一二一痘乾枯全無血水者名曰空倉痘必死勿治一抓破天庭山根之間鮮血流出者死又抓破無血水乾黑者或紫黑者必死一兩臉光硬色如橘皮紅二便俱祕目閉聲啞腹中脹滿肌肉黯黑者死一吐利不止或二便下血乳食不化藥食直下肛門如筒及痘爛無膿者死一諸痘有漿而天庭不起者九死一生一紅腫早退瘡陷無膿目如魚睛者不治一痘膿時眉心鼻準耳輪唇口兩頰瘡先焦枯黑靨者名倒陷不治一頭面腫大瘡盡抓破黑陷深坑惡臭異常咬牙噤口者死一寒戰悶亂腹脹煩渴氣急咬牙頭溫足冷者死一七八日間有一等充實飽滿挨摸不破者不可認作好痘以致後悔此名鐵殼空痘宜用酒煮麻黃一錢生附子一分再加托裡之味而變成爛痘如此則屬可治否則乾枯牢封如鐵石必死一時時張口似吐不吐有聲無物及聲嘶者此胃中有瘡腐爛為至惡之候急用犀角消毒飲加甘草桔梗玄參牛蒡子早則當得生如遲則喉爛不食而死一中心黑陷四圍突起戴漿者此血隨毒走氣不為用也若中心戴漿四畔干陷焦黑者氣附毒出而血不為之使也若為血泡色紫而易破者此血熱妄行而不能附氣也通為不治若為水泡溶溶易破者此火濕並行氣血不能以斂束也此痘若能食便調者宜調養氣血補脾滲水則愈一痘膿後唇渣滓而時灑血口臭沖人甚則至頰爛穿鼻牙齒脫落者名為走馬疳是腎絶必死一痘出正盛或至痘後而聲啞氣噎者及藥食咽下而腹中即鳴者死一痘如針孔漿水自出者此衛氣已敗其液外脫也必死一痘四弦突起中間有凹形雖光亮看之內實收板不化名曰石臼痘極不灌漿必死之症也一口中無物而時嚼者死脾約也一不起脹者九日死矣其症痘出五六日雖成窠粒頂陷平塌根暈淡白不松突如其似有漿而或清淡空殼乍發瘙癢正無漿水瘙破處乾涸紫黑者九日必死一不灌膿者十二日死矣其症六七日稍有膿路而或清水水泡窠囊不光壯而中間溏泄頻頻不稠膿根暈離散者十二日必死辨收靨二日順險逆證順證可加治一凡痘到十日是謂收靨之期其證雖順美宜必加治但於補脾滲濕之中少加解毒與之後來可免餘毒熱之患而已一凡痘靨自上而下者順按自上而下者言自口角兩腮等處收結非言天庭印堂也猶易之地天泰天氣者降地氣者升是陰陽交泰之象也從腳上循腰以上者逆必回謝至心窩便死若早提起元氣使回漿自上而下為妙惟口角與陽物先收者此又為佳候非自下而上之例一痘至血化毒解膿色如蒼蠟從口鼻兩傍人中上下面部收起漸至胸腹次至兩腿而終者為順又額與腳背一齊結靨內症全平飲食如故神爽身輕者並手足心或手指尖及陰處先收者吉一痘色蒼蠟而有微熱者乃燒瘢之候也不必要治一痘回至頸切忌過用黃耆蓋痘欲回而耆復托之則升降不定毒必攻內而死一靨後忌食五辛恐熱熏肝隔眼生翳障一凡痘系危證氣血大虛多服補劑漸有膿色而將收靨雖有熱者當於補劑中加涼藥若欲靨而去補劑單與涼藥或用下利之藥必速其斃也蓋虛者復虛反內攻致死此必然之理也又已然之驗也治痘之醫宜書紳焉險證可加治一痘當靨而流漿不已者或因過表以致斑爛或因飲水過多乃水溢皮膚宜用白朮茯苓白芷防風之類去濕滲水一水濕太過痘被浸淫是以潰爛難靨者脾強則生脾弱則死然有因前膿未曾灌透而色似灰桃至十三四朝復灌行漿此雖愆期其治宜補脾滲濕一恣食毒物透托太過是以熱鬱於中作爛痛極者治宜清火解毒汪氏解毒飲加酒炒黃芩主之一十一二日其痘收時有如火燒煙薰之狀者此時當看生死如何唇舌潤音聲清咽喉清快飲食能進二便無故者吉反之為逆一痘至八九日鼻梁上先微焦者雖凶不死如面部諸痘未悉漿先鼻梁干收者死脾經之毒鬱伏不宣故也一痘當靨不靨發熱譫語小便不利大便祕結煩躁口渴微喘者是熱毒乘肺經無陰氣以斂之也急用清金解毒如甚者宜下之清涼攻毒飲主之一漿未稠濃頂先飽滿面腫忽退目閉忽開瘡腳散闊色白皮破而乾燥似靨非靨或如豆殼者此因氣血虛極津液枯竭不能外續其毒乘虛內入名曰倒靨此症之極險者也急用峻補之劑如復腫起庶幾可治故痘始熱毒盛者最要預解熱毒而後大補氣血以助灌漿否則氣血不周灌故為是證候也一膿汁不幹身熱能食者至十一二日當靨不靨者汪氏解毒飲主之如煩渴者加五味麥門一面上痘子稠密而忽一時盡黑者此為假收勿作正靨不早為之圖必死先驗唇舌以治之屬氣虛者宜補益溫補輕重隨宜一痘靨時有臭氣帶腥者可也若全無臭氣者名為正痘尚有餘毒未發者也若氣臭如爛肉而不可近者即毒火敗壞之氣是雖似結痂未可便為吉兆焉急與清利解毒緩則其變多難救矣一痘當靨不靨泄瀉微渴寒戰咬牙者此虛寒之極也建中湯主之如至十日猶不幹收當回水期膿熟而不收者溫表調中湯主之如痘臭爛深坑者宜生肌散搏之一痘欲收而唇口乾紫連結渣滓而兩頰紅聲嗄氣喘者是乃將成肺癰之候也治宜清肺解毒一痘臉上未收兩耳先收者其治有二耳冷者汪氏解毒飲加枸杞破故紙川芎治之如耳熱者則於前方中加酒炒黃芩黃連與之一靨至頸至腰而數日不靨者有熱能食唇舌赤色者宜清涼托裡如便祕者利之四順清涼飲主之如無熱寢食不寧者宜補脾滲濕錢氏白朮散加防風桔梗治之一痘成就之際其色淡紅或白者宜用補養氣血之劑白轉紅者吉若痘痂赤紫黑唇舌赤紅者是熱極也先用大連翹飲防餘毒遷變或忍冬解毒湯宜參考焉一凡喉內鎖緊腫痛難靨者且飲食難咽煩躁作渴者是熱留肺胃也宜急清利勿為泛常倘足冷自利者乃上熱下寒宜隨其證引火歸源切忌涼藥錢氏白朮散去葛根加黃耆肉桂逆證勿治一痘靨期而遍身未見稠膿惟口唇上下之痘先黃熟者是毒氣內攻於脾也諸痘未靨而口唇先腐爛及唇白到舌者並皆不活是謂內潰胃寒之極也一痘至收靨口中無物而空嚼搖頸者必死一面部肚腹未靨而腳先靨者不治是陰先陽也一遍身臭爛而不可近痰壅氣促目閉無神者死一發癢抓破而不見膿血痂疤卷如干豆皮者不治一當靨期而寒戰咬牙手足搖動禁口目閉腹脹足冷過膝者不治一遍身雖靨尚數粒似靨不結卒痂脫而如蛇退皮者必死一被傷節氣熱退不全者終死不可不慎一靨時項頸胸前耳前後環跳之處毒聚作腐爛住定不愈服藥不效者死夫胸受氣之地項頸陰陽升降之道路也耳之四邊乃少陽脈之所會也故為死候一痘皮薄而軟色白如梅花樣而靨薄易落疤白血色枯者此為假靨必十一二日毒氣內攻而死急宜溫補氣血如加泄瀉喘渴腹脹寒戰咬牙者死勿治一兩腮乾硬按之如石及泄瀉不禁色青遍身潰爛而聲啞足冷者死又靨後弄舌蛇舌者凶也一嗆水失聲或乾嘔不止痂皮不脫不思飲食昏憒悶亂睡臥不寧者死此症多依蛔厥而為壞證急用附子理中湯加烏梅山椒黃連治之一牙齦腐爛口臭不可近者胃爛也不治一痘中有首尾見蛔者在初發多無妨中間後見蛔者既妨痘功其證有乾嘔續續不止者或有不嘔不瀉心下蛔厥者又有肚腹膨脹似寒非寒似熱非熱寒熱雜起及危篤者其形狀無定候如糞死蛔者十中救二三糞生蛔者九死一生若至靨期不脫證者痘痂牢封無潤色不思飲食目閉鬱郁眠情昏神憒寒熱往來變壞症三七日後必死勿治一痘後傷風傷食而瘦脫者不治蓋脾主肌肉是土崩脾敗也一內攻之證皆十二日而死蓋八九日漿將足而泄瀉一兩行眼已開鼻已通痘頂平陷氣血離散者是內攻之兆也十二日必死一膿功半成至結痂期而不成痂者十五日後死蓋至十一二日而不收結膿水淋漓不幹者是為倒靨若煩躁悶亂寢食不寧也延延引日而後必死一如重證變虛寒日久而陽不復者後必死辨落痂三日順險逆證順證可加治一凡痘證首尾候衣食二事所繫匪輕亦當詳審蓋痘證前實後虛者證之常也故五日以前衣被宜照常六日以後漸加暖至於飲食禁忌亦如此若至此期諸證平準則終始宜於補脾滲濕中微加解毒治之小連翹飲主之一痘收結痂落後瘢色紅潤而無凹凸飲食二便如常睡臥常安者吉一瘡稠密頭頂生蛆者不死一凡自食痘痂者雖有他症不死險證可加治一痘已結痂而不焦落者是餘毒為害也或過服辛熱之藥而熱留肌表也或遍身盡落惟頭面不焦脫者毒聚於陽會也並宜大連翹飲加減服之一痘痂至二旬或一月黏肉不脫或發癢者此因表發太過氣虛無力煦之或血虛無力濡之治宜用八物湯加防風荊芥與之如有寒者加桂以達肌表更散腠理鬱伏之火也一有發癢以剝去痂皮仍復灌漿如瘡疥者此血熱氣虛也宜用保元湯加丹皮地骨地黃連翹等涼榮之味一痂不落而反昏迷沉睡不省人事此脾胃虛甚也宜人參清神湯主之一靨後痘瘢紅紫者血熱毒盛也當與涼血解毒為主一痘痂成而後唇不蓋齒者急與敗毒涼血否則變為走馬疳輕者宜清胃瀉火之劑重者與清涼攻毒飲其最甚者牙齒脫落而死或因血氣枯槁而不能潤養督任二脈如二脈急縮者當從補養甘露飲主之一痘後口禁強直腹痛繞臍冷汗如雨其痛定汗止而脈弦緊者是因瘢痕受風寒也宜散風養血鉤藤湯主之一痂落後眼赤痛者餘熱留肝經也輕者大連翹飲加減與之重者急宜以涼膈攻下治之最忌塗藥洗藥多損瞳子終為盲人是醫之過也逆證勿治一痂後泄瀉不止目中無神而面色覆青氣者死一忽發大喘面頰枯槁舌白唇白者死一痘痕如梅花白者是氣血俱蓋也如不大補氣血必死一痂後發驚者是心氣已絶而神無所依不治一凡咽作噎喉中如鐺鋸腹脹虛鳴痰喘頭汗者死一靨落後一病未已一病復生神氣虛脫寢食不寧時白吊者變慢驚風必死凡痘雖有數千百種之形狀不越氣虛血實之兩途雖有數千百種之候症不過順險逆之三項既言順者不藥自愈險者藥所能及逆者治之無功反受人之謗而已雖然順而陷逆者是謂中惡卒然趨死順而變險者隨治而生又險而加逆者甚重覆逆而加逆者必死矣且有純虛者有純實者有初虛而後實者有初實而後虛者有虛症變實者有實症變虛者千緒萬端無一定局故欲窮其妙境則先當驗唇舌之紅白及胎之潤燥以為準墨表裡虛實苟不詳之則無所施治切不可無知妄作以匙殺人世之業醫不熟痘術藏拙護短偶治其善痘不難治者以自誇世者亦不少矣余恆見世人有系痘毒而死者十才二三系醫毒而死者十中恆居六七夫人命者至寶也王公之貴不以換之珠玉之重不以代之所謂天爵此之謂乎奈何視之如塵芥視之如敵讎屬之於庸醫之手以速非命之天請醫者其可以慎矣應請者其最不可以不慎矣
