body:
  text: 卷二辨四節八證夫人苟不一心專精則雖小事乎不能通其妙處秋之於奕庖丁之於牛亦唯一心專結之所致也況乃司命之官制死活於一匙中者其可以忽諸大凡治痘之要在於詳察八證明辨四節此二者慎不可紊也四節者何也蓋痘瘡象乎天時期十有二日以日代月以象一歲三日一轉分為四節以象四時而生長收藏之令行焉見苗三日春之令也言一二三日也起脹三日夏之令也言四五六日也灌漿三日秋之令也言七八九日也收靨三日冬之令也言十十一二日也合十二日以為定期矣夫痘聖瘡也其變化難測其勢若燃眉其變如反掌故驗認形色與唇舌以探八症四節之妙境而究陰陽虛實之玄機是治未病之軌轍也故業醫者不明其常則終始失治不通其變則巧無所施必詳節次以為施治之繩墨又驗唇舌以為用藥之樞紐藥從舌而轉證應期而愈期有四節藥有四法故一二日宜升陽散郁如升麻葛根湯惺惺散之類三四日宜清熱解毒如神功散十神解毒湯之類屬虛者宜升陽補中保元四君之加減五六日則驗唇舌之紅不以辨之七八九日宜托裡行漿如內托散大保元湯之類十十一二日以收斂為貴宜補脾滲濕和諧氣血通利小便如保嬰百補湯小連翹飲之類是痘家之常法也夫痘有先期而速有後期而遲者豈可執一以治之哉若有不應四法者是必三因所致也凡六氣外襲為外因驚恐內動為內因調攝失宜為不內外因夫四法正也三因奇也奇正互投經變相濟則其治痘如運諸掌矣袁氏痘疹全書曰痘之形狀一百六十樣是謂苗形也非謂痘證也鄭氏痘經以表實裡虛裡實表虛為四證朱氏因而益之以毒壅血熱氣虛血虛通為八證所謂一百六十樣則在其中矣凡八證一百六十品痘之證候備矣然痘之為症休咎無常機變不測吾曼公先生精窮其理乃撰次八舌八唇之妙訣以大盡其變然後治痘之術無復余蘊也余既以世傳先生之術頗有曉斯技之妙常慨其傳之不弘而先業之無嗣矣故茲擢其祕録撰次作八證辨略述其梗概以告後學若夫唇舌精微余門別有舌鑑而其奧必俟口授非筆力所得而傳之也辨毒壅痘證發始身熱如灼放苗稠密不尖不松形似針頭瑣屑而為片為塊或肉色慘黯隱躍皮膚欲出未出或帶深紅漸變焦紫或連肉鋪紅大熱不退至齊而猶不齊煩躁悶渴肌膚不潤澤者此痘毒內壅火鬱不散也其治在陽明之標先用升陽散郁開提毛竅取微汗為要蓋表和則里自寬火鬱解則痘得盡顯於肌表而內壅自散標瘡順軌易以成功透發之機在此一時若失其機而謬治則梟毒之勢延蔓難出朱氏曰其始治鬱火中治實火終治虛火此之謂也辨血熱痘證發始身發壯熱腮紅臉赤毛焦色枯將出未出痘點深紅瘡色與肉色俱赤紅或放苗焮發乾紅紫豔先現赤色倏變紫黑頂陷不松夾疔夾斑至三四日口渴氣粗睡臥不寧小便赤澀大便不利唇舌赤紫無胎而熱者血熱也蓋痘症屬氣虛血實者固多矣凡熱毒熾盛則血為之泛溢妄乘氣位色如紅霞氣亦無制血之力熱毒彌盛而無所分消只宜重用升提發散使毒得達表而從外解引以滲泄使熱得潤下而從內消佐以清涼消毒行血涼血之劑則雖稠密亦能消散易漿易化若妄投峻涼則痘成冰硬誤投參耆則毒為蘊舊焦枯黑陷至不可救費氏曰治血熱無氣虛此之謂也辨氣虛痘證發始身熱悠悠乍熱乍涼肌慢神倦遍體汗出面色㿠白眼眶虛浮睡中微悸或發驚搐目睛上吊呵缺頓悶噴嚏頻起頭溫足冷飲食減少口渴不飲嘔吐便溏小水清利痘點方現隱隱不振淡紅皮薄頂陷不起摸不礙手或雖鮮明根腳不收隙地如寒粟豎起枯澀不活動至三四日陸續不齊此元氣虛弱不能送毒達於皮膚也一二日宜微補其氣氣和則痘出自快若至出齊猶不齊者急以升陽補中微加桂與之元氣內實則痘出不致內攻若妄用攻表解毒則氣血愈虛至不可救矣初發最宜以補氣責之勿謬投升麻葛根湯敗毒散之類蓋法當以補氣為要補血次之翁氏曰氣虛不補則必死此之謂也辨血虛痘證發始身體微微熱面色青㿠白皮膚潤肌肉萎外見青筋及兩耳鼻準俱青白痘點色淡影影根暈淡白根闊腳寬痘色與隙地一般無異兩目倣徨小便清白大便稀溏神靜氣倦唇舌淡白滑潤者血虛也凡治血虛痘證先依氣虛例治之今治血虛而補氣不補血者何也夫氣有神而無形補之則易充盈血有形而無神補之而難收效氣陽而血陰陰從陽而血從氣故氣衰則血亦從之而虛氣旺則血亦從之而實況補血之藥皆雖能潤燥而過用之則滑腸大便溏泄標瘡平陷倒塌之勢立至焉故謂治血虛以補氣為要補血次之經曰急則補氣緩則補血此之謂也辨表實痘證發始身熱燔灼如炙肌膚干炮頭痛如裂惡熱無汗皮燥毛焦煩渴引飲口氣如火兩顴乾紅耳目俱赤眼張如怒喘滿氣急身體疼痛啼聲日夜不絶或腰腹時痛眉宇不宣或脈惕筋抽如欲搐之狀痘苗隱隱於皮下纍日不見不起而礬紅紫豔乾枯不松或陸續出來後期不進有此等之證候者必身無暫安時是為表實急當以發散透肌之劑先發其汗開提毛竅使痘有出路不則凶惡疊出悔至噬臍如誤用黃耆則腠理一密瘡無出路鬱伏不出其死可翹足而俟矣胡氏曰初發不可切用黃耆此之謂也辨表虛痘證發始身熱如爐頭汗如蒸手足似濡痘苗已呈色淡腳弱易出易長一齊湧出肥大明亮而皮薄似於嬌豔至二三日顏面虛浮先期進速微熱畏風寒時呵缺時噴嚏二便清調神情昏憒睡臥安靜色雖鮮明而根腳不實者表虛也大抵表虛必屬陽虛氣虛也凡表虛痘證毛竅疏豁陽氣從汗而泄故忌用清涼發散解毒之劑惟宜參耆飲加減或加減補中之類實表補氣只以辨認不差為要如誤失治則以實攻虛謬人不少或至漿期皮薄水泡清淡或為斑爛漏痘癢塌之患而至不可救翁氏曰表虛痘症易出難收此之謂也辨裡虛痘證發始身熱頭溫足冷自汗微微面青㿠白精神倦怠時時呵缺飲食減少大便易溏小便清白或吐利並起或嘔食不化或瀉利青谷或口不渴便泄嗜眠並起居安靜痘苗雖成分珠而頂陷或窠粒不松突根暈不束領郛郭不長者此皆裡虛也其治以補血為主補氣次之蓋補氣血則脾胃自壯健而三四日後又無陷伏之患不可必拘在初當發之說首尾宜用補益溫補之劑隨其證之輕重而參斟之其痘色以轉紅活為善若補湯太過則致虛證變實當以痘色與唇舌詳辨之翁氏曰虛症變實者非真實也是病淺而用藥過深之失也凡逢此證者先用平劑暫時待之以審詳陰陽虛實而後施治蓋痘證氣不及則陷血不及則塌氣過則泡血過則斑始終以氣血和平為貴魏氏曰氣盛則泡血盛則斑此之謂也辨裡實痘證發始遍身大熱如蒸前板齒乾燥濺血絲鼻孔乾黑口氣如火兩耳如塗朱白睛似灑血面顏紅赤或紫黯毛枯皮燥時惡寒時惡熱無汗肌膚乾涸大便祕結小便赤澀煩渴引飲乾嘔狂悸譫語狂亂如見鬼狀熱入膀胱則小水如紅花膏或如醃魚汗痘點已出紫豔乾紅曾不松突或隱躍於皮下逐漸紫赤焦褐者表裡俱熱實也若伏火伏毒燥炙於內則梟毒壅遏肌肉不能發透或有面眼兩耳如火者或有面㿠白口內黑氣如煤者或有頭面如火手足如水者或有皮膚乾紅痘點如水珠者或有唇舌赤紫乾燥欲裂者或有唇裂舌胎如積粉者其形狀多端不可僂指余可推而知也是為裡實而表肌不和之證也其治在陽明之本宜急用清涼攻下之劑以利為度若不早圖則必有失血喘滿之患謬投攻表之劑則三日若六日而死不可必泥在初當發之說如下後內外鬆解痘出快者隨症治之胡氏曰裡實不泄必死此之謂也辨順痘不服藥發始見苗之時面顏微紅而無黯色枯滯皮膚潮潤磊落出來形尖圓色淡紅肥澤明亮頭面胸背俱少放苗先起口角兩腮二三聯綴痘出熱減諸症自退神氣爽快飲食如常二便無故易齊易長無諸雜證者必順美之徵也不藥自愈凡治稀痘有三禁之戒勿清涼勿攻發勿解毒謂之三禁氣血壯者其毒易化易消不待服藥而自愈若妄施治則紊亂氣血而失領載之功也若參耆太過則不膿成水泡芎歸地黃太過則赤色發斑毒術苓過用則瘡乾涸不漿要之溫補過用則發餘毒若強欲服藥則藥性不寒不熱者可也如五味異功散加當歸桔梗一大匕之類其首尾順症則當用此湯不可易方至十日後於補脾滲濕中微加解毒之味以省餘毒有無是亦宜小連翹飲醫者不可不知也辨熱毒壅遏肌肉痘不發透治例初發見苗之時大熱如燎放點赤色顴腮紅赤隱隱皮下欲出不出及遍身如堆粟或窠粒不鮮明既至三日而不齊出此痘毒壅遏於肌肉火毒不能發越於外故表裡俱病也急宜發表開提以升麻葛根湯或羌活散郁湯或麻黃解表湯之類從其輕重與之蓋陽氣升則毛竅透毛竅透則毒自臟腑出而達於肌表火鬱散則痘得盡顯於皮毛內壅自通若謬治之則其毒不留滯於裡或停黏肌肉雖有良方難以成功起痘之機在此一著手矣其歸重者在陽明之標其所用者皆陽明之標藥也此際切忌寒涼使痘冰伏並遠辛熱恐痘枯涸也必用清輕之劑使痘有生髮之機方無變證此初一節之成法也若放苗位已定則亦宜斟酌焉古人有言嫂溺援以手者權也治痘不可不知此意也辨表虛氣虛血虛內虛治例初發身熱悠悠肌膚柔嫩自汗微微乍涼乍熱精神困倦面㿠白飲食減少頭溫足冷嘔吐便溏痘點方見隱隱不振淡紅皮薄三四日來陸續不齊難長大者則氣虛也氣虛則不能載毒達外故不問已出未出諸症急以保元湯加紫蘇白芷防風治之見點位定之後本方加川芎桔梗與之若見內虛證候者宜加減益氣湯或人參白朮散使其元氣內實調養脾胃瘡向外出不致內攻縱雖血虛痘證勿妄投滋補之藥滋補太過則病未愈而腸滑有大便泄泄之患蓋諸虛痘證率皆依氣虛例治之故自發始確為虛證者不宜投升麻葛根湯人參敗毒湯惺惺散參蘇飲黃連解毒湯之類也辨血熱血實血毒治例夫血為陰重濁象地必資輕清之氣以滋養一身故見其虛則無證為實見其實則無證為虛所謂治血熱無氣虛其理明矣蓋血熱痘證熱毒彌盛而毒氣無所分消也只宜以十神解毒湯升發之蓋血實者其治同於血熱矣又痘齊而血陷不起者是氣虛而不能領逐其血血寒不行也急宜補其氣焉獨血毒者發始毒熾血熱色深紅不潤活肌肉慘暗煩躁悶渴二便祕腹膨脹大熱不退三四日期誤失清解則毒愈枯涸不能上升而運化血悖自瘀毒陷血中為紫變黑如至黑陷則乾枯焦黑致不救矣凡隨證之輕重急宜以清涼消毒行血活血之劑治之矣若毒火衝突血分或成血毒或成血瘀遍體界地不分鋪紅肆溢眼赤如朱或迫血妄行有從口鼻而出有從大小便而出有鮮血數升從上下而出有從九竅而出有從瘍瘡之頂而出其痘或焮紅或紫豔或發血泡或發紫泡或發疔斑身熱蒸蒸煩渴二便祕澀唇舌赤紫乾燥者陰血為毒火所煎熬而失其榮潤錮著肌肉而蝕正氣也故急宜峻瀉血中之火清毒活血湯涼血攻毒飲之類可也諸書多載九竅走血者皆絶證也然亦費氏有言非棄之有屬可治者涼血攻毒飲主之此證希如晨星療痘者宜驗諸辨火極治例發始身體大熱燔灼口氣如火兩耳灼熱兩睛濺血口渴煩躁悶亂時如狂妄氣粗聲啞喘急不寢面目浮腫舌上生胎及唇裂舌炕炕舌三圍白胎通明中央黃黑胎焦爍者是也二便祕結毛焦皮燥肌膚火熱是謂純陽無陰若為火極明則宜急下之遲則不能斡旋三日即死矣惡熱者單下之惡寒者雙解之皆以胎減為度切不可拘在初當發之說也宜用十神解毒湯加石膏大黃或清涼攻毒飲之類此證百中一二不可執以為常若下后里已寬而肌熱未解或泄瀉不止或痘不現者並續以升麻葛根湯或錢氏白朮散之類若下後內外鬆解而痘出快者宜忌升散亦不必清熱解毒若初謬之或與升散是故促趨乎黃泉也如唇舌滋潤者雖見急證尤忌妄下不可不慎矣辨雖利而可下治例初發火褐大盛原非積熱之證既行升散之後出齊之期而有煩躁悶亂乾嘔躁渴不食譫語狂言唇腫舌胎如粉眼怒腹脹或大便祕澀或利青黃汁水加之身熱乾涸痘色焦紫者四五日之間以涼膈散加蜜下之以救陰氣下後唇舌滋潤者六日後宜溫補之若熱毒鬱積腸胃則面顏如火手足如水時腹痛利膿血或有下利如漆如膠數合者如唇燥舌胎如積粉者宜清涼攻毒飲主之如唇舌赤紫無胎而燥裂者宜涼血攻毒飲主之如自發始便祕失下七日後乃變溏泄標瘡平陷不漿則必死矣是四五日期而失下之過也行下雖遲不過六日矣翁氏曰先泄者後結生先結者後泄死蓋以脾濕不解之故也辨熱毒已解相繼用溫補治例初發熱毒太甚則先宜以升提發散而透之至三四日火褐彌盛身體熇熇如炙煩躁悶渴無暫安放先用峻涼清火之劑至四五日內火漸退里證略和痘色未松舌胎滑潤者必勿太過峻涼之藥恐致內傷脾胃外冰肌肉脾胃一受傷損溏泄頻頻忽變虛寒至六七日肌肉冰硬則痘囊失綻突之勢及七八日而不充肥則不灌漿變欲倒陷是熱證變虛其速如反掌矣大凡五六日期而便一泄則熱氣自散神氣自虛是痘證之常也故驗唇舌紅白與胎之潤燥於此虛幾不可補毒幾不可清所爭在於一線之微容少時緩之以待其機之判膽力不雄先迷嚮往之路雖外症未盡除去已知為內虛急與參耆丁桂附之輩宜溫養脾胃如識見不真遂歸廢弛之地故虛寒既徹透於表裡則雖用峻補不可及矣如不曉熱毒已解而失溫補之機則致痘毒陷伏所謂用寒勿省寒用熱勿省熱此之謂也辨虛實不切脈審內外之證張寅賓曰按人身以脈為主三部九候脈之源也七表八里脈之流也傷寒諸證非切脈不能以探其源而痘之一證徒驗其外而不切其脈其故何歟曰珠産於合浦欲求夜光者必入其淵玉出於昆岡欲得連城者必詣其地痘之不切脈者非脈之不可據也蓋病自外輳者如風寒暑濕之感召病自內傷者如飲食憂勞之所成若不診切焉得其詳痘乃稟受形賦之時吉凶已判內重者外亦重內輕者外亦輕故鑿形辨色預知其悔吝之機範簧測臬深得其死生之奧不必切其脈而存亡得失已炳然矣痘疹要訣曰範簧謂聞其聲之清濁詳審其症者測臬謂推明其部位之稀密輕重究吉凶生死者也曼公戴先生所傳候痘之法曰蓋嬰童一熱現一點血先詳肌膚榮枯而一顴其形二察其色三驗唇舌是為治痘之準繩此外無復余蘊矣蓋痘者胎元無形之毒積日延蔓以呈其證本正病也比之雜病大異故治法亦異也治術亦殊也其證自里達表里陰也表陽也故陰病發於陽者生陰病發於陰者死血陰也氣陽也陽道易化陰道易郁故毒發氣中者生毒發血中者死而脈首尾見陽脈者順見陰脈者逆所謂驗唇舌而不切脈者其證與脈大異故也若到中間期內寒綿綿卻見陽脈者陰病發於標故也若痘見陰脈則陰病發於陰故死訣曰臨痘勿論脈之陰陽宜詳其內外之症及唇舌之紅白以為施治之准如以脈施治則難任溫補難任清涼識見不真則惑焉治痘之要但在於研精陰陽盈虧之至微提挈唇舌以為綱領此乃用藥之權衡也辨痘經用藥調養法七條鄭氏曰痘瘡熱蒸毛竅俱開寒暑易於感冒故寒月勿使寒氣襲之暑月勿使酷熱壅蔽之雖然庸醫有以寒月用烈火於房內薰蒸痘兒使痘長髮致兒躁渴癢塌而死者又有以暑月縱冷飲風涼致表裡感寒痘反陷伏而危者是皆偏勝之害也又曰制砂法用辰砂為末飛過再用麻黃荔枝殼煎濃汁攄淨再入辰砂末同煎乾曬過聽用多則三五分為度正氣弱者勿用蓋砂能泄心氣世人發熱便預服硃砂辰砂致痘沉伏不起斯可鑑矣又曰至於飲食則不可失飢過飽如脾胃所好有不宜者但少與之以順其意不可禁固使之忿怒反添火邪亦不可過縱致生他病痘本稱熱病十常九渴世依陳氏禁水致渴死者千萬深可哀痛矣又曰痘家最忌房事月婦腋氣外人孝服及醉酒葷腥硫黃蚊煙燒發溝穢糞土殺牲諸般臭血蓋血氣聞香則順聞臭則逆故也亦不可以此之故常使蒼朮香烟氤氳反致悶蔽變證又不宜對面梳頭不宜掃房內睡時不可驚擾恐傷精神乳母經來易衣佩香囊又曰小兒多不肯服藥故用藥宜大劑濃煎惟用頭服則藥力能勝病矣又云病深藥淺不能去病病淺藥深真氣受傷煎藥每兩用水二碗煎五分以此為例又曰煎藥之法原有經權大約補藥一兩用水二鍾煎五分利藥一兩用水一鍾煎六分是痘家常度也然兒幼者藥不得盡劑如一劑五六錢則於補藥用水八分煎三分利藥用水八分煎五分在人活變善用所謂大劑濃煎補不厭熟利不嫌生者也又曰人身元氣為母胃氣為子胃納香而忌臭逆之則胃氣不暢子能令母虛故四糞散人牙散皆不可用蓋穢濁之物痘中最忌人服貓糞則耳聾人服犬屎則痞不消人牙則咀嚼百物極毒猛烈兒胃脆弱難堪其勢故二方棄而不用也痘疹心印曰虛弱之痘證用人牙散則瘡必為斑爛以其勢猛峻也禁不可輕用古法雖備録之醫家宜慎戒之矣辨用毒藥攻毒管氏保赤曰世有見痘不起以蟲魚腥胋毛血牙骨鱗角等毒藥以發之謂其以毒攻毒也殊不知毒藥損人元氣元氣既伐毒亦愈熾加酷烈之性復為內攻更有何法以救之哉雖萬有一中此乃兒稟本厚者耳不可為常例余往往看世間娶童未痘者一熱不問為何證概用一角愚以為大謬矣蓋痘證雖火毒所致而身熱一發其內自虛腠理開通汗出而後痘瘡始見是常例也所謂順者不服藥自愈其或內外實者火毒鬱伏不能發透毛竅緻密無汗或發或解若毒壅血熱者先以清涼解毒涼血活血之劑治之不得已則用一角可也不用亦可也宜相時隨證一角何必專用之事焉夫一角者骨之餘其性寒其勢猛等人牙四糞之屬故虛弱之人服之難堪其勢凡痘症極美無可用之藥極惡無可治之方其險者在可死可生之界若謬認投之大傷人命大抵痘瘡先實後虛者多先虛後實者少如自發始虛證繁多者切勿與一角以實攻虛豈有可救之理哉夫猛烈之藥服之折神元敗脾胃損傷血肉若胃氣一受傷則內氣敗壞溏泄不禁標瘡平陷倒塌其勢如反掌若至漿期而內虛甚者不免利青糞或寒戰咬牙及內攻外剝之患當此時雖大補氣血終無益矣世醫好妄投之而令痘兒夭札甚多實父母之過也業醫者宜鑑之矣辨廣東人參我邦自享保年中有一種稱廣東人參者人不詳其産處嘗按本草綱目有山漆者張受孔醫便謂之金不換三七云能治血症其味似人參今所謂廣東人參者與古三七形狀相類而氣味功能亦相似疑是其屬歟用諸血症奏功太速亡友醫官桂川甫周嘗謂余曰寬政戊午春荷蘭入貢余依例與使人對語其次質問方法手術及藥物其醫列得吉云貴邦稱廣東人參者原出北亞墨利加玉兒古西土謂之亞墨利加人參我曹得而致之廣東但未能躬涉其土欲求生苗種子而無因焉此藥廣東人甚貴重之以貨換之再轉鬻我邦故邦人謂之廣東人參往往驗之雜病乃澀血之藥也其功與韓參不同能療血證凡大人小兒諸走血或金瘡流血或血痹血勞或婦人産後諸症或痘中經水先期而至及變崩漏榮血愈脫瘡色忽然灰白平塌不漿者其功如神雖然痘之一症異於雜病大抵氣不足血有餘之證甚多血熱血實血毒是也若不韻者謬過用之陰血凝滯泛濫肌肉之間類血熱血毒或出瘡赤色焮發如火或作疔斑或乾枯焦黑乍發瘙癢外剝內攻之患立至焉雖偶有所生者而餘毒遷變引日至危篤者多是皆不詳其證而妄用之令氣血凝結之失也業醫者不可不知也若見虛寒之症候者只宜將國産之官揀參濃煎用之勝夫假韓參之名而誤生者矣辨清涼溫補之衷夫天地以陰陽為紀以五運六氣為綱運有大小大運六十年而一周小運一年而一周歲有太過不及氣運遷變無窮極矣是故古今痘𤺋之方法亦各隨其氣運而作焉蓋錢仲陽費建中俱因大運立言故概主寒涼解毒而少用溫補陳文中聶久吾俱因小運立言故專主托裡溫補而少用解毒可謂俱有偏勝之失矣要之察陰陽虛實之變而悟痘厄之的合乎五運則治痘無不中窾矣雖然余自寶曆年間至於今日視痘不下乎數千人其與托裡補益之劑十中常餘六七與峻涼攻利之劑十中不過二三耳若夫梟炎燔灼二便祕結唇舌赤色者為貴清涼攻利之峻虛證繁多餘症平準者為貴托裡補益之常但病無定證方無常策不可拘拘熱一辨認氣血盈虧之至理隨症治之為良醫之手段矣且療傷寒諸證古今同其規則至痘世殊其治且考古今之治有年季相同有方法相違錢氏宋熙寧中人費氏清乾隆年間人熙寧乾隆相去凡八百餘年然二子所據相同其以大運主焉陳氏宋淳祐年中人聶氏明萬曆年間人淳祐萬曆相距凡七百餘年然二子所據相同其以小運主焉夫大運者積歲既久五運四節互有緩急故歲氣順逆之變纍纍續至為彼凶年是必然之理也是故歲位主少陽相火太陽寒水之歲則人悉感燥濕之瘴氣其病必熱是固歲氣之所以令然也即因大運治之可也夫小運者積日不多雖有風氣相違亦不失其常理故守其常而合其變以治之則何過不及之失之有而今治痘者不究群賢之明鑑妄懷偏闢之陋心往往多用清涼攻利之劑不知用之之過氣血虛耗不能收功遂陷黃泉者不少也雖乃天稟素厚之兒不幸遇此庸醫詎得免非命之夭哉嗟我邦數百年來無一人議及此失者故余備録於此以示門人受業者雖然非志此術之至深則安知此言之不誣亦唯俟千載之子云也爾先君嘗示治痘須知大運論始出費德崶救偏瑣言而及其自序所言尤為詳審其略云民病固因六氣而轉六氣之運本陰陽太乙而分時行物生寒暑代謝陰陽在歲位也總持歲紀充積其數陰陽有大運也必甲子一周而一氣之大成始伏將來乃進自不規規於歲位而得滿充積之數者是則民病之改易其應大運可知蓋大可以覆小小難以該大萬化皆然逐年歲氣大運之散殊也計歲位而紛更者不明運氣之大局也執一局而不移者更令造物無陰陽化工無運氣矣往昔痘多虛寒大運在寒水也今多烈毒大運在相火也相火之為令最厲民病多暴邪陽烈毒亢極似水惟此運為然痘值其運無惑乎血熱更多惡暴間有氣虛陽中之陰終非昔之虛寒並例往昔寧無血熱陰中之陽終非令之烈毒等象乃知痘之不同出自陰陽而陽在相火更見獨異無論與濕土寒水陰陽殊絶即如風木木為火母風且動焉非純陽之自乎雖火曾有待而陽局基之是將乘未乘之象也如燥金金屬秋陽燥因火至非純陽之後乎雖盛余必謝而火局猶存是將除未除之象也二氣不得與亢陽比議猶謂其陰陽之界耳乃若君火旺夏而象離敷榮暢茂物皆賴焉火故名君純陽得令之象若過而及熾不幾與亢陽無別然君火雖熾水一制而正令即可復也相火獨異焉者大虛之邪陽不藉木生不受水制五行常道不能閒其局者應痘烈毒如斯令不御之於格外垂斃何挽是道不求合運氣總以四大機關一一深求而參合之迪知病真之所在便覺運氣之所致不求合而自冥合得其時措之宜操縱惟我人見為異我得其常亦何偏之足云神理不逾常道惟在會心者得之余之妄作恐在暗中摸索此費氏追補之文學者所當參考也然而痘本陰病其治常宜溫補萬古之通論也法曰痘出七日氣血送毒悉出肌表以此日為界限之期內必空虛空虛則靜靜則生寒又曰血化為水水化為膿膿者生不膿者死膿之約後多實膿之豐後必虛皆所謂所以宜溫補者而歲運在陽時猶當不離此常理矧時運在陰乎費氏其非不知之者彼專在以偏救偏而已後學不會微意妄執殺人實亦費氏之罪人也汝徒當靜思焉此奫等數年所佩服而及觀本條論運氣既遺此大義錯誤亦多蓋因生徒妄作奫豈可不辨哉其曰錢費因大運故概主寒涼解毒陳聶因小運故專主托裡溫補此似以大運直為陽運以小運直為陰運者殊不知大運小運各自有陰陽大小之名始非陰陽之別此蓋不知費氏者之言耳抑與篇首謂大運六十年而一周小運一年而一周者亦相抵牾決非先君之筆也再觀凡例云凡痘疹必因歲氣故今舉前哲歲氣說一二而今編中並無載前人歲氣說及考初稿本乃有辨歲氣一篇舉朱噓萬大都症候相似氣運令然也同時同地一概無異非氣運而何大幹涸者火鬱勝吐瀉肉腫者土鬱勝枯燥喘促金鬱勝彼此凝伏水鬱勝鬱而不出木鬱勝火鬱清之土鬱平之金鬱潤之水鬱溫之木鬱發之書云責之於症不必求之於經其此之謂歟及費氏前文此正與凡例所言者符而其篇末有附折清涼溫補之衷一篇及以與本條比校大有異同如上層所注觀者請詳察焉
