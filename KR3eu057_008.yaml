body:
  text: 卷八辨夾蛔本原痘瘡夾蛔者古來以為難治而其症候多端且無定局余往在京浪之間每值此症茫洋不能下手苦心熱腸漸有所得乃撰為數條以示門弟子云安永天明之間痘瘟行於京浪之地其時夾蛔者十有二三自寬政九年之秋逮翌歲之春東都市廛列戶大人嬰童罹蛔梟者稍多十已有五六是亦非歲氣之所以令然者耶文化三年痘疫大行乃夾蛔者強半殊見怪異之凶候但據古人之立法以審探而治之則藥之奏效如桴鼓相中影響相應也又自翌年丁卯之冬越丙辰之春夾蛔症者十居七八皆在初熱見點起脹灌漿收靨之期凡在初發之期蛔蟲自口鼻出者險也尚屬可治如夫變逆則生蛔自大肛出而搖動者十之八九不免死也蓋糞死蛔者多無妨害凡候察之法雖固無定局而就法視之辨認伏蛔蛔厥之二項則起死回生之績如反掌矣翁仲仁曰痘中見蛔者死難聽生也萬密齋曰痘中夾蛔者作重謂之狐惑甚罹忌危也朱丹溪曰痘中見蛔者屬熱是初發之驗也夫蟲者待天地之氣以成形者也何為而在於人之腸胃中乎蓋人乃小天地故人氣亦天地之氣也而且蛔之生於腸胃中豈無假而成形乎飲食入胃不能消化或魚果肉醢生曲硬飯等之類停蓄胃中濕熱相釀薰溽黏膠以為其形譬如糞場汙穢中自生蚯蚓也余因稽之蛔者陰蟲也其變必有胃寒也若糞死蛔者乃腹中陽氣未竭盡之徵也寒陰在腑故是為險症然得生者多如糞生蛔者臟腑悉寒而為純陰無陽故是為凶逆其死在於旦夕矣凡糞死蛔者唇舌青紫淡紅而渣滓糞生蛔者唇舌淡白虛冷而滑潤乃陽氣欲絶之徵也蓋痘之熱毒五臟百骸無不激動故蛔蟲為熱所困無所蟠屈而後為此凶梟乎又有常伏蛔者其長五六寸或尺許又有痘之毒火薰蒸於胃以産蛔子者其形分余或寸許如白繭絲數條作塊繞宿糞而出解碎視之則蠢然搖動者乃蛔子也其形狀不一不可不察也疏工醫每逢此證倉皇失措或以為毒氣內攻袖手待斃真可哀憐也蓋痘毒內攻者出瘡平陷根暈離散煩躁悶亂而氣急也如夫蛔蟲沖沖心腹則諸瘡遲滯煩悶頻渴寒戰咬牙凶逆疊出時止時起者是其候也又案對薇玉案獨舉肺蟲之説其言無據不足信矣余又考之蛔伏胸肋之際者必從口鼻而出者潛腸胃之際者必從大肛而出焉發始時生蛔卒自口鼻出者多無害中間以後生蛔自大肛出者為凶險此亦不可不辨知也辨夾蛔諸證一發熱放苗時心煩悶渴胸腹時痛動氣上下不定嘔吐乾嘔身熱微微痘點遲滯血色影影心氣鬱冒如醉言語錯亂為奇怪之狀者蛔蟲上衝心下也先用升陽散郁之劑開提毛竅兼與殺蟲之丸散一見點之期痘色平順寢食無故熟睡寤後妄談狂言無暫安放漸醒如常時煩時渴心下有動氣鬱結不宣痘苗隱躍於皮下而不松突唇舌淡紅痰黏激口中者蛔厥也其治如前證一痘點已出腹脝時疼腸鳴心下悸正飲食而嘔噦不已午前頻渴申後且休或動氣在心下時煩時渴或睡已寤譫妄狂言不省人事醒復如常無定局者蛔蟲也急宜與黃芩加半夏湯加烏梅川椒鷓鴣菜一初熱微微瘡出平準至三四日身熱干炮悶渴乾嘔時起時止唇堆腫如火舌淡紅滋潤神氣昏倦思食嘔氣頻發或生蛔自口鼻出者是為險症急宜治之主方如前證一發始因吐瀉而發透者放苗淡白曾不起突越二三日胸腹時痛時止悶渴好沸湯睡臥不寧心下痞塞或吐涎沫手指足指共厥者氣血虛耗加夾蛔之症也急宜用加減益氣湯加烏梅川椒地丁蟬蛻一火熱二三日痘點已現赤色如火大便未解小水赤澀腰腹時痛痛脹不定煩渴引飲須臾復休神氣昏憒狂妄非常動氣衝心下及呼吸促迫手足時冷寢食不安者急宜解其圍於是見蛔梟之候者宜四順制蛔湯大便一通表裡自和則斟酌可治之不必盡劑一痘出至四五日瘡色如絳起突不快按候心下脹痛不可忍也動氣時起時止發渴不定飲食略易睡中稍搦寤後譫語躁亂如鬼魅之作祟殆失其常時吐白沫者蛔蟲之候也若當此時蛔症重者不拘治痘先宜治蛔蟲為要黃連安蛔湯主之或二陳湯加烏梅川椒黃連一痘出平易至五六日溏泄一兩行諸瘡平塌失鼎峻之勢根暈淡白根腳不實寒戰咬牙並起唇舌淡白者虛寒之候也急宜峻補氣血若加之渴飲且頻且休寒戰咬牙忽休忽起寢食或寧或不寧不終日見變局者蛔蟲也此症雙唇堆腫燥裂舌淡紅者也宜與附子理中湯加烏梅川椒炒黃連鷓鴣菜治之一痘至六七日漿色將向充實忽然遲滯平塌不進心中煩悶寢食不寧煩渴或止或起脅腹動氣發作有時肚腹微痛乍止乍起大便快通小水清利睡寤妄言錯亂為奇怪者夾蛔之候也急宜殺蟲之劑理中安蛔湯主之一六七日以上寒戰咬牙唇舌淡白虛冷眼鼻不封塞者虛之極也痘色淡白根血不實若當此時加溏泄者表裡虛寒而陽氣將下脫之徵也急宜以峻補之劑救之若瘡色未至淡白根暈如故或唇堆腫焦紫而形如嘴舌尖純紅滑潤動氣上衝心胸腹痛上下不定發渴乍休復起手足煩熱類壞證者夾蛔之候也先用木香散異攻散之類兼與理中安蛔湯若寒甚者加人參熟附各二三分一七日以上痘稠密而乎順惟漿色不滿足精神略倦寢食共易雖無他凶證而生蛔二三條從大肛走出色㿠白動搖者必死一七八日漿膿半足肌肉腫亮眼甚不封鼻甚不塞鼻孔稍開流清涕者起發不充之候也於是有寒戰咬牙之證而肌表懍栗手足微涼寒熱往來唇舌乾紅燥裂二便清調者似熱非熱似寒非寒陰陽變幻殆不分明者夾蛔為壞症也不拘熱候急宜溫補氣血兼與理中安蛔丸一八九日遍身之痘頂陷漿色不充此痘必當靨不收結者也凡眼鼻略開雙唇堆腫如嘴語音啞嗄沉吟聲微寢食不寧鬱冒神倦心下痞硬時有動氣腸鳴時痛利青糞者夾蛔為胃寒也急用聶氏建中湯溫補脾胃以兼與理中安蛔湯如寒甚者加人參熟附子各三分若糞死蛔者多生糞生蛔者多死一痘出稠密中間雜症並起漿膿不充漸至九十日靨痂乾澀牢封形色似鐵甲而不澤突精神虛餒睡臥不寧飲食略安言語啞嗄兩眼矇矇欲開鼻孔如塗煤脅腹時痛心下時悸小水清利大便稀溏舌尖紅赤雙唇淡白帶水光寒熱往來者是為狐惑乃伏蛔之候也此證綿綿引日於三七日之間下利生蛔則不待三日而必死一十十一日收靨之定期也而面腫略緩小水清利精神爽寢食寧唇舌滋潤者生之兆也若痘稠密者瘡痂不盡干收惡臭沖人或有蒸蒸熱未除唇瘡如堆粟而黃硬者或有其形如蕎皮而舌淡白無神者或痂殼厚如老松皮手足水疱如葡萄樣痂疕濕不幹鼻開聲啞寒熱交起譫言妄語動氣在心下寢食不安胸腹雷鳴時疼時悶無定極者蛔蟲之候也若糞生蛔者多至十二日而死緩則至十六七日而必死一十一二日收靨之終也於此期夾蛔者當唇不靨為蛔熱所困氣血虛耗至期不能回水面腫未消眼欲開而未開雙唇乾澀而作渣滓舌心淡灰滑潤小水頻數大便滑泄寢食不寧胸中煩悶鬱冒不宣語聲沉吟筋抽脈惕心腹微痛蒸蒸心熱證自壞煩渴不飲或好熱飲不知熱默默好食困憊嗜眠其無定程者乃蛔蟲為梟也而寒熱交起者為壞症又雙唇堆腫如嘴作渣滓者為狐惑延綿引日越三七日而後利生蛔者不待三日而必死矣若利死蛔者十救二三惟宜理中安蛔湯主之若餘毒遷變為凶險者兼與忍冬解毒湯治之夾蛔用方加減升麻湯發始身熱為痘未明白疑似之間以此湯探之若有夾蛔症兼與黃連消蛔丸可也方見於初熱之部加味升麻葛根湯痘苗已現未齊兼蛔梟者於本方中加烏梅川椒與之若身熱甚者加酒炒黃芩方見於初熱之部黃芩加半夏湯治初發見點二三日之間蛔蟲沖沖心下嘔吐不止者方見於收靨之部加減益氣湯見於初熱之部四順制蛔湯痘已見至三四日火熱未解下唇純紅如石榴花腹肚時痛大便未通小水赤澀動氣衝胸肋者蛔蟲也此湯主之當歸芍藥大黃酒炒鷓鴣菜各大甘草減半烏梅地丁各中胡黃連雄黃各少許上水煎溫服臨欲飲時加雄黃末黃連安蛔湯治蛔熱為壞者即理中湯方內加黃連薑炒一錢烏梅川椒黑炒鷓鴣菜各五分水煎溫服為丸亦可二陳湯治痘中有痰飲嘔吐不止夾蛔者半夏茯苓橘皮各等分甘草減半上生薑二片加烏梅川椒各一錢黃連炒五分水煎溫服理中安蛔湯治痘出五六日後內變虛寒而蛔厥者人參白朮黃炒乾薑黃炒甘草炒烏梅川椒黃連薑炒減半上水煎溫服若溏泄頻頻虛寒甚者加熟附子五分若蛔蟲綿密者加鷓鴣菜一大匙此湯或為丸亦可木香散異攻散共見於起脹之部聶氏建中湯見於灌膿之部忍冬解毒湯見於收靨之部消蛔丸治首尾蛔蟲之要方白朮黃炒茯苓乾薑黑炒甘草生烏梅各一錢黃連薑炒胡黃連雷丸各五分雄黃少許上細末糊丸如麻子大計兒之大小與之自五粒至十粒二十粒一日兩三度白湯送下清熱除疳丸治痘經數日蛔熱作壞欲成疳療者方見於麻疹之部痘中夾蛔之候有多端焉大凡與殺蟲之劑則有速下蛔蟲數條而愈又有其病全愈而蛔不下者由此稽之其所蟠屈應有腸內腸外之別也蓋在腸胃之中者直奏殺蟲之效又在腸胃之外者即怕其藥氣直遁而伏腑下膜原之際故雖不速下而凶逆自退表裡俱平如此症者痘後宜用消蛔丸或有經日下數條者亦有終不下者是即從容消解之完策也門人某語余曰往有以罪被刑者其人平生病喘故請官而剖體視之肺之二葉枯凋凝結其堅如石且於肋骨間看死蛔二條余聞此言抵手喜曰余發明蛔蟲腸內腸外之説久矣然古人未或之知也故無書之可證而今得此徵乃益信吾説之確乎不可易凡夾蛔之症余精驗之曾無定狀欲究其奧臨局懵然蓋有痘症素輕而夾蛔之故凶逆蜂起者庸醫不知其為夾蛔妄執以為痘毒內攻而治之遂至不救可憐不用對症之方而斃於非命矣凡順痘加蛔者隨治而生若謬失治則死險痘加蛔者死生相半逆痘加蛔者必死勿治但不抱偏闢之心不泥痘瘡之方專以治蛔梟為大緊要此可謂變通妙諦也矣
