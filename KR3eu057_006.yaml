body:
  text: 卷六辨收靨三日夫進德通伎者不遠釣利弋名之心則未有能入其神理矣然他藝猶有忘利遺名而樂其業不知老之將至獨為醫者率多利名之徒為之故不免訪病遲疾其輿執匙良惡其藥苟以利名之心求之則何所不至古云陽作惡者人誅之陰作惡者鬼誅之其可不怕鬼神之誅哉況痘瘡小兒之科將長而折之將壯而夭之乖戾天運之理乎陰有瀾痘疹一覽曰痘瘡自八九日至十一日二日內外大熱已定灌漿滿足膿汁漸干或如蒼蠟色或如葡萄色或如香灰色先從人中上下口鼻兩邊收起漸至項下額上遍身及兩手兩足一齊收盡痂厚色黑逐漸脫落飲食二便如常身體輕快別無他證者此大吉也又九十日候曰瘡痘成膿之後鮮明肥澤飽滿堅實以手拭之瘡頭微焦硬者此欲靨也然大小前後最宜漸次收結既不失於太急又不失於太緩其已靨者痂殼周圓而無凹凸及乾淨黃潤無淫濕破濺者是為正靨凡人中者督任二脈交會之衢痘疹先從此處出收斂結靨為陰陽和暢若於頭顱手足先痂先褪者攻心莫救痘瘡收靨貴整齊而干如螺靨者上也頂破膿出結如雞屎殼者次也破爛無痂者下也凡遇此等收結便須詢察其犯何逆若血氣本實誤投補藥邪毒得補反饋正氣如火爍而爛宜天水散解之邪火退而收結齊矣痘至十日毒氣已解則膿轉黃色又變蒼蠟矣元氣實者靨必循次而結如口角與陽物先結者正收也身漸輕快腫漸消解眼朦朦欲開食倍常量二便無故從上至下逐漸收靨結痂後色紅者可無慮焉如結靨時身忽發熱亦不必慮乃蒸熱作靨也凡一時靨盡或隨即落者毒火爍也急宜清涼解毒之品解之此證必膿未充肥故也如聲啞煩悶喘促不食者死期迫矣如毒在肉裡者必發癰腫而生如毒在皮毛者必為臭爛而生鄭氏痘經曰痘出稀少四五日胖如豌豆六七日血靨痂干亦似丹砂九日痂落此氣血充足隨出隨痂不及釀膿也此痘極佳也百無一死此名血靨痘按此痘痂後只有餘毒者十中五六不早圖則多為廢人自九日後宜補脾解毒驗之可見翁氏曰痘瘡八九日漿足之後別無他證並以此方調理氣血資養脾胃不拘氣虛實熱之二症先可服之保嬰百補湯主之有餘毒者去生地山藥加防風荊芥連翹名小連翹飲若惟九十日漿足之後虛寒未盡去者乃保嬰百補湯加黃耆肉桂與之辨收靨三日虛痘治例凡痘出時一點血化為水水化為膿膿滿為結痂封藏斂束渾如螺靨此毒從外解是正靨也而膿成之後不結痂者反成腐爛和皮已脫當靨不靨是氣血虛寒故也聶氏曰九十日間膿足而色蒼蠟者必且發熱薰蒸此回水之候也蓋真陽運化其水自然消爍而收靨也其元氣不足者不能及時回水而當靨不靨此虛寒也身涼而手足冷唇舌淡白者須大補氣血助之收結宜用溫表調中湯主之凡痘瘡八九日期倒陷倒靨者有二證一攻發而生一溫補而活蓋攻發而生者緣風寒穢氣也溫補而活者緣內泄虛寒也如瘡掀發忽然為癢塌破損者外感也急宜攻發如根血塌闊內泄唇舌淡白者內虛也急宜溫補如面上瘡破壞者與藥後復加腫灌額前手足原無瘡處又復出一層痘雖則細少朝生暮膿者活不膿者死是謂翻空痘翟氏曰如痘色淡白皮薄頂陷身涼惡寒大小便利寒戰咬牙者建中湯主之痘出中間雖多侵氣虛而首尾不失調理其漸奏功而及九十日忽然乾熱當靨不靨者表裡俱虛故也孫氏曰痘系危證氣血本虛多服補劑而漸有膿色將收靨雖有熱者只於補劑中加涼藥可也若謂將靨而去補劑竟與涼劑更加下利藥欲令速靨是速其斃也蓋虛者復虛反內攻而死此必然之理已然之驗也十全大補湯去地黃肉桂加防風桔梗山楂如內虛者人參白朮散去葛根加黃耆肉桂治之痘症氣血虛薄漿色虛餒中間夾證雜出則有至九十日或泄或渴或不食雖漸收功而痂薄不幹結者萬氏曰或泄瀉氣虛脾胃弱津液少肌肉虛而不收者內服陳氏木香散外用敗草散或因渴飲冷水過多以致水漬脾胃濕淫肌肉而不收者內服五苓散如因食虛而不收者人參白朮散去葛根加桂主之已上證以法治之已潰者結痂薄未潰者結痂方為佳兆也若痂皮俱不收結者成倒靨不治如虛寒證甚者建中湯可參考凡痘瘡漿足後將靨而或微渴或微熱或微癢者痘之常候也不可加治如其病愈甚而成猛烈之勢宜察唇舌之紅白究陰陽之變幻以施治翟氏曰八九日漿膿足諸證平準只煩渴不休者急宜補中益氣湯合生脈散治之如九日後發癢剝去痂皮或血出或不出仍復灌漿如瘡疥者此血熱氣虛也宜八物湯加紅花紫草牛蒡子治之若瘡欲靨不靨其痂欲落不落當辨其寒熱虛實施治若身熱作渴飲湯此脾胃氣虛也參苓白朮散木香散六君子湯治之聶氏曰九十日後若其發熱稍緩頭熱面不甚熱手心熱腳心不熱手背腳背不熱精神困倦大小便利者虛熱也宜用補中益氣湯治之萬氏曰若九十日後晝日安靜夜間發熱者血虛也宜用四物湯加柴胡山梔子治之痘前發驚者多生痘後發驚者九死一生蓋痘後發驚搐者氣血虛耗毒氣亦未盡解故其治甚難藥要其時又要其當病勢早退小水利者生不利者死蓋脾虛而肝木乘之動於心火故也張霞飛痘疹集成曰用清神散火湯而痘後驚搐藥對病者可治若連發不止者死證也極惡者一發必三日死朱氏曰驚發痘後諸書莫救者是目閉無魂而兼吐瀉及唇白肢冷等證也如痰熱內甚小便閉澀或素有驚疾又屬可治鎮驚丸安神丸兩藥俱可服丹溪捷徑曰傷寒吐蛔者屬寒痘疹吐蛔者屬熱所謂初發之驗也翁氏曰痘中蛔蟲出者死難聞生余往驗數千兒初熱之時見蛔而其形褐色如爛者屬熱多無妨若五六日後見生蛔或自口鼻出或自大孔出其色㿠白自搖動者屬胃寒急則九日十二日死或延綿引日寒熱往來好睡默默不食變壞證而死者十中八九萬氏曰屬熱者黃芩加半夏湯加烏梅川椒屬寒者理中湯加烏梅川椒黃連如虛寒甚者加熟附子附痘中見蛔一治驗東武木挽町佐久間彌右衛門孫年已四歲出痘於丁巳春始邀三兩醫觀之皆為不治辭之仍急邀余往看之瘡甚稠密無空隙地頭面灰白平塌不松瘙癢將起雖其勢猛烈幸離環跳之部是天不令此兒夭死矣但起脹六日而溏泄未休寢食不寧神情昏憒是表裡俱虛故也乃問前狀父母答曰發熱三日俄吐生蛔一條爾後乾嘔略安但雖憶食不能口之余曰痘中見蛔者必鄰於逆雖病藥適合多不得生辭之再三懇請即以大保元湯加減與之次早瘡色略有松意泄泄未止即照前法兼與參附大劑既及八朝頭面漿色半足凶逆稍退時利青糞因投聶氏建中湯雜與參附濃煎如前貫至十朝膿漸充肥神情未爽復利活蛔數條寒熱交起大類壞證乃案是蛔厥之證也此痘確雖得生而凶險之症未悉除今欲治之宜先治蛔蟲為要更與附子理中湯加烏梅川椒黃連貫至十五朝面瘡收功內證未除引日寒熱時起時止寢食稍寧尚以前方去附子以與逐日痂疕厚突後發腫毒數核仍投忍冬解毒湯三十五日而全快焉此症甚夥詳見夾蛔方論辨收靨清火治例凡靨後諸症千端萬項難悉盡於筆端矣大都惟辨中間諸證及膿之豐約何如則諸症炳如觀火若漿色豐滿則靨後諸症多屬虛此宜補益如漿色疏約則靨後諸症多屬實此宜清涼如虛實不詳則驗唇舌紅不以處方乎無不中的矣汪若源痘疹大成曰十一十二日身不潮熱飲食不減者不須服藥若發熱當靨不靨及痂落無托靨者宜解毒飲主之又醫宗金鑑曰痘不當收斂之時忽一時收斂者更現症周身窠粒乾燥口渴發熱煩急不寧此毒火壅盛之故也宜用清毒散主之凡雖梟毒太盛而毒在表者痘雖稠密不足畏慮但中間或涉春冰靨後復蹈虎尾等之痘證尤為險重盧氏曰或六七八日痘色紅兼紫毒盛者或十日後壯熱不結痂雖結不實狀如蠟滓不幹結者犀角解毒飲加淡竹葉三十片主之痘出至六七日有臭氣者逆也是肌肉腐壞之氣也必死痘巳收結九十日後才有臭氣者此痘成就之氣也邪毒自內而出也故為吉李少陽曰臭痘原來徹陽明膚囊潰破流漿膿臭盡毒除成美痘若教凹爛痘還空觀此痘之臭者泄其梟毒而不至殤傷臭而爛者戕其元氣而竟難全活若痘臭或靨或破者生囊不盡脫者生紅活見血者生身熱氣蒸者生不癢不燥者生此臭痘生之徵也皮肉黑爛者死破處乾黑速收者死傳人毒痛者死頭額脫皮者死指爛入筋者死陽球爛穿者死口內惡臭者死兩脅汗不幹者死此臭痘死之徵也痘後餘毒遷變氣血敗壞痘素稠密膚皮脫落不收者乃似癩病是謂痘癩萬氏曰氣血虛弱痘瘡易感穢毒疫癘惡氣瘡本稠密身無完膚瘙癢難任肌肉潰爛此為梟急用大補氣血清熱解毒之法庶可求全凡瘡破成癩者用十全大補湯微加清解之味療之外用滅瘢救苦散塗之痘至結痂之時察其結局必以五驗一曰疹二曰癰三曰目疾四曰走馬疳五曰疳蝕瘡再觀餘毒有無淺深當疏利者急宜疏利當調補者急宜調補若身熱煩渴二便祕唇舌赤色或白胎通明者是餘毒也宜隨其證治之聶氏曰結痂厚實無他症不必服藥如結痂後發熱或煩渴當辨其虛實調治之發熱壯盛胸腹手足頭面俱熱大便祕小便赤澀者餘毒猛盛即當解毒大連翹飲主之若解毒遲則痂落後必發癰毒如夫大便祕者加酒炒大黃微利之如虛症變實而有餘毒者宜忍冬解毒湯主之痘後餘毒太盛者遷變種種為大患多屬誤治嘗謂疹癍丹及癰痍眼疾疳蝕瘡走馬疳其名狀雖不同是皆梟毒擁遏於肉裡骨空皮毛之間之所致其原歸於一也故雖有輕重而屬可治臟內實無郁毒故也費氏曰毒盡元虛保元為要縱有實中虛虛中實亦權其緩急輕重而因應之不可遺其重且急而反迂務其輕且緩也若執以痘後無實證總歸虛治誤之甚矣治痘痂褪大局無慮痂少榮潤熱欠清和防餘毒竊發者忍冬解毒湯主之痘稠密者當靨結時青蠅慕其臭氣來於痂殼厚嵌處集𠷀膿黏偶或遺卵則直成蛆是謂蛆痘此痘必無死證吉兆也袁皓孟痘疹全書曰痘里生蛆八九朝蛆盤臭達命堅牢逐蛆法內用清涼解毒之藥外噙絲瓜葉搗汁噴之痘上其蛆自出又有痂皮厚不能出者須用銀針挑破滴香油在內凡蛆蟲見油即出或又以忍冬菊花各等分花椒少許和沸湯薰洗亦可也痘至十日後煩渴未休而有身熱者有不熱者宜詳虛實而治之萬氏曰痘根煩紅漿色充足能食渴者肺熱也經曰心移熱於肺傳為膈消治在上焦人參白虎湯加黃連一大匙如自利而渴者屬少陰虛治在下焦宜溫之異攻散主之如不能食而渴者脾胃虛也治在中焦參苓白朮散主之凡及靨期如火燒煙薰者生死最難決焉如聲亮神爽寢食無故二便清調唇舌滋潤爬破血膿淋漓者得生治於補托中兼清涼如唇舌乾燥或胎黃黑二便祕結譫語呢喃者單宜清涼解毒如聲啞不寢不食破處乾黑煩躁氣喘者必死莫治費氏曰九十日後至梟毒烈火血熱之極早圖之如火褐未解皮表牢封無所泄故乾熱成倒靨不可救矣汪氏解毒飲加黃連蝮蛇治之或代白蛇好如火褐太盛煩渴引飲神氣不寧者清涼攻毒飲宜參考附痘毒不混他病一治驗浪華南堀江傭夫年二十四歲己亥秋出痘原患黴毒骨節痛疼因疲瘦非常神情困倦兩耳項頸間發腫毒數塊乃如瘰癧狀一夜發熱放點堆聚簇簇無縫至灌漿期面上一片模糊不分口鼻但當以意摸索五竅然精神略亮寢食稍寧瘡自掀發且有松意已當靨期而不靨至十二朝干蠟如火燒煙燻壯熱如蒸譫語狂妄煩渴不休此雖里毒全解而餘毒壅遏於皮毛痂殼牢封而無所泄故余炎不能宣發依是為此梟惡之症也因以汪氏解毒飲加黃連蝮蛇一大匙與之次早遍身頭頂剔破如龜甲膿血淋漓臭惡沖鼻凡過一百餘日並舊疾而愈舉家大喜如得拱璧比及周年頸項腫毒漸發如故乃知痘毒之不混他病也姑存案備參考之一云凡痘稠密者以十二日為開眼期如痘密不及期而開眼者便類倒靨又有過期而不開者宜驗密之聶氏曰有忽然頭頂大痛者餘毒上攻也或因多服熱藥所致若不急治其毒注於兩眼而目病大作矣宜用大連翹飲去木通車前滑石加升麻六分川芎薄荷各四分服數劑以解散上攻之毒庶可免目患若又痘瘡首尾平準而十二三日之後卒然目赤痛者急以本方加大黃宜微利之應手必愈凡痘稠密至十二三日開眼者痘之常候也都十二日後開眼至十六七日再復目閉不能開而淚汪汪出者目中必有赤脈是欲作眼疾之徵也急圖之遲則多生翳膜難愈翁氏曰如十二日後毒熱留於肝經則為目翳為赤色急用瀉肝清涼之劑羚羊角散主之所謂眼疾餘毒悉皆屬誤治故業醫者不可不知萬密齋曰痘後欲開兩目而向暗則開兩目不赤嚮明則閉又不流淚此肝經火邪未去也是謂羞明涼肝明目散主之痘十一二日而面腫漸退即開眼者症之常候也若他處腫消而上唇獨腫不退唇外牙齦時濺血者欲作口疳之兆也急宜治之朱氏曰凡口疳皆胃熱之所致有輕者有重者有生者有死者滿口白糜或紅點簇簇或齒齦濺血者輕症也急金不換擦之如唇舌腫硬牙齦黑爛臭氣衝鼻者重先以清胃瀉火湯加犀角石膏療之或清涼攻毒飲主之如面腫唇腫穿鼻破頰潰喉腐熟寢食不安者臭惡甚連齒脫落者死俗呼走馬疳是也出瘡稠密而氣血為之耗虛藥餌不謬漸得生活雖然有經數日而氣血不歸元者丹溪曰凡痘收後手足忽然拘攣不能屈伸運轉者此因血少不能養筋又或感風寒濕氣致此症者不可輕用發散恐反耗其血只補血此祕訣也用當歸桂枝湯如感風寒骨節痛加羌活防風如氣虛加川烏引經再加人參又曰痘痂褪後面目虛浮四肢腫滿者此屬於肺因表虛受風濕之氣宜汗解之用五加皮湯或腹脹如鼓目胞微腫者此屬於脾因脾胃素虛飲水太多水蓄於中滿而不去五苓散加燈心滑石如有餘毒口渴不休全身腫脹者忍冬解毒湯加燈草滑石又傷食脾胃不能消化濕熱內蓄者宜以利解厚朴湯主之如虛腫者不可妄投藥隨症治之又宜萊蔔丸主之又曰痘瘡出後衛氣最不宜傷故收靨之後衛弱而汗出也汗常出者謂之自汗睡中汗出寤則乾者謂之盜汗此由胃弱不能斂束六腑榮間有熱而為汗此證在內為血在外為汗以黃耆湯為主盜汗以當歸湯為主又曰痘後有神昏喜睡者但精彩不與人相當形如醉人亦多妄語此邪熱入於心心為君主之官不肯受邪傳於胞絡治法以導赤解毒湯主之兼與安神丸加牛黃末亦可也凡痘後餘毒遷變有遍身生瘡疥而為種種之狀者或有日夜痛癢難忍其形如疥痂痕侵淫皮膚潰剝膿血出者謂之檮杌痘又或有發落爪拔遍體生瘡如癩十指悉臭腐而為廢人者二證俱屬可治急以托裡清熱解毒之劑治之又或有身發紅點不痛不癢不作窠粒者是乃癍也急宜投化斑湯加玄參地黃又或有發赤火丹瘤者此惡候也其毒紅腫作痛流移上下手足其治法內用小紫胡湯加生地黃或玄參化毒湯加犀角外用砭法去其惡血否則頭上起者下過心即死足上起者上過心腎即死此證甚逡速者也處方不應者宜清涼攻毒飲此數項有志痘者最宜書諸紳矣收靨結痂用方保嬰百補湯治痘瘡八九日漿足之後別無他證者當歸芍藥地黃白朮人參茯苓山藥甘草上八味水一鍾加棗二枚煎六分溫服如或十日後無餘證者去地黃山藥加防風連翹荊芥名小連翹飲所謂補脾滲濕之中微加解毒之味者即此方也溫表調中湯痘至九十日當靨不靨此虛寒證也必身涼而手足冷唇舌淡白須大補氣血而助收結此湯主之蜜炙黃耆二錢人參白朮白茯苓官桂大川藭當歸身炒乾薑各一錢防風八分白芷丁香熟附子各五分上十二味生薑一片同煎溫服五苓散治飲水過多以致水漬脾胃而瘡不收者豬苓澤瀉白朮茯苓肉桂各等分上五味水煎溫服六君子湯即於四君子湯方內加陳皮半夏者也生脈散滋生精氣培養真元補心潤肺之良法也人參三錢麥門冬三錢五味子十五粒上三味水煎溫服黃芩加半夏湯初發二三日之內治熱毒未解而蛔厥者黃芩一錢五分甘草炙一錢白芍六分半夏二錢大棗二枚生薑一錢共六味水煎服蛔蟲屬熱者加烏梅川椒理中湯治痘證五六日後變虛寒而蛔厥者人參白朮乾薑炒甘草上四味水煎服雖蛔蟲屬寒者加烏梅川椒黃連少許是主方也叵虛寒甚者加熟附子五分或蛔症熱為凶惡者即加黃連五分加烏梅川椒此名黃連安蛔湯又加鷓鴣菜可也汪氏解毒飲十一二日身不潮熱飲食不減者不須服藥若發熱當靨不靨及痂落無托靨者此方治之當歸酒洗芍藥人參山楂黃耆蜜炙荊芥牛蒡炒研碎防風各二分炙甘草一分上九味煎溫服若是陽證各照本方加黃連四分黃芩共酒洗二分或熱甚者加生黃芩生黃連銀柴胡各三分若是陰證加肉桂清神散火湯治痘後驚搐此藥對病者生若不對而連發不止者死木通麥門冬玄參黃連梔子仁上五味燈心引水煎研辰砂末調服大便祕者加大黃自利加人參清毒散痘不當收斂之時忽一時收斂者更現證周身窠粒乾燥口渴發熱煩急不寧此毒火壅盛之故也此湯主之方見於起脹部犀角解毒飲治十日後壯熱不結痂雖結不實狀如蠟滓而不幹者生地黃牡丹皮犀角梢尖芍藥各一錢五味子七粒連翹牛蒡子炒玄參甘草各三錢人參一錢以上十味水一鍾半煎六分或三分不拘時服或研為末煉蜜為丸如彈子大每服用一丸燈心草二十根棗二枚煎湯化下又加淡竹葉三十片亦可大連翹飲十二日後發熱壯盛胸腹手足頭面俱熱大便祕小便澀餘毒太盛即當解毒此湯主之連翹牛蒡子柴胡去蘆赤芍防風各八分木通當歸車前子荊芥穗黃芩酒炒山梔子酒炒滑石甘草蟬蛻各五分生薑一片俱十五味同煎大便祕者加酒炒大黃一錢五分忍冬解毒湯痘痂初褪大局無慮疤少榮潤熱欠清和防餘毒竊發者此湯主之金銀花土貝母甘菊荊芥穗牛蒡子紅花甘草木通連翹地丁上共十味外加胡桃煎服若大便祕者兼與四順清涼丸以四順清涼飲為末以糊丸之羚羊角飲治痘餘毒不解上攻眼目生翳羞明眵淚俱多紅赤腫閉羚羊角磑碎黃芩黃耆生草決明車前子升麻防風大黃芒硝各等分上共九味水一鍾煎半鍾稍熱服涼肝明目散治痘後羞明者當歸龍膽蜜蒙花川芎柴胡防風黃連酒製上七味各等分雄豬肝煮湯煮服一方加蟬蛻清胃瀉火湯治口疳輕者宜此湯若重者乃宜用清涼攻毒飲留濺血塗金不換妙也連翹桔梗黃連梔子黃芩玄參升麻生地薄荷甘草葛根上十一味水煎服或加犀角石膏若大便祕結者加生大黃一錢甘露飲治虛證口疳又牙根臭爛出血並治喉舌生瘡天門冬麥門冬生地黃熟地黃枳殼黃芩石斛茵陳枇杷葉甘草上十味白水煎服當歸桂枝湯治痘後手足忽然拘攣不能屈伸運轉者當歸酒洗白芍酒炒川芎甘草桂枝黃耆蒼朮制黃柏酒炒上八味水煎服如感寒骨節痛加羌活防風如氣虛少加川烏引經再加人參五加皮湯治痘收之後或面目虛浮四肢腫滿者此屬於肺家也五加皮蒼朮桔梗木通防風桑白皮薑皮豬苓澤瀉上九味水煎服厚朴湯治腹脹如鼓目胞微腫者此屬於脾家也厚朴陳皮蒼朮大腹皮白茯苓豬苓木香上七味水煎服傷於水濕者加澤瀉滑石車前子葶藶傷於食物者加神麯山楂子三稜莪朮枳實喘者加葶藶杏仁萊蔔丸方見於後四苓散治痘中過服飲水而痂後腫滿者四苓散加燈心滑石黃耆湯痘收之後衛弱而汗出者此湯主之人參黃耆黃連炒甘草桂枝上五味水煎溫服當歸湯睡中汗出寤則乾者謂之盜汗此方主之黃耆當歸生地麥門冬白芍炒炙甘草上六味用麩麥為引豬心以竹刀批開煮湯煎服之導赤解毒湯痘後有昏昏喜睡者若連日不醒口中喃喃自語或有睡而復醒者形如醉人亦多妄語此邪熱入於心也此方主之茯神木通生地麥門冬山梔仁人參石菖蒲甘草節上燈心引九味水煎服兼與安神丸加牛黃末妙也化斑湯治痘淋色紅人參知母石膏牛蒡子連翹升麻地骨皮淡竹葉甘草糯米上十味水煎服以米熟為度馮氏祕録曰化斑加玄參地黃小柴胡加生地黃湯治赤火丹瘤其毒紅腫作痛手不可近流移上下者柴胡人參黃芩各三錢甘草炙二兩生地黃半夏各二兩湯泡七次上六味為粗末每服三錢水一盞生薑三片棗一枚煎至半盞去渣溫服萬氏心法曰治痘癰玄參化毒湯治痘後赤火丹瘤玄參歸尾酒洗紅花酒洗連翹去枝梗心軟石膏赤芍地骨皮防風荊芥穗木通等分上共十味加淡竹葉水煎服如其急者置紅腫處徐徐以銀剔針破吮去惡血亦可也案古人有言當局者惑傍觀者明治痘亦尚如此平素不研究之一旦臨局其能無狼狽疑惑歟世醫其思諸
