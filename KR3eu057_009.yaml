body:
  text: 卷九附録異證治驗十一條記試痘一治驗浪華高麗橋油屋四郎兵衛女年五歲痘於丙午仲冬一日發熱雙唇腫胖上下共現一大痘其色光赤明潤乍起乍漿謂之雙鎖口此最為痘家之所惡也而通身無痘象既及五朝迎醫某請治醫曰此不足慮雖身熱未除痘粒稀朗不待服藥而愈家人以日晡壯熱神氣不爽故不信其言嘗聞余有治痘之術急邀余請治往診之身熱未解唇觜二粒其勢甚猛悶渴啼號日夜不穩眼如灑朱兩頰乾紅不見點粒余曰此非正痘殆鄰乎逆其先出者謂之試痘今雖見其稀朗應有深藏鬱伏之毒於內如不急攻發之則大熱復發悶痘湧出焉蓋其症險則隨治而生若逆則無方可治然未有百發百中之策乃辭之病家纍請不止仍如法以銀針剔破二痘吮去惡血以藥貼之又以加味升麻葛根湯加蟬蛻地丁牛蒡子與之少焉赤點一齊湧出但離環跳之部頭面盡為分珠其症幸出乎險矣已至六朝投以神功散加酒炒黃芩蟬蛻地丁及七朝身熱略穩頭頂稍突唯顴額平塌未起手足未松蓋發始為熱所困故為此不快也因以大保元湯加桔梗防風糯米與之貫至十朝精神爽寢食寧痘漿逐期收功用忍冬解毒湯十二朝小水清利面腫隨消唯上唇腫未消齒齦濺血絲是乃欲為口疳之兆也因塗金不換止其血以清胃瀉火湯地黃一大匙加犀角汁與之至十九朝全愈記鼻口兩陰失血凶證周防某侯書記二宮彌三郎天明戊申春在於浪華常安橋邸而患痘焉年方二十五一夜微身微熱次早增寒增熱面容變改慘慘黯黑額前浮青氣痘象先從手足而萌陰伏皮間似蚊點蚤斑見者曰疹曰斑其議不一請余視之其症通身無熱蒸而腰腹疼痛不堪愁楚余曰非疹非斑是即痘也因耳語傍人曰此痘概論之凶逆殊甚斷不可為蓋出點過赤者後必變紫甚者逐漸轉黑此痘如痣不為窠粒是毒邪陷伏血中而然也最為痘家之所惡焉然神識如常飲食無故其所作不異平素庸醫以為無憂此乃余之所以甚憂也古人不云乎病人好平素者痘症之大逆也此症雖外無熱蒸而深藏鬱伏之熱甚猛於內意至第七日必告變矣病人不耳餘言殷勤請藥余以與其人有雅情不容卻乃以敗毒和中散加大黃石膏與之臨去復囑傍人曰此藥如不奏功則宜延他醫焉翌朝診之其證依然如故告唾血一二口余曰此痘素逆今又加逆死期邇矣其家與淡輪醫某相近乃急迎之其醫頗以雜病被知於世然未研治痘之術至診畢曰是疹毒內攻之症也因與赤小豆湯其方內有桂余曰此痘梟炎鬱伏內必煩擾若用辛熱之味則血愈妄行遂干衝脈走空竅乎醫曰先與此湯而後再議余已悟為死症故不強爭須臾溺血如紅花膏唾血亦數口已至五朝便血續續自合至升因又急迎前醫醫稱異病率門生數人往議之至六朝口鼻及兩陰鮮血走出數升至第七朝果如余言然矣嗟乎前賢往哲雖時不同然其所見皆符千載之下宜奉為圭臬也痘書云陽絡敗則血走於上衄血嘔血陰絡敗則血走於下尿血便血陰陽俱敗則血自上下出者其此痘之謂乎記痘聚於咽喉一治驗鵜殿某二男年十四戊午冬俄遭痘危發始當沍寒時醫妄用辛熱之劑以防寒氣而熱毒與梟邪相搏上聚於咽喉呼吸促迫舉家驚惶請余視之灌漿中日也其瘡陸續出而無起勢窠頂平塌如紫浮萍咽喉腫塞飲食藥汁絶不入口將飲而嗆其聲如破壯熱躁渴雙唇腫裂舌瘡似蜂窠其症扁倉將望而走矣蓋初發誤失清解之所致也但觀口角兩腮之間猶有一二窠鮮明紅活可以冀生者凡火毒蘊畜蝕乎咽喉者宜投清涼利咽之劑誤用參耆丁桂之類如塗塗附因急制玉瑣匙以吹之又意此症投托里清補之味而痘膿提起則得轉危機矣即甘桔湯加黃芩大力子山豆根以投之又以內托散去參耆桂加黃芩牛黃末二分相間服之至九朝凶逆略寬尚用前方及十一朝漿濃半足次早始吃粥汁一二口薄晚下大便乾黑者數塊此夜大雪寒威凜凜刺膚忽然戰栗咬牙其候甚危余來視曰此痘素逆今復加逆其如之何請辭不可因急制聶氏建中湯二貼投之而後諸症稍平穩唯舌喉唇內痛楚如劈煩渴引飲無暫安放急與補中益氣湯加五味子麥門冬玄參至十二朝寢食頗安面瘡稍有收意仍以前方貫及十四朝遍體漸次收結但餘毒聚於左膝三里穴處臭氣衝鼻頗類疳蝕瘡乃製藥汁洗之去其惡臭而後更以白龍膏傅之日兩三次竟以忍冬解毒湯收焉其成功實出於天幸人力安能及於此乎哉記熱毒入血室發狂妄一治驗金城武庫監小佐手某女年方十六在於浪華出痘辛亥之春也其症鷙猛數醫相議處方放苗四日證愈猖獗仍致書請診余往視之一醫在座曰令愛氣虛殊甚今非參附大劑則不可救藥已煎矣直欲進之余止之曰推症言之伏火伏毒燥炙於內煩躁悶亂無暫安放言語錯亂眼怒如見鬼狀若誤投辛熱溫補之藥則猶抱薪向焰火豈不危哉夫兩眼如朱雙耳似燎而痘苗隱躍皮下欲出不出其色紫豔礬紅者是血熱壅皮間也神識不清譫語狂妄而眉宇愁蹙者火褐太盛以亂神魂也口氣如爐便祕溺如油及唇裂舌尖赤色中央乾黑者是梟炎焦爍五液也蓋此症痘前天癸既到今復不日而來血室空虛邪熱乘虛而侵衝脈故為血妄行而內動中虛之憂也所幸此痘素血有餘今又經水非期而到故免血熱枯燥之梟而逆轉為險所謂險者從治而痊但內火燔灼表裡俱實即純陽無陰之症也如不急解其圍則死期正促矣醫聽之以為河漢捲舌而去父母乃曰嗚呼信哉先生之言請惠一劑余以症甚險辭之乃再三請曰嘗聞死生有命如服先生之藥而死實無悔矣因以清涼攻毒飲石膏大黃各一大匙加大桑蟲汁與之一夜五貼連服兼以退火回生丹和冷水頻頻進之次早凶逆稍退略著安眠寤後始認父母之言至六朝小水快利火褐半退但出瘡乾紅而不松突因以前方貫至八朝始進白粥一二口神識略亮睡臥稍寧九朝藤田某醫在傍問曰當漿期無膿路者必死其如此痘何余答之曰此女稟賦壯厚毒當從血漏而解是所謂逆變為順者也但用峻涼攻利之劑一開其牖則內火自衰標瘡雖不悉漿必待靨期而發癰腫生意其可庶幾焉因以前方照至十二朝忽然大渴引飲尚以前方倍加石膏大黃生地黃與之貫至十三四朝渴欲既休神氣愈靜寢食益寧額前可愛者四五窠漿色鮮明漸覺有便氣乃與四順清涼飲十六朝下黑便數塊而後神氣自爽快至十八朝頭頂與腿臁發腫毒數塊及偏身出如疹痧者是乃餘毒欲解之徵也因以大連翹飲一百餘日而全收功記嬌嫩一治驗播州某侯一公子年才三歲在於東都邸丁巳患痘一夜發熱熇熇次朝見苗一齊湧出瘡雖頗屬稠密悉為分珠而通身如爐色似紅霞小脈家以其嬌豔誤為血熱乃進十神解毒湯兒素幼痘亦不稀侯甚危之偶聞余家纍世有治痘之術回急使人邀余圖往而細察之唇舌淡紅滋潤此梟邪悉發肌肉內已空虛也蓋症雖平順發始為熱所困遂犯氣虛頂陷腳塌紅赤非常即氣弱而不能流血故血泛濫妄乘氣位而為此凶候是非血熱乃嬌嫩也夫嬌嫩與血熱其色相類蓋血熱屬實嬌嫩屬虛虛即氣虛也翁氏有言氣虛不補則必死若不早圖之五六日期滑泄不禁寒戰咬牙並起遂至危篤之症矣急補益神元調養脾胃為要是治虛痘之完策也侍醫在乎左右殷勤請治余曰宜邀前醫議之今置前醫而從命余所不顧固辭不許余曰人命之重不翅泰山如侯不許私示余所考之方君等宜處進之且余自傍逐期為痘計乃使加減益氣湯去升麻加人參一分肉桂二分進之翌朝兼以人參五分熟附子三分生薑二分大棗一枚如法濃煎於本方間交進之次早候之頭面赤色半退輔顴略有起勢貫至六朝窠頂猶未松綻眼已封未緊鼻欲塞猶通漸有欲陷塌之勢乃使以大保元湯加丁子熟附子糯米進之又參附如前七朝漿色自口角呈至額前及九朝漿濃稍充口角略有收意但滑泄未禁帶青色腸鳴下氣此欲虛寒續至之候也直與聶氏建中湯且謂侍醫曰意今夜乘寒酷烈宜防外感乃使人參一錢熟附子六分如法濃煎徐徐兼進其夜果寒戰咬牙勢頗猛猖二方共交進之垂曉稍穩十朝收結微臭寢食俱寧及十二朝諸證漸退神氣始爽靨厚如血靨而收焉終使小連翹飲進之逐日全愈後二醫生感服余術束修備書誓為門下弟子乃齊藤常庵辻元李庵也記峻涼太過變為壞症一治驗備中某侯臣青木某在於東都邸舍其孫年方八歲患痘於己未三月數醫始事既至靨期而不靨溏泄頻頻家人驚駭更迎他醫圖之咸為不治手額而去乃走迎余余往視之蓋靨期中日也其證溏泄數行煩渴引飲如渴水之魚頭腳熇熇似火痰喘氣急腹脹如鼓皮薄如麩根暈散闊然手足漿膿粗松綻神情不昏寢食俱寧且梟邪不侵環跳之部故證雖危篤乎猶可為也余推日以目之蓋此痘而有此症者無他中間謬清涼太過所致也古人謂之三禁之失一醫在坐曰如諭纍日以石膏硝黃芩連犀角汁之類與之其凶熱益猛不能禁止乃邀先生以求長籌余曰今腹肚膨脹泄泄頻頻者腸胃俱寒也大渴者津液下陷也頭腳熇熇者虛火炎上也唇乾燥者五液將涸也雖然虛寒未客留於藏內故舌色淡紅滋潤此兒尚有幸焉但不早圖之則表裡俱寒終致不救舉家聞之拜謝請藥乃以補中益氣湯減柴胡升麻加肉桂一大匙丁子十粒與之服一兩次暫時安眠口渴半退次早溏泄自休手足根暈緊緊收功終以錢氏白朮散去葛根加黃耆肉桂與之貫及念五朝而愈記血從痘頂走出一治驗浪華天滿街莊村屋仁兵衛一子年既十歲辛亥春痘一醫任之其症甚獗故苗四日邀余需治乃診之身熱如炮口氣似蒸放苗分珠居稀密之間遍體如紅霞兩顴赤赬殊非常而至山根鼻梁口角兩頤之際帶青㿠白色其必胃中有稠垢也神情昏憒煩渴且猛唇裂舌尖而色赤紫中央白胎小便如醃魚汁大便乾黑如墨是亦瘀血在胃中也若不早解其圍則變為壞症遂不可救矣因謂家人曰幸今四日尚可為也遲至五日雖和緩不可如何乃以涼血攻毒飲倍加大黃石膏黃連犀角與之翌朝凶惡少緩且及午天乍下一黑物而滑泄兩三次其黑如漆至六朝火褐半退寢食稍穩精神亦亮乃投十神解毒湯加石膏大黃黃連少許次早窠囊聳突凶惡將轉順鼻孔之瘡卒然作癢兒何以指搔之鮮血從指流出幾半杯父母驚遽以為衄血急忙來報因往察之即非鼻衄蓋當鼻孔之痘頂血絡泛溢從搔破而走出乃以藥留其血而歸爾後早晚走血數盞忽然寶窠平塌全無根暈面色如脂粉余再敷藥以止其血且曰此痘素頻於逆幸雖以藥挽回而再作血箭之凶是為痘家之所大忌也今痘雖血澤不緊形色失勢唯所賴者精神不昏寢啖俱寧耳仍囊兒兩手使傍人從左右守護固禁挨破乃以十全大補湯加鹿茸血見愁糯米投之貫至九朝瘡色復故根暈紅活漿膿肥充人中口角略有收意次日大渴引飲余曰中間因罹失血不盡火熱之治故余炎與剩毒相搏而渴焉耳再以清涼攻毒飲加石膏一大匙與之其夜下利如煤者數合至十三朝火褐盡解煩渴從休頭頂足脛發腫毒而後漸膿化諸症平準乃以忍冬解毒湯治之五十餘日而奏成功云記靨後結痘疔一治驗余寓於京師東洞紫水亭時室街有按摩醫其家貧困不畜奴婢自抱其兒年僅四歲者來曰此兒頃者出痘順美不藥而愈既三七日後一夜發熱如灼次朝於腹肚兩脅腰臀之間再現痘形數十點已經六七日大半自退而未除者過半紅腫掀發其色如火翌日變紫紫又轉黑其黑如墨服御醫某藥今又四五日而全不退伏冀先生之診余乃視之神情爽快嬉戲如常解衣自臍之左右自丹田氣海京門五樞及腰臀等處連續不絶勢甚猛悍其形大者如錢小者如黑豆凡二十四窠見者無不恐懼余曰靨後結疔者是也此痘素屬血熱家人不和恃其稀朗不服藥之所致也蓋血熱不盡解則久必血瘀而後成此梟乎且夫痘疔與黑痘相類蓋黑痘捏之如痘疔者其形似螺蓋捏之肉中有核割之不知痛癢四圍紅腫掀發其頂陷入肉中而如墨黑如石硬腐肉突出則其根寸許抑人之五臟皆著背骨獨腸胃者自著肚腹故疔根為楚則徹透腸胃腐壞則與腸癰等若荏苒經日遂至危篤是可不畏乎醫曰幸遇先生妙手是再肉骨也死不忘矣乃以神功散加黃芩大黃雄黃少許與之已及五朝其大者一二窠爛化拔去其根甚淺直貼黃油膏愈其餘逐漸腐出貼膏如前後與內托之劑而全愈此百中一二之症也其可不謂奇也哉記疫癘痘一治驗浪華天滿與力街寺西時藏年方十八染痘於己酉初夏數醫以為死症乃不得已迎余往視之蓋當放苗四日也火熱未解自汗滴滴遍身如蒸面部出瘡稠密無有隙地而瘡色乾枯焮腫不松腹背稍疏頭頂手足瑣屑攢簇頂尖如針摸之似刺手掌其狀非常殆類鬼痘神氣昏倦譫妄渴煩嘔噦不食二便祕結形色雖頗凶逆以神元與唇舌言之猶屬可救此證疑痘前觸冒瘴氣未幾而染痘瘟者夫天地之間氣候百變痘症亦隨百變書云痘之形狀一百六十樣故痘前慎擇風土之宜以避癘氣則痘發自順美乖之自逆古人既有確論豈可不遵奉乎哉老母進曰誠然前日出釣於郊外其夜大熱脛痹次日赤點一齊湧出雖迎數醫皆辭而去願君救焉余曰此疫癘痘也亦名曰漿痘其症雖凶猛屬險猶幸唇舌滋潤此即內毒發出於肌膚之候故不誤治則得所願乃以十神解毒湯加黃芩黃連大黃石膏大力子清之解之六朝利黑便數枚而里症稍緩表毒凝結牢封未宣故與參麥清補湯加白蛇黃連貫及八朝窠頂漸鬆突次早膿囊發鼎峻之勢眼鼻俱封因以內托散去桂加黃芩大力子白蛇與之及十一朝口渴殊甚蓋心移熱於肺傳為膈消也睡眠不穩口呢喃者熱毒焚於胸堂也乃投白虎湯加黃連一大匙煩渴半減漸入佳境十二朝宿垢未利與以四順清涼飲下一塊糞至十四朝結痂厚加雞屎內外鬆解但餘毒變遷不息乃與大連翹飲及二十一朝面腫悉消獨上唇腫大濺血淋漓是余炎蒸於中宮發為走馬疳者也因以金不換塗之重以清涼攻毒飲凡三十餘日而霍然起矣記痘中見蛔乾嘔不止一治驗南紀儒官竹內士言號吹臺一男子年方九歲出痘於丙寅初夏一夕身熱如炙次朝益猛煩躁悶渴數醫相議與以涼膈散而口糜乾嘔續續不休俄吐生蛔二條因投理中安蛔湯乃嘔益甚衆醫束手不能如何舉家驚歎致書迎余乃往察之其兒稟賦虛弱形體枯瘦面顏㿠白兩睛白吊雙唇紅赤舌淡紅滋潤中央薄胎似粉蓋痘中見蛔者虛中有實實中有虛故禁食悶渴唯好冷飲陰陽糅雜而無定局殆似水逆之狀小水清利大便祕結頭溫手足如冰痘苗隱躍皮下遲滯不現其凶險不可僂指推症論之是皆蛔厥之候也治法不問痘症先投殺蟲之劑為要冀合死中求活之策焉乃用黃芩加半夏湯加殺蟲之品與之服之數次乾嘔稍靜因與加減益氣湯加地丁蟬蛻補托內氣發解標瘡既至五朝痘粒隱伏不齊水穀入口噦聲不絶而舌中央轉微灰黑益好冷飲是胸中有虛氣噎塞不通而然也因以參連沸湯探之虛痞自散兒隨求藥尚主理中安蛔兼與以溫中益氣湯貫及七朝手足漸溫而痘未起松乃以參歸鹿茸湯加丁子肉桂熟附少許濃煎與之欲使痘瘡提突其夜下死蛔七條相續大便滑泄凶惡略緩次早又糞死蛔一條尚主安蛔如前面瘡猶未起突絶無血澤時見將寒栗之勢急投聶氏建中湯貫及十朝又糞死蛔五條面色略鋪紅摩之陷不礙手而嘔氣愈穩睡臥亦寧卒然齒齦流血察之幾似走馬疳之狀乃傅金不換以留其血此蓋辛溫之藥卻助邪火以與胃火相搏而攻唇口故也速以實胃瀉火湯加犀角石膏兼與以黃連安蛔如前其夜又下死蛔五條口疳之梟隨乃緩紓十三朝始思食乃吃白粥一二口神情快爽遊嬉怡怡然猶蒸蒸煩熱者虛火炎上也此無他故清涼太過使虛愈虛之咎也不如以清補之味而虛實並治乃與參麥清補湯貫至十五朝面瘡雖有生意而手足平塌不起余深稽之夫手足者太陰脾經之軸也此兒脾氣素虛而不能達透於四肢故為此凶惡之症矣與以保嬰百神湯即脾胃自實漿膿半充諸危證逐日順美但大便祕結已六七日乃投四順清涼飲一貼隨乃快通糞中又見死蛔三條預防餘毒遷變之害與以忍冬解毒湯漸次收靨至十九朝俄然腹肚膨脹即於本方內加酒炒大黃餉時下黑便數塊及爛蛔一條至晚又下死蛔一條然後全收結焉凡發始吐生蛔二條中間至終下死蛔尺許者二十二條合二十四條此治雖中間有溫涼之轉而首尾不爽隨變處方遂奏再生之功余頻年治痘不下數千人雖然此症而有此功者廑廑乎如晨星嗟亦難夫記舌上生黑痘一凶證東都儒官柴野彥輔號栗山先生其孫女年僅五歲一夜身熱灼灼如火次朝邀余往視之面色如絳兩耳雙睛並似抹朱神情昏憒眠食不寧余謂栗山曰今春痘瘟行於傍鄰孫女雖未明為痘症而不可不預備焉請用輕陽發散之劑開其毛竅以試之可乎乃以加減升麻湯與之次朝候之滿面痘象稠密火熱壯盛唇舌赤紫而舌上生一黑痣仔細察之證甚猛獗余乃辭曰諸書所謂舌上生黑痣者必死此痘是也請求他醫議之栗山曰諾請先煩君余不得已制拔毒散和油燕脂敷黑痘頂上與以十神解毒湯加石膏黃連牛黃辰砂末而後退火回生丹加真珠末少許和冷水更用之其夜黑痘忽然消除三朝往診之舌上異處復生一黑痣家族哀號愁容可掬主方如前未幾而除去栗山曰自再昨招衆醫使議此因無一人認症者唯告危篤辭去我思與使其天凡醫之手寧煩君矣既至四朝痘現於足心而外瘡略鬆二便快通火熱稍退神氣略亮始吃白粥一二口栗山莞爾見矧余曰此痘古人未嘗言其治方幸以余心得之方得除其梟痘雖然因循逶迤至乎漿期而不膿化必待九日告變矣乃攜金囊祕録往示栗山栗山看了嘆曰嗚呼命哉天既亡之其謂之何至六七朝乃以排膿之劑百般盡心然窠囊枯萎毫無膿化之勢已及九朝果如前言余自壯年業醫遇此痘症八十餘人皆屬泉下之客其間得生者僅二人耳録之以示門人庶為痘術之一軌轍去
