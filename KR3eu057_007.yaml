body:
  text: 卷七辨女子出痘夫善治痘者譬如曾無疑畫草蟲方其落筆之際不知我之為草蟲草蟲之為我也方臨痘局不知我之為痘痘之為我然後乃可通其神理而百無一誤矣此卷於女子出痘之方論托出得盡觀者不可認作浮論空說矣女人出痘候曰婦女之痘最難醫焉要之女者陰質血常不足也然其平準者出形起發灌漿干收咸等童男唯怕時逢天癸期至耳蓋痘瘡始終以氣血為主氣以充之血以濡之一有不足則變症百出不可屈指故女子十四以後出痘不免起發成就之時天癸一行內動其血變為陷伏者多矣女子痘疹發熱之時經水適斷憎寒壯熱神識不清視瞻怪妄言語荒誕此為熱入血室血室衝脈是也而肝主之肝藏血沖為血海行經之後血室空虛天行邪熱乘虛入里也肝藏魂開竅於目神不清者魂亂也目妄視者心亂也譫語者肝移熱於心也瀉肝散主之如大便秘結宜清涼攻毒飲凡發熱之時適當經水方斷而血分空虛者須早服柴胡四物湯以防毒邪乘虛而入若憎寒壯熱神識不清見聞狂妄言語錯亂尋衣撮空者此即血室空虛而熱邪已入者也宜四物湯合導赤散加麥門冬兼與安神丸若發熱之時經水適來而非正經之期者此由毒火內甚擾亂血海迫血妄行故月事不時而下也急以涼血地黃湯加解毒藥使熱得越毒解痘出而經止為度逡巡隱忍直待中氣虛弱瘡伏不出乃責諸醫亦晚矣發熱之時經水以期而來則畜血得出熱隨血解乃吉兆也但至四日其經當止若不止者此即熱血入室迫血妄行也涼血地黃湯加人參主之凡女子出痘經水忽行乃暴瘖不語者蓋心主血舌乃心之苗也血去則心虛心虛則少陰之脈不能上榮於舌故暴瘖不語也宜先以當歸養心湯養心血利心竅待其能言以十全大補湯調之如值月事大行之故瘡不起發不光壯不飽滿不紅活或灰白或黑陷或灰陷或青乾者此皆裡虛之候痘復陷入也治之宜十全大補湯如唇舌淡白者加熟附子固其陽氣如虛寒者兼與參附湯而峻補之凡女子崩漏未止氣血已虛而感時氣直患痘則必不能以任其毒宜用十全大補湯以補氣血為主若灰白平陷難發難漿者加熟附子一二片使裡氣充足毒不停留而自能飲食自能起脹庶可保全不則倒塌不治矣寒甚則兼與參附大劑凡七八九日起發泡漿之時月事大來瘡應起發而不起發應泡漿而不泡漿頂平形塌或如灰白或如黑陷此皆為陷伏乃壞瘡也急用補中托裡以調元內托散主之外用胡荽酒噴之瘡起發腫脹或於空中再出一層痘此大吉之兆若腫滿喘急寒戰鬥牙手足厥冷者乃死兆也夫孕婦出痘熱能動胎胎墮則氣血衰敗而痘不能起發灌漿矣凡治之之要始終以安胎為主切不可用丁桂燥熱之品及禁食諸毒物之類其初發熱先以參蘇飲之類發之既出後無凶症者多服安胎飲保之或渴或泄者用人參白朮散加減治之如痘色灰白頂陷不起發者用十全大補湯加木香糯米服之總之不問輕重如有熱證者悉以清涼安娠為主如毒火燔灼於內則雖大黃石膏亦可用是乃安胎之妙要也蓋孕婦出痘正當盛時忽有臨正產者勢必氣血俱虛亦宜以十全大補湯大補氣血為主如虛寒者加熟附子如虛寒愈劇陽氣猶脫者急以參附大劑兼與之凡胎之墮也非血熱必氣虛也急宜峻補而陽氣猶脫者不治他無法方凡當初熱見點起脹之時而胎墮者多生至灌漿期而胎墮者多死至收靨期而胎墮者無妨但不問日期胎墮之後內氣下脫而痘倒陷不成漿者必死故急宜以峻補之劑實其元陽外此無復他策如證平準宜審症施治不可妄為多疑之慮反到變證也又曰孕婦出疹熱極不易退者內實故也必墮其胎胎墮則疹隨熱內解而愈古人所謂麻宜內虛痘宜內實此之謂也凡方產之後半月前後適逢出痘者其症雖重而無胎孕擊累惟氣血尚虛治宜大補榮衛為主若出瘡密者隨其證而用其方如投連翹大力子之類大便自利者用肉果炮姜之類余照常例而治之惟雖孕婦首尾無夾症者應於日期用法如常婦女孕婦主方瀉肝散羌活六分當歸一錢山梔龍膽各五分川芎防風各八分大黃蒸三遍六分一方有木通柴胡黃芩無大黃如證重數日大便秘者四順清涼飲或涼血攻毒飲清涼攻毒飲可參用四物湯導赤散安神丸三方共見於前涼血四物湯白芍桂炒當歸梢生地黃升麻條黃芩酒炒酒紅花酒黃芩連翹牛蒡子炒甘草上十味水煎服柴胡四物湯柴胡人參黃芩當歸川芎生地白芍地骨麥門冬知母淡竹葉上十一味銼細水一盞煎七分去渣溫服不拘時當歸養心湯人參當歸麥門冬甘草升麻生地各等分上六味加燈心水煎服涼血解毒湯女人出痘非經期於發熱之時忽至者治之當歸一錢一分白芷五分升麻四分紅花赤芍連翹各一錢紫草根一錢五分燈心二十根桔梗八分上九味煎服重身者禁之調元內托散痘發起泡漿之時月事大來瘡應起不起應灌不灌頂平形塌或灰白或黑陷者此皆附伏乃壞瘡也急宜托裡此湯主之黃耆人參當歸桂枝木香青皮赤芍川芎大力子上九味水煎服虛者加熟附子安胎飲初熱既退諸證平準以安娠為主人參白朮黃芩熟地川芎當歸芍藥砂仁紫蘇陳皮甘草上十一味生薑三片紅棗三枚水煎服安胎飲痘出定後無餘症者此湯主之大腹皮酒洗人參陳皮白茯苓砂仁白芍藥紫蘇香附子甘草上九味外加糯米水煎服如有汗者去紫蘇加生黃耆胎漏者加阿膠百草霜胡荽方出於麻疹部四順清涼飲涼血攻毒飲清涼攻毒飲十全大補湯參附湯參蘇飲人參白朮飲以上共見於前辨麻疹諸證一名膚疹一名騷疹一名糠疹一名麩疹一名瘄子一名痧子一名赤瘡古謂麻即疹也疹出如麻成朵痘出如豆成粒皆因其形而名焉夫胎毒一也玉案曰初見時大小不一有色點如疿者曰之疹又瑣屑紅點隱隱肉間曰之痧同其證異其形是皆膚疹也夫天地之癘氣一動則所稟之毒隨感而發陽感之則疹出焉陰感之則痘出焉陽浮而淺故疹易出易收陰凝而深故痘難出難收所謂疹出心肺然至言鼻涕咳嗽噴嚏眼胞浮腫眼淚汪汪面腫腮赤等證陰陽混雜自非具眼不可辨認既曰疹出於腑心肺獨非臟乎如一蒸熱則五臟百骸共受之傷發熱無汗毛竅閉塞者先以辛散發之如葛根麻黃荊芥羌活西河柳之類若熱毒郁遏煩躁譫語狂妄二便秘如見鬼狀者先以苦寒清之如黃芩黃連石膏大黃犀角之類初發行辛散則毒從毛竅而出是非侵心肺而出於皮膚乎若鬱火伏毒燥炙於內心火煉肺金則血燥液竭而皮膚乾涸出疹變紫黑色者必死急以苦寒清解之蓋此因何部以治之古今無究其源者余深考之痘麻二證雖出命門之陰陽而其治之以風候為主此余之所以躬試心得之訣也九原如可起則余當從軒岐而定是非而止聖濟總錄曰疹者其邪在腑發為細疹狀如蚊喙所螫點點赤色俗號麩瘡三因方曰細粟如麻者俗呼為麻即膚疹也幼幼集曰麻即疹也謂形亂如麻為朵也痘毒動於陰分賴陽氣升提沉陰出於陽分而解不可損氣陷陽麻毒動於陰分賴陰血滋潤浮陽解於陰分而化不可損血燥陰蓋痘之成功賴氣麻之成功賴血此之謂也初發身熱麻𤺋欲出之圖說按麻如麻痧如沙但大小不同耳所謂痘疹麻疹痧疹風疹隱疹之屬蓋指初出赤點皆謂之疹疹與𤺋古通用發熱之初多似傷寒傷風唯疹則咳嗽噴嚏鼻流清涕眼胞腫其淚汪汪面浮腮赤噁心乾嘔為異耳但見此候便宜謹避風寒戒暈腥厚味以表散之如使皮膚通暢腠理開豁則疹毒易出也如已發熱唇舌赤紅滋潤者疹出最快如唇乾燥舌白胎通明而火熱無汗者急宜峻發得汗而後見疹則止後服如初發雖大熱而時寒時暖宜以辛平之藥發之升麻葛根湯加牛蒡子西河柳之類主之如唇舌赤紫無胎者勿用峻涼疹冰伏不出翁仲仁曰麻疹出於六腑然麻疹一症先動陽分而後歸於陰經故標屬陽而本屬陰其熱也氣與血分相搏故血多虛耗其治也先發散行氣而後滋陰補血凡動氣燥悍之藥皆不可用也大抵疹欲出已出之間雖寒勿用桂枝雖虛勿用參朮雖有痰嘔勿用半夏南星疹喜清涼痘喜溫暖然疹子初出亦須和暖乃易出所謂出苗之初得毒出盡便解也發熱之時不問已出未出之諸證以升葛之味發透之如發熱咳嗽甚者宜瀉白散加減麻𤺋用方升麻葛根湯方見於前不拘時服之又檉河柳為細末加一錢調服亦可也瀉白消毒散桑白皮地骨皮各三錢牛蒡子炒研荊芥穗桔梗甘草各一錢浮萍曬乾二錢上七味為粗末每服三五錢水一盞煎六分如毒熱鬱壅於皮膚或出不快者加檉河柳一錢同煎服翁氏檉葉散一名獨聖散檉河柳又名西河柳又名青絲柳又名三春柳又名觀音柳又曰兩師俗呼御柳上青茂時採葉曬乾為末每服一二錢茅根煎湯調下或於煎湯中加之和勻服之亦可乃治疹之聖藥也赤檉柳治痧疹聖藥也得之疹毒自出而可不死發熱疹已出未盡出而唇舌赤紫滋潤者急宜以清解之劑發之若發熱太盛煩渴譫語頭面遍身赤色如火唇舌共赤薄胎通明者宜化斑湯麻疹未出時發熱吐瀉交作三日內出耳後項上腰腿先出一日出三次二日再出六次見點貼紅活顯露形小鮮明頂尖不長隨出隨沒三四日方收者順證也如疹出熱退唇舌淡紅滋潤者不服藥自愈是毒從吐利而解如不愈者宜四苓散加牛蒡子訶子麻疹未出時發熱熇熇如干霍亂身體烘熱欲出不出隱伏不發口渴氣粗唇舌赤紫或乾燥或燥裂者險症也急宜作升麻葛根湯合白虎湯加牛蒡子玄參檉河柳發之如初發熱蒸甚則必咳嗽宜清熱透毒嗽尚不止者宜繆氏清揚飲子白虎湯石膏知母甘草粳米上四味細銼水一鍾半煎至一鍾以米熟為度溫服繆氏清揚飲子麻疹之主方麥門冬去心三錢西河柳五分玄參二錢鼠黏子炒研葛根各一錢一分蟬蛻知母蜜炒荊芥穗甘草薄荷各一錢竹葉三十片上甚者加石膏五錢研冬米一撮愈甚者加黃芩黃柏黃連翁氏曰既發熱咳嗽甚者已是心火刑肺金是乃賊邪其症當重何反輕於痘每治疹但據見證宜瀉白散加西河柳末投之雖為危症亦無不得其效者瀉白散桑白皮一兩炙黃地骨皮一兩甘草半兩炒粳米百粒上四味水煎加西河柳末食後服看疹之法於暗室中照火候之看耳後項頸胸前腰腿此部先出現其色鮮紅嫌紫黑色也頂尖而不長其形小粒而湧均音聲明亮唇舌滋潤者為吉若頭面赤色如朱丹而帶紫眼有赤脈口有黑氣唇舌乾燥或燥裂二便秘結者內火燔灼毒氣大成者宜化斑湯或白虎湯合黃連解毒湯主之化斑湯治疹子已出火熱不退色大紅者人參舌赤色或白胎乾燥者去之知母石膏牛蒡子連翹升麻地骨皮糯米淡竹葉上共十味煎以米熟為度消毒飲治瘡疹已出未出不能勻齊又治一切諸證胸膈黏痰咽喉痛者大力子二兩炒研甘草銼炒半兩荊芥二錢五分上三味水煎服黃連解毒湯治熱毒盛者黃連黃芩山梔子黃柏各二錢上四味水煎服如面色青㿠白疹子已出色白或淡白或唇舌俱帶白色者此榮血不足也人參養榮湯主之人參養榮湯人參去蘆頭當歸紅花赤芍藥桂水炒甘草上五味水煎服若疹現其色紫赤而如煙火肌膚乾枯暗晦異平時者乃火鬱甚而毒亦深如喘滿氣急者邪熱壅於胃乘於肺故也急以竹葉石膏湯治之或兼與辰砂益元散所謂養陰退陽之義也此乃半死半生之危症也或大青湯大小無比散亦宜詳其症而用之若黑色如灑墨空竅失血者乃熱毒敗陰絡也必死須明察之切勿妄執以施治矣繆氏竹葉石膏湯石膏自一兩至五錢知母自一錢至二三錢竹葉三十片或百片粳米麥門冬自三錢至五錢加玄參薄荷二錢西河柳兩許上八味水煎一方加當歸五錢辰砂益元散治疹出熱不減小水澀心煩作渴者白滑石飛過六錢甘草極細末二錢辰砂二錢上三味量兒大小和勻冷水調下大人自五錢至十錢如心煩氣急甚者再加辰砂一錢甘草一錢以淡竹葉煎汁和調候冷頻頻與之翁氏大青湯治色大紅或微紫而血熱者或疹出毒火甚者大青玄參生地黃石膏地骨皮知母木通荊芥穗甘草各等分上銼細共九味水一盞淡竹葉十二片煎七分去滓溫服心印大無比散治疹已出熱毒太甚驚狂譫語引飲者桂府滑石飛過六兩粉草一兩辰砂飛三錢雄黃飛一錢上四味為末每三五歲服一錢十歲服二錢心印小無比散治壯熱口渴小水澀大便秘口氣熱煩躁不寧或焦紫或紅斑桂府滑石飛過六兩石膏飛過一兩粉草寒水石各五錢鬱金蟬肚小者甘草湯煮乾為末七錢上五味俱制淨末和勻每五歲者服二錢大人再加冬月燈心湯下夏月井水調下如熱甚不解者井水磨犀角汁調下生生子曰麻疹咳嗽喘急每用痘門中大小無比散服五七分大者服一錢即刻喘定而睡醒後神安氣和而屢用屢驗乃熱毒從小便出也余往往驗之奏功如其言然依以記之正疹欲出發熱頭痛面不甚紅唇舌赤紫或白胎通明煩渴徹夜不眠大便三四日不通躁亂不寧是毒火內伏煎熬陰血而內實故也急宜涼血攻毒飲主之費氏涼血攻毒飲大黃二錢荊芥穗五分木通蟬蛻生地黃紅花各四分牛蒡子丹皮紫草各一錢赤芍八分葛根青皮各二分上共十二味外加燈心一分若熱毒熾盛加石膏二錢檉河柳五分發熱之時疹欲出未出不口渴者但以檉河柳一錢粗煎和六一散少許頻頻與之如大渴者宜人參白虎湯加黃連治之乃生津解毒而已若恣飲冷水恐生水畜症其說見於諸書故茲略之管氏六一散一名益元散滑石飛過六兩粉草炙一兩上二味為細末冷水或溫湯任意服疹出之時咽喉腫痛不能飲食者此毒火怫鬱上薰也宜甘桔湯加玄參牛蒡連翹山豆根外以玉鎖匙吹之不可妄用針出血矣甘桔湯治咽喉腫痛桔梗二錢甘草一錢五分或等分上水煎食後服一方加防風一錢五分一方加山豆根等分一方加玄參牛蒡連翹各一錢玉鎖匙方見於痘瘡部治咽喉腫痛或帝鍾拕下不收及咽喉舌強硬者發熱四五日後疹子卻不見出此皮膚堅厚腠理閉密又或為風寒所襲曾有吐利而猶不發見者乃內伏也急宜投托里發表之藥即用麻黃湯調和檉河柳末一大匙發之外用胡荽酒如自初發大便不通者火毒與瘡毒相搏凝結腸胃伏里而不出也急以四順清涼飲或七物升麻丸解之發之再不出者忽然煩躁氣急變凶惡而死翁氏麻黃湯治襲於風寒而不發見麻黃去根節制過升麻牛蒡子炒研蟬蛻洗淨去足翅甘草各一錢上五味煩渴加石膏四錢銼細加臘茶葉一錢或替用檉河柳亦佳水一盞煎七分去渣服翁氏胡荽酒方胡荽四兩細切好酒二盞煎一二沸入胡荽再煎少時用物合定放溫每吸一大口微噴從頭至足勻遍乃止病人頭面左右常令有胡荽氣即能避去穢氣疹瘡出快痘瘡麻疹宜避穢氣余往往用此方其功如神因以錄之四順清涼飲方見於痘門中治熱實大便不通者或加薄荷二葉西河柳一錢不拘時服若小便不利者可兼與益元散七物升麻丸治毒火甚於內疹伏而不出大便秘結者升麻犀角朴硝梔子仁大黃各二兩淡豆豉二升微炒黃芩二兩上七味共為末煉蜜丸如黍米大凡覺四肢大熱大便難則服取微利乃止疹已出之時自利不止或瀉清水頻數者有吉有凶惟要看其疹之形色如何若遍身稠密其勢大盛或赤色或紅鮮或紫赤者為吉蓋毒在大腸非泄不解惟用升麻葛根湯合黃芩湯加西河柳末一匙治之若吐利不止者宜黃芩湯加蘆根茅根兼與辰砂益元散黃芩湯治熱泄黃芩一錢五分甘草炙一錢白芍藥六錢上三味銼細加大棗二枚水煎服如自利甚則裡急後重而為滯下宜加味黃芩湯兼與益元散大抵疹家吐利滯下為最要上焦毒多乃吐而解下焦毒多乃泄而解中焦毒多乃從吐瀉而解如以此症推之痘毒亦當相同加味黃芩湯治自利甚裡急後重者黃連黃芩各一錢半白芍三錢甘草七分滑石末三錢上共五味水煎服血痢加地榆紅花各二錢聶氏曰麻出有毒氣流注而成痢者宜清熱導滯湯清熱導滯湯黃連條芩白芍枳殼炒山楂肉各一錢厚朴去皮薑汁炒青皮檳榔各六分當歸甘草連翹牛蒡子上水煎溫服紅多者加紅花三分地榆五分秘澀甚者加酒炒大黃一錢二分疹毒甚者加檉河柳五分痘與疹其色為異大柢痘子怕大紅皮薄易破而必生瘙癢疹子喜通紅疹發於心其色紅者心之正色也若色淡白者心血不足也養血化斑湯主之色太紅或微紫而唇舌赤紫無胎而熱煩者血熱也並宜大青湯主之若疹黑紫如青黑斑者必死養血化斑湯當歸生地黃紅花蟬蛻人參各等分上五味水一盞生薑一片煎六分去渣溫服大青湯方見於前若疹出遲滯者加西河柳一錢大抵疹子出沒常以六時為準假令子後出者午後即收午後出者子後即收乃陽生陰成陰極陽生造化自然之數也凡此旋出旋沒者輕若一出連綿三四日不收者乃陽毒太盛宜大青湯或檉葉葛根湯如唇裂舌胎燥生黃刺者加石膏四五錢解之如逡巡不出皮膚無松潤者乃風寒緊束皮膚毛竅閉密不得出汗也急宜荊防敗毒散主之繆氏檉葉葛根湯治疹子已出未盡出陽毒太盛者葛根西河柳前胡麥門冬荊芥貝母玄參知母甘草共九味水煎服如天寒甚則痧毒鬱於內不得透發喘渴悶亂煩躁舌上白胎分明唇乾燥神情不寧者加制麻黃一錢急發其汗荊防敗毒散治風寒襲皮膚難出者前胡防風桔梗柴胡川芎荊芥穗枳殼羌活獨活茯苓人參甘草上共十二味銼細加薄荷五葉水一盞煎七分如熱勢太盛者用白虎湯去人參加西河柳一錢五分治之惟忌升麻黃耆若痧疹欲發未發喘嗽煩悶躁亂者急宜獨聖散如麻疹出齊煩渴不止煩躁不寧者三黃石膏湯主之繆氏三黃石膏湯治疹出後煩渴者石膏麥門冬各三兩竹葉三十片黃柏黃芩黃連各五錢知母檉河柳各一兩上八味濃煎飲之煩躁定而愈疹退之後微微咳嗽者此餘毒未盡也瀉白散合消毒飲方皆見於前若咳嗽甚氣喘連聲不住甚者飲食湯水俱嗆出之此熱毒乘肝肺而然也宜門冬清肺湯加枇杷葉如見血症加茅根汁阿膠主之門冬清肺湯治疹咳嗽不止者天門冬去心麥門冬去心杏仁去尖牛蒡子知母貝母款冬花馬兜鈴桔梗甘草桑白皮地骨皮上十二味銼細水煎去渣食後溫服如疹收後咳嗽不止咽喉痛者本方加石膏檉河柳治之凡疹子收後遍身微熱唇舌滋潤者此乃虛熱也不可加治只待氣血舒暢而自痊蓋痘宜內實麻宜內虛所謂不宜補益也然又大虛不補氣血其何由回大實不瀉邪毒其何由去若疹漸收而虛症繁多怔忡驚悸心神困倦睡臥不寧循衣摸床撮空等之證是皆大虛之候也惟辨審唇舌之紅白潤燥以明為虛證焉急宜人參養榮湯主之虛候少退速止後服蓋痧疹首尾為火熱燥證故忌用參耆桂薑朮苓之類人參養榮湯治疹已收後氣血虛耗餘熱不退者人參麥門冬遼五味生地黃歸身知母白芍陳皮甘草共九味煎服如實熱兼見者以沙參代人參或三七參無妨疹應期收後大熱不退或日久不減急宜柴胡麥門冬湯甚則宜黃連解毒湯合白虎湯主之若發枯毛堅肉消骨見漸漸羸瘦寒熱雜爭者柴胡四物湯主之柴胡麥門冬湯治疹已收後大熱日久不退者柴胡龍膽各五分麥門冬八分甘草人參玄參各半錢上共六味煎服柴胡四物湯治余炎未竭日久寒熱雜起欲變骨蒸者柴胡人參黃芩地骨皮麥門冬當歸川芎白芍知母生地黃淡竹葉共十一味水煎不拘時溫服若見血症加犀角磨汁疹後熱未除忽作搐者不可作急驚風而治焉只用導赤散加人參麥門冬與之兼送下安神丸小便清利者可治短澀者不可為矣導赤散治發搐者生地黃木通甘草各等分上水煎服一方用黃芩安神丸治昏悶神氣不清者黃連麥門冬當歸茯神甘草各五錢硃砂一兩龍腦二分半上七味為細末湯浸蒸餅和豶豬心血搗勻丸如黍米大每服十丸燈心湯下之丹溪捷徑曰若疹子既收而其毒不解邪火怫鬱渾身發熱晝夜不退發枯膚瘦漸成疳瘵治法以清熱除疳丸為主若不早治以致睡則揚睛口鼻氣冷手足厥逆微微瘛瘲變為慢脾風者多不治矣清熱除疳丸黃連當歸各二錢龍膽陳皮青皮各一錢五分川芎乾蟾頭燒各一錢使君子蘆薈各一錢二分上九味為末神麯丸米湯下又曰如渾身壯熱未至羸瘦但多搐掣煩躁者此熱在心脾之二經也治法須用當歸養血湯黃連安神丸相間而服之以神爽身涼為度當歸養血湯當歸川芎麥門冬木通淡竹葉甘草山梔子燈心上八味水煎服大便秘者微加大黃黃連安神丸即於前安神丸方內去麥門冬甘草龍膽加石菖根一錢五分全蠍七個龍膽二錢製法同前丸硃砂為衣燈心湯送下孕婦麻疹但當以四物湯倍加白朮條芩艾葉安胎清熱為主使胎無虞而後疹易沒也如胎氣上衝急用苧麻艾葉湯磨檳榔並服之更多服上藥為妙雖表熱壯盛而唇舌滋潤者忌妄用石膏大黃金汁犀角芩連等類則傷胃中精陽氣不能升呈胎氣其胎必墮而母子共亡者多是皆峻涼太過之失也一熱毒薰胎胎多受傷而母實無恙也蓋疹與痘不同痘宜內實故胎墮而母亡麻宜內虛故胎墮而母安與其胎去而母存孰若子母俱全之為愈也大抵諸證平順則用法依定例治之凡疹後熱毒鬱伏胃中牙齦黑爛肉腐血出臭氣衝人者為走馬疳治法宜清胃火輕者以清胃瀉火湯加石膏大黃檉河柳治之外以馬鳴散貼口中重者以清涼攻毒飲清解之若面頰浮腫環口青紫黑頰穿齒脫唇崩鼻孔腐壞者必死勿治如唇口多瘡其聲啞嗄者謂之狐惑以化䘌丸主之更煩躁昏悶失聲者死證也清胃瀉火湯方見於痘門收結部翁氏馬鳴散人中白即溺底白垽刮取用新瓦盛之火煅如鹽者五錢馬鳴退即蠶退紙火燒過二錢五分五倍子二錢一錢生用一錢入礬內燒白礬一錢碎入五倍子一錢火煅過用上四味為極細末先以米泔濃汁攪口內貼之痘門金不換亦可費氏清涼攻毒飲方見於痘門放苗之部治胃中伏火伏毒太甚者麻疹收後去大力子加檉河柳一錢燈心一分水煎食前服翁氏化䘌丸黃連五錢川椒去閉目並目與子蒂炒去汗二錢苦楝根白皮乾者二錢上三味為末用烏梅七個艾湯浸去核搗爛和丸艾湯送下辨死證凡麻疹黑暗乾枯一出即沒者死鼻扇口張目無神者死疹出漸變黑色者熱毒最甚加煩躁氣急者死犯禁忌卒爾毒氣擁遏渾身如紫黑藍癍疹混不見者死熱極喘脹胸高肩息狂言譫語搦手搖頭尋衣摸床嘔噦秘口出屍氣者必死氣喘心前吸氣而口如魚口者死鼻青糞黑者死疹頭面一向不出遍身稍出現者死面色青衄血成流精神昏憒者死大熱煩渴遍體先發紫黑癍皮爛如墨者必死發熱丹疹先從四肢起而後入腹頭面疹不見者死熱毒內甚至四五日紅點不見譫語狂亂如見鬼狀兩目如血唇舌紫黑色乾澀者必死疹欲出所襲風寒皮膚閉密不出則宜早圖之毒成內攻如悶亂煩躁搖頭呼吸促迫者必死疹欲出未出熱毒攻大腸下利鮮血既止者生如屋漏水不止者急死喘咳不止血從口鼻出聲啞嗄面色枯皺者死麻後牙疳有五不治臭爛者不治自外入內者不治無膿血者不治白色者為胃爛不治牙落者為腎敗不治一有正氣不足不能逐毒外出則毒伏於內喘脹而死者是俗名悶痧也疹已出或一片白一片赤一片紫一片黑如錦紋者死是乃斑症也疹收後身體枯瘦露睛口鼻氣冷忽變慢驚風者死證也夫世俗所謂水痘以每歲被行痘瘡三年麻𤺋三七二十一年率為定期然而其間有遲速傳染之異是皆歲氣順逆所致故未始必有定期也寶曆壬申夏列國麻疹大行時余壯年在鄉初療數十人余亦患之疹後餘毒變痢裡急後重最甚殆為鬼奴乃用聶氏導滯湯而全平復又安永丙申客於藝州嚴島是歲群國又大流布於此益勉療之愈數百人又享和癸亥自春至秋王公士庶嬰麻厄者不可勝數當時余在茲地理療不下數千餘人自壯至老得親驗此厄者三焉古人有言三折肱豈此之謂乎因今攟摭古人之方以為治疹之的登之於痘科之尾其方論皆平生所躬試而非捕風捉影之類讀者察諸
